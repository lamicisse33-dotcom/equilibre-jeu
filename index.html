        });
        conn.on("close",function(){
          DUEL._onDisconnect();
        });
      });
      DUEL.peer.on("error",function(e){
        if(DUEL._recon && DUEL._recon.active) return; // la boucle de reconnexion gère
        console.warn("PeerJS invité erreur:", e.type);
        if(e.type==="peer-unavailable"){
          showToast("❌ Code introuvable : "+code+" — vérifiez le code","lose",4000);
        } else {
          showToast("❌ Erreur réseau : "+e.type,"lose",3000);
        }
        DUEL._reset(); S.ecran="duel_menu"; render();
      });

      DUEL.peer.on("disconnected",function(){
        try{ if(DUEL.peer && !DUEL.peer.destroyed) DUEL.peer.reconnect(); }catch(e){}
      });
    });

  // ── Envoyer au pair ──
  _send(msg){
    if(DUEL.demo) return;
    if(DUEL.conn&&DUEL.conn.open){
      try{ DUEL.conn.send(JSON.stringify(msg)); }catch(e){}
    }
  },

  // ── Initialiser l'état de jeu ──
  _initGS(){
    const r=shuffle([...REPONSES]);
    const joks=shuffle([...JOKERS]);
    // Initialiser adversaire si absent
    if(!DUEL.adversaire) DUEL.adversaire={nom:"Adversaire",couleur:"#e05555",icon:"⚔️"};
    DUEL.gs={
      phase:"attente", // attend que l'invité rejoigne
      // Cartes J1 (hôte) et J2 (invité)
      allRepJ1:r.slice(0,12), allRepJ2:r.slice(12,24),
      allJokJ1:joks.slice(0,2), allJokJ2:joks.slice(2,4),
      mainRepJ1:[], mainRepJ2:[],
      mainJokJ1:joks.slice(0,2).map(function(j){return Object.assign({},j);}),
      mainJokJ2:joks.slice(2,4).map(function(j){return Object.assign({},j);}),
      espionActif:false, repAdvVues:[], phaseEchange:false,
      selJ1Done:false, selJ2Done:false,
      premierValideur:null,
      s1:0, s2:0, manche:1, total:12,
      b1:null, b2:null, cb:null,
      repJ1:null, repJ2:null,
      gainFinal:null, bonusHistory:[],
      jokerJ1:null, jokerJ2:null,
      timerSec:0,
    };
    // Stats locales (l'hôte suit les 2 joueurs pour les badges) + drapeau récompenses
    DUEL._stats={ j1:DUEL._freshStats(), j2:DUEL._freshStats() };
    DUEL._recompensesFaites=false;
    DUEL._jokerArme=null;
  },

  // ── Messages reçus ──
  _onMsg(msg){
    if(!msg||!msg.type) return;
    DUEL._lastRx=Date.now();
    if(msg.type==="ping"){ DUEL._send({type:"pong"}); return; }
    if(msg.type==="pong") return;
    switch(msg.type){

      case "chat":
        // Message de discussion reçu de l'adversaire
        DUEL._recevoirChat(msg.text);
        break;

      case "joker_used":
        // L'adversaire a utilisé un joker (Espion/Échange) → l'hôte retire de sa copie
        if(DUEL.gs && msg.id){
          if(DUEL.isHost) DUEL.gs.mainJokJ2=(DUEL.gs.mainJokJ2||[]).filter(function(x){return x.id!==msg.id;});
          else DUEL.gs.mainJokJ1=(DUEL.gs.mainJokJ1||[]).filter(function(x){return x.id!==msg.id;});
        }
        break;

      case "bonus_start":
        // L'adversaire entre dans un bonus → je deviens spectateur (pause)
        DUEL._onBonusStart(msg.who, msg.kind);
        break;

      case "bonus_grant":
        // L'hôte m'accorde (invité) un bonus à jouer ; l'hôte spectate et pilotera l'avance
        DUEL._bonusEnCours=true;
        DUEL._bonusPendingAdvance=false; // l'invité n'avance jamais lui-même
        DUEL._stopTimer();
        DUEL._jouerMonBonus(msg.kind);
        break;

      case "bonus_end":
        // L'adversaire (actif) a fini son bonus.
        if(DUEL.isHost){
          // l'actif était l'invité → j'applique son gain à s2, puis je gère la reprise/avance
          if(DUEL.gs && msg.gain>0) DUEL.gs.s2=Math.max(0,(DUEL.gs.s2||0)+msg.gain);
          DUEL._finBonusSpectateur(msg.gain||0, false);
        } else {
          // je suis l'invité spectateur ; les scores arrivent via next/state_update
          DUEL._onBonusEnd(msg.gain||0, false);
        }
        break;

      case "hello":
        // Invité reçoit confirmation de l'hôte — connexion établie
        showToast("⚔️ Connecté à "+msg.nom+" !","win",2000);
        render();
        break;

      case "resync_req":
        // Un pair s'est reconnecté et demande l'état courant.
        // Le détenteur de l'état (généralement l'hôte) le renvoie.
        if(DUEL.gs){
          DUEL._send({type:"resync_state",
            gs:DUEL.gs,
            nom:S.nom||(DUEL.isHost?"Hôte":"Joueur"),
            icon:DUEL.isHost?"👑":"⚡",
            ecran:(S.ecran==="duel_resultat")?"duel_resultat":"duel_jeu"
          });
        }
        DUEL._reconnexionReussie();
        break;

      case "resync_state":
        // On reçoit l'état complet après reconnexion → on se réaligne.
        if(msg.gs) DUEL.gs=msg.gs;
        if(msg.nom){
          DUEL.adversaire={
            nom:msg.nom,
            couleur:(DUEL.adversaire&&DUEL.adversaire.couleur)||"#e05555",
            icon:msg.icon||(DUEL.adversaire&&DUEL.adversaire.icon)||"⚔️"
          };
        }
        if(msg.ecran==="duel_resultat") S.ecran="duel_resultat";
        else S.ecran="duel_jeu";
        DUEL._reconnexionReussie();
        break;

      case "join":
        // Hôte reçoit l'invité avec son nom
        DUEL.adversaire={nom:msg.nom||"Adversaire",couleur:"#e05555",icon:msg.icon||"⚔️"};
        DUEL._initGS();
        DUEL.gs.phase="selection";
        DUEL.gs.selJ1Done=false;
        DUEL.gs.selJ2Done=false;
        DUEL._send({type:"welcome",
          nom:S.nom||"Hôte",
          icon:"👑",
          gs:DUEL.gs
        });
        S.ecran="duel_jeu"; render();
        AUDIO.sfxStart();
        showToast("⚔️ "+DUEL.adversaire.nom+" a rejoint — c'est parti !","win",3000);
        break;

      case "welcome":
        // Invité reçoit confirmation + état de jeu
        DUEL.adversaire={nom:msg.nom||"Hôte",couleur:"#D4AF37",icon:msg.icon||"👑"};
        if(msg.gs){
          DUEL.gs=msg.gs;
          DUEL.gs.phase="selection";
        } else {
          DUEL._initGS();
          DUEL.gs.phase="selection";
        }
        S.ecran="duel_jeu"; render();
        AUDIO.sfxStart();
        showToast("⚔️ Duel commencé — sélectionnez vos cartes !","win",3000);
        break;

      case "sel_done":
        // L'adversaire a confirmé sa sélection
        if(DUEL.isHost){
          DUEL.gs.mainRepJ2=[...msg.main];
          DUEL.gs.mainJokJ2=[...msg.joks];
          DUEL.gs.selJ2Done=true;
        } else {
          DUEL.gs.mainRepJ1=[...msg.main];
          DUEL.gs.mainJokJ1=[...msg.joks];
          DUEL.gs.selJ1Done=true;
        }
        // Mémoriser qui a validé en premier (vient du message si pas encore connu localement)
        if(!DUEL.gs.premierValideur&&msg.premierValideur) DUEL.gs.premierValideur=msg.premierValideur;
        // Démarrer seulement si les deux ont confirmé
        if(DUEL.gs.selJ1Done&&DUEL.gs.selJ2Done){
          DUEL.gs.phase="choixBase";
          // Le premier à avoir validé devient l'attaquant de la manche 1
          var premVal=DUEL.gs.premierValideur||"host"; // fallback hôte si jamais absent
          DUEL.myTurn=(premVal==="host")?DUEL.isHost:(!DUEL.isHost);
          if(DUEL.isHost) DUEL._send({type:"start_game",premierValideur:premVal});
          // Supprimer l'overlay d'animation s'il est encore présent
          var ov=document.getElementById("deal-overlay");
          if(ov&&ov.parentNode) ov.parentNode.removeChild(ov);
          render();
        } else {
          render();
        }
        break;

      case "start_game":
        // L'hôte démarre — invité passe en choixBase
        DUEL.gs.phase="choixBase";
        if(msg.premierValideur) DUEL.gs.premierValideur=msg.premierValideur;
        // Le premier à avoir validé devient l'attaquant — l'invité regarde si c'est lui
        var prem=DUEL.gs.premierValideur||"host";
        DUEL.myTurn=(prem==="guest"); // invité attaque seulement s'il a validé en premier
        // Supprimer l'overlay d'animation s'il est encore présent
        var _ov=document.getElementById("deal-overlay");
        if(_ov&&_ov.parentNode) _ov.parentNode.removeChild(_ov);
        render();
        break;

      case "base1":
        // Quelqu'un a choisi son pilier d'attaque
        DUEL.gs.b1=msg.b1;
        DUEL.gs.phase="choixBase2";
        DUEL.gs.attaquant=msg.attaquant;
        // Celui qui reçoit base1 est celui qui doit répondre
        // = le joueur qui n'a PAS attaqué
        if(msg.attaquant){
          DUEL.myTurn=(msg.attaquant==="host")?((!DUEL.isHost)):(DUEL.isHost);
        } else {
          DUEL.myTurn=!DUEL.isHost; // fallback ancien comportement
        }
        render();
        break;

      case "base2":
        // J2 a choisi son pilier de réponse
        DUEL.gs.b2=msg.b2;
        DUEL.gs.cb=[DUEL.gs.b1,msg.b2].sort().join("+");
        DUEL.gs.phase="afficheBases";
        DUEL.gs.repJ1=null; DUEL.gs.repJ2=null;
        DUEL.gs.jokerJ1=null; DUEL.gs.jokerJ2=null;
        DUEL._jokerArme=null;
        DUEL.myTurn=true; // les deux jouent
        DUEL._startTimer(20);
        render();
        break;

      case "rep":
        if(!DUEL.gs) break;
        if(DUEL.isHost){
          DUEL.gs.repJ2=msg.rep||0; // 0 = passe (pas null pour que _checkBothPlayed le détecte)
          if(msg.rep&&DUEL.gs.mainRepJ2) DUEL.gs.mainRepJ2=DUEL.gs.mainRepJ2.filter(function(x){return x.id!==msg.rep.id;});
        } else {
          DUEL.gs.repJ1=msg.rep||0;
          if(msg.rep&&DUEL.gs.mainRepJ1) DUEL.gs.mainRepJ1=DUEL.gs.mainRepJ1.filter(function(x){return x.id!==msg.rep.id;});
        }
        DUEL._checkBothPlayed();
        break;

      case "joker_final":
        // L'adversaire a pris sa décision de joker offensif (après révélation)
        if(!DUEL.gs) break;
        if(DUEL.isHost){
          if(msg.joker){ DUEL.gs.jokerJ2=msg.joker; DUEL.gs.mainJokJ2=(DUEL.gs.mainJokJ2||[]).filter(function(x){return x.id!==msg.joker;}); }
          DUEL.gs.jokDecidJ2=true;
        } else {
          if(msg.joker){ DUEL.gs.jokerJ1=msg.joker; DUEL.gs.mainJokJ1=(DUEL.gs.mainJokJ1||[]).filter(function(x){return x.id!==msg.joker;}); }
          DUEL.gs.jokDecidJ1=true;
        }
        if(msg.joker){
          var _p1=(DUEL.gs.repJ1&&DUEL.gs.repJ1.pts)?DUEL.gs.repJ1.pts:0;
          var _p2=(DUEL.gs.repJ2&&DUEL.gs.repJ2.pts)?DUEL.gs.repJ2.pts:0;
          var _totF=_p1+_p2, _gainF=msg.joker==="j1"?_totF:_totF*2;
          var _jkF=JOKERS.find(function(x){return x.id===msg.joker;});
          if(_jkF) showJokerOverlay(_jkF,_gainF,"adversaire",null);
        }
        render();
        DUEL._verifierResolution();
        break;

      case "state_update":
        if(!DUEL.isHost&&msg.gs){
          // Je reste maître de MA main de jokers : un joker que j'ai utilisé ne doit pas revenir
          var _monJok=(DUEL.gs&&DUEL.gs.mainJokJ2)?DUEL.gs.mainJokJ2:msg.gs.mainJokJ2;
          DUEL.gs=msg.gs;
          DUEL.gs.mainJokJ2=_monJok;
          render();
          // Secours invité : pure sécurité anti-blocage (long), l'hôte pilote le vrai timing.
          // Ne PAS couper court à une éventuelle décision de joker.
          if(DUEL._nextRoundInt) clearTimeout(DUEL._nextRoundInt);
          DUEL._nextRoundInt=setTimeout(function(){
            DUEL._nextRoundInt=null;
            // Anti-blocage : on NE recalcule PAS la manche nous-mêmes (risque de double-score/désync).
            // On demande l'état à jour à l'hôte, qui est autoritaire.
            if(DUEL.gs&&(DUEL.gs.phase==="apresReponses"||DUEL.gs.phase==="fin")) DUEL._send({type:"resync_req"});
          },12000);
        }
        break;

      case "next":
        // Manche suivante — annuler le décompte invité
        if(DUEL._nextRoundInt){ clearInterval(DUEL._nextRoundInt); DUEL._nextRoundInt=null; }
    if(DUEL._selCountdownInt){ clearInterval(DUEL._selCountdownInt); DUEL._selCountdownInt=null; }
        DUEL.gs.manche=msg.manche;
        DUEL.gs.phase=msg.phase||"choixBase";
        DUEL.gs.b1=null; DUEL.gs.b2=null; DUEL.gs.cb=null;
        DUEL.gs.repJ1=null; DUEL.gs.repJ2=null;
        DUEL.gs.jokerJ1=null; DUEL.gs.jokerJ2=null;
        DUEL._jokerArme=null;
        if(msg.attaquantCourant) DUEL.gs.attaquantCourant=msg.attaquantCourant;
        DUEL.myTurn=msg.j1Tour?DUEL.isHost:!DUEL.isHost;
        render();
        break;

      case "fin":
        if(DUEL._nextRoundInt){ clearTimeout(DUEL._nextRoundInt); DUEL._nextRoundInt=null; }
        DUEL.gs.s1=msg.s1; DUEL.gs.s2=msg.s2;
        DUEL._recompenses(DUEL.isHost?msg.s1:msg.s2, DUEL.isHost?msg.s2:msg.s1, msg.statsAdv||null);
        S.ecran="duel_resultat"; render();
        break;

      case "rejouer":
        // Reçu par l'invité : l'hôte a lancé une revanche avec un nouveau pool partagé
        if(msg.gs){
          DUEL.gs=msg.gs;
          DUEL.gs.phase="selection";
        } else {
          DUEL._initGS();
          DUEL.gs.phase="selection";
        }
        DUEL._recompensesFaites=false;
        S.ecran="duel_jeu"; render();
        showToast("🔄 Revanche !","win",2000);
        break;
    }
  },

  // ── Timer ──
  _timerInt:null, _timerSec:0,
  _startTimer(sec){
    if(DUEL._timerInt) clearInterval(DUEL._timerInt);
    // ── Auto-passe immédiate : aucune carte valide + pas d'Échange → passer (comme le Solo) ──
    var _gs=DUEL.gs;
    if(_gs && _gs.cb && !DUEL._myRepPlayed()){
      var _maMain=DUEL.isHost?_gs.mainRepJ1:_gs.mainRepJ2;
      var _valides=_maMain?_maMain.filter(function(c){return c.combo===_gs.cb;}):[];
      var _aEchange=DUEL._mesJoks().some(function(x){return x.id==="j4";});
      if(_valides.length===0 && !_aEchange){
        showToast("⚠️ Aucune carte valide — passage automatique","info",1600);
        setTimeout(function(){
          if(DUEL.gs&&DUEL.gs.phase==="afficheBases"&&!DUEL._myRepPlayed()) DUEL.jouerCarte(null);
        },700);
        return; // pas de timer classique
      }
    }
    DUEL._timerSec=sec||20;
    DUEL._updateTimer();
    DUEL._timerInt=setInterval(function(){
      DUEL._timerSec--;
      DUEL._updateTimer();
      if(DUEL._timerSec<=0){
        clearInterval(DUEL._timerInt);
        DUEL._timerInt=null;
        // Passer automatiquement si pas encore joué
        if(DUEL.gs&&DUEL.gs.phase==="afficheBases"&&!DUEL._myRepPlayed()){
          DUEL.jouerCarte(null);
        }
      }
    },1000);
  },
  _stopTimer(){
    if(DUEL._timerInt){ clearInterval(DUEL._timerInt); DUEL._timerInt=null; }
    DUEL._timerSec=0;
    DUEL._updateTimer();
  },
  _updateTimer(){
    var el=document.getElementById("duel-timer");
    if(!el) return;
    var s=DUEL._timerSec;
    var col=s<=5?"#e05555":s<=10?"#FFA500":"#45c97a";
    el.innerHTML=s>0
      ?'<div style="display:flex;align-items:center;gap:8px;justify-content:center">'
        +'<div style="font-size:26px;font-weight:900;color:'+col+';font-family:Cinzel,serif">'+s+'</div>'
        +'<div style="flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,0.1)">'
        +'<div style="height:100%;border-radius:3px;background:'+col+';width:'+(s/20*100)+'%;transition:width 1s linear"></div>'
        +'</div></div>'
      :'';
  },

  // ── Ma réponse déjà jouée ? ──
  _myRepPlayed(){
    return DUEL.isHost
      ? DUEL.gs.repJ1!==undefined && DUEL.gs.repJ1!==null && DUEL.gs.repJ1!==false
      : DUEL.gs.repJ2!==undefined && DUEL.gs.repJ2!==null && DUEL.gs.repJ2!==false;
  },

  // ── Confirmer sélection cartes ──
  confirmerSel(){
    var gs=DUEL.gs;
    DUEL._recompensesFaites=false;
    var myMain=DUEL.isHost?gs.mainRepJ1:gs.mainRepJ2;
    var myJoks=DUEL.isHost?gs.mainJokJ1:gs.mainJokJ2;
    if(myMain.length<10){ showToast("⚠️ Choisissez 10 cartes","info",2000); return; }
    AUDIO.sfxConfirm();
    // Marquer MA sélection comme faite
    if(DUEL.isHost) gs.selJ1Done=true;
    else gs.selJ2Done=true;
    // Le PREMIER joueur à valider devient l'attaquant de la manche 1
    if(!gs.premierValideur) gs.premierValideur=DUEL.isHost?"host":"guest";
    // Envoyer MES cartes IMMÉDIATEMENT avant l'animation (+ qui a validé en 1er)
    DUEL._send({type:"sel_done",main:myMain,joks:myJoks,premierValideur:gs.premierValideur});
    // Vérifier si les DEUX sont déjà prêts (l'adversaire a peut-être validé avant moi)
    if(gs.selJ1Done&&gs.selJ2Done&&gs.phase!=="choixBase"&&gs.phase!=="choixBase2"&&gs.phase!=="afficheBases"){
      gs.phase="choixBase";
      var premVal2=gs.premierValideur||"host";
      DUEL.myTurn=(premVal2==="host")?DUEL.isHost:(!DUEL.isHost);
      if(DUEL.isHost) DUEL._send({type:"start_game",premierValideur:premVal2});
    }
    // Animation distribution des cartes
    showCardDealAnimation(myMain, function(){
      // Après animation : si les deux sont prêts → piliers actifs
      if(gs.phase==="choixBase"||gs.phase==="choixBase2"||gs.phase==="afficheBases"){
        render(); // Afficher directement les piliers
      } else {
        // En attente de l'adversaire — spinner discret
        gs.phase="selAttente";
        render();
        showToast("⏳ En attente de l\'adversaire…","info",2500);
      }
    });
  },

  toggleSel(id){
    var gs=DUEL.gs; if(!gs) return;
    var pool=DUEL.isHost?gs.allRepJ1:gs.allRepJ2;
    var main=DUEL.isHost?gs.mainRepJ1:gs.mainRepJ2;
    var idx=main.findIndex(function(c){return c.id===id;});
    if(idx>=0){
      main.splice(idx,1);
      if(DUEL._selCountdownInt){ clearInterval(DUEL._selCountdownInt); DUEL._selCountdownInt=null; }
    } else if(main.length<10){
      var carte=pool.find(function(x){return x.id===id;});
      if(carte){
        main.push(carte);
        // Son + vibration à la 10e carte
        if(main.length===10) AUDIO.sfx10eme();
        else AUDIO.sfxClick();
      }
    }
    render();
  },

  // ── Choisir pilier ──
  choisirBase(pilier){
    var gs=DUEL.gs; if(!gs) return;
    if(gs.phase!=="choixBase"&&gs.phase!=="choixBase2") return;
    // En choixBase : seul le joueur dont c'est le tour (l'attaquant) peut choisir → impose l'alternance
    if(gs.phase==="choixBase" && !DUEL.myTurn){
      showToast("⏳ Ce n'est pas à toi de choisir le pilier — c'est au tour de "+((DUEL.adversaire&&DUEL.adversaire.nom)||"l'adversaire"),"info",1800);
      return;
    }
    // En choixBase2 : seul le répondant peut jouer (pas celui qui a attaqué)
    if(gs.phase==="choixBase2"){
      var jAttaquant=(gs.attaquant==="host")?DUEL.isHost:(!DUEL.isHost);
      if(jAttaquant) return; // l'attaquant ne peut pas aussi répondre
    }
    if(!PILIER[pilier]) return;
    AUDIO.sfxClick();
    if(gs.phase==="choixBase"){
      gs.b1=pilier; gs.phase="choixBase2";
      gs.attaquant=DUEL.isHost?"host":"guest"; // mémoriser qui a attaqué
      DUEL.myTurn=false;
      DUEL._send({type:"base1",b1:pilier,attaquant:gs.attaquant});
      render(); // ne pas appeler _onMsg localement (évite confusion myTurn)
    } else if(gs.phase==="choixBase2"){
      if(pilier===gs.b1) return; // même pilier interdit
      // Refuser un pilier en impasse (aucune carte du combo) si j'ai la couleur ailleurs
      var _mm=DUEL.isHost?gs.mainRepJ1:gs.mainRepJ2;
      var _aCoul=PILIERS.some(function(q){return q!==gs.b1 && _mm.some(function(c){return c.combo===mkCombo(gs.b1,q);});});
      if(_aCoul && !_mm.some(function(c){return c.combo===mkCombo(gs.b1,pilier);})){
        showToast("Aucune carte "+gs.b1+"+"+pilier+" — choisis un pilier où tu as une carte","info",2200);
        return;
      }
      gs.b2=pilier;
      gs.cb=[gs.b1,pilier].sort().join("+");
      gs.phase="afficheBases";
      gs.repJ1=null; gs.repJ2=null;
      gs.jokerJ1=null; gs.jokerJ2=null;
      DUEL._jokerArme=null;
      DUEL.myTurn=true; // les deux peuvent jouer leurs cartes
      DUEL._send({type:"base2",b2:pilier});
      render(); // ne pas appeler _onMsg localement
      DUEL._startTimer(20);
    }
    render();
  },

  // ── Jouer une carte réponse ──
  jouerCarte(carte){
    var gs=DUEL.gs; if(!gs||gs.phase!=="afficheBases") return;
    if(DUEL._myRepPlayed()) return;
    DUEL._stopTimer();
    if(carte){
      AUDIO.sfxCard();
      if(DUEL.isHost) gs.mainRepJ1=gs.mainRepJ1.filter(function(x){return x.id!==carte.id;});
      else gs.mainRepJ2=gs.mainRepJ2.filter(function(x){return x.id!==carte.id;});
    }
    var rep=carte?{pts:carte.pts,id:carte.id,name:carte.name,combo:carte.combo,cit:carte.cit}:null;
    if(DUEL.isHost) gs.repJ1=rep||0;
    else gs.repJ2=rep||0;
    DUEL._send({type:"rep",rep:rep});
    DUEL._checkBothPlayed();
    render();
  },

  // Jouer par ID — appelé depuis le onclick HTML (évite les problèmes de référence)
  jouerCarteById(id){
    var gs=DUEL.gs; if(!gs) return;
    var main=DUEL.isHost?gs.mainRepJ1:gs.mainRepJ2;
    var carte=main?main.find(function(x){return x.id===id;}):null;
    // Si pas dans la main (déjà retirée), chercher dans allRep
    if(!carte){
      var pool=DUEL.isHost?gs.allRepJ1:gs.allRepJ2;
      carte=pool?pool.find(function(x){return x.id===id;}):null;
    }
    DUEL.jouerCarte(carte||null);
  },

  // ── Vérifier si les deux ont joué ──
  _checkBothPlayed(){
    var gs=DUEL.gs; if(!gs) return;
    var j1Done=gs.repJ1!==null&&gs.repJ1!==undefined;
    var j2Done=gs.repJ2!==null&&gs.repJ2!==undefined;
    if(j1Done&&j2Done){
      DUEL._stopTimer();
      if(DUEL._safetyTimeout){ clearTimeout(DUEL._safetyTimeout); DUEL._safetyTimeout=null; }
      gs.phase="apresReponses";
      // Décision joker offensif (Brakeur/Multi) après révélation, comme le Solo :
      // un joueur sans Brakeur/Multi est auto-décidé (pas de choix à faire).
      gs.jokDecidJ1=!DUEL._hasOffensive(1);
      gs.jokDecidJ2=!DUEL._hasOffensive(2);
      // Broadcaster l'état aux deux joueurs
      if(DUEL.isHost) DUEL._send({type:"state_update",gs:gs});
      render();
      // L'hôte résout quand les deux ont décidé (avec garde-fou anti-blocage)
      DUEL._verifierResolution();
    } else {
      render();
      // Timeout de sécurité : si bloqué 30s → forcer passage
      if(DUEL.isHost && !DUEL._safetyTimeout){
        DUEL._safetyTimeout=setTimeout(function(){
          DUEL._safetyTimeout=null;
          if(DUEL.gs&&DUEL.gs.phase==="afficheBases"){
            if(!j1Done) gs.repJ1=0;
            if(!j2Done) gs.repJ2=0;
            DUEL._checkBothPlayed();
          }
        },30000);
      }
    }
  },
  _safetyTimeout:null,
  _nextRoundInt:null,

  _selCountdownInt:null,
  _startSelCountdown(){
    if(DUEL._selCountdownInt) clearInterval(DUEL._selCountdownInt);
    var sec=3;
    var el=document.getElementById("duel-sel-sec");
    if(el) el.textContent=sec;
    DUEL._selCountdownInt=setInterval(function(){
      sec--;
      var el=document.getElementById("duel-sel-sec");
      if(el) el.textContent=sec;
      if(sec<=0){
        clearInterval(DUEL._selCountdownInt);
        DUEL._selCountdownInt=null;
        // Vérifier encore que 10 cartes sont bien sélectionnées
        var myMain=DUEL.isHost?DUEL.gs.mainRepJ1:DUEL.gs.mainRepJ2;
        if(myMain.length>=10) DUEL.confirmerSel();
      }
    },1000);
  },

  _startNextRoundCountdown(sec){
    if(DUEL._nextRoundInt) clearTimeout(DUEL._nextRoundInt);
    if(DUEL._tickInt) clearTimeout(DUEL._tickInt);
    var delay=(sec||1.5)*1000;
    // Ticker visuel
    var remaining=sec||1.5;
    var el=document.getElementById("next-sec");
    if(el) el.textContent=Math.ceil(remaining);
    var tick=function(){
      remaining--;
      var el=document.getElementById("next-sec");
      if(el) el.textContent=Math.max(0,Math.ceil(remaining));
      if(remaining>0) DUEL._tickInt=setTimeout(tick,1000);
    };
    DUEL._tickInt=setTimeout(tick,1000);
    // Déclenchement mancheSuivante
    DUEL._nextRoundInt=setTimeout(function(){
      DUEL._nextRoundInt=null;
      if(DUEL.isHost&&DUEL.gs&&(DUEL.gs.phase==="apresReponses"||DUEL.gs.phase==="fin")) DUEL._mancheSuivante();
    },delay);
  },

  // ── Manche suivante ──
  _mancheSuivante(){
    if(DUEL._bonusEnCours) return; // un bonus est en cours → ne pas recalculer/avancer
    var gs=DUEL.gs; if(!gs) return;
    // Calculer résultat avec pénalité passe
    var j1Passe=!gs.repJ1||gs.repJ1===0||gs.repJ1.pts===0;
    var j2Passe=!gs.repJ2||gs.repJ2===0||gs.repJ2.pts===0;
    var p1=gs.repJ1&&gs.repJ1.pts?gs.repJ1.pts:0;
    var p2=gs.repJ2&&gs.repJ2.pts?gs.repJ2.pts:0;
    var tot=p1+p2;
    // ── Jokers offensifs (Brakeur j1 = tout le pot ; Multiplicateur j2 = pot ×2) ──
    var jk1=gs.jokerJ1||null, jk2=gs.jokerJ2||null;
    if(jk1||jk2){
      var v1=jk1==="j1"?tot:(jk1==="j2"?tot*2:null);
      var v2=jk2==="j1"?tot:(jk2==="j2"?tot*2:null);
      if(v1!==null&&v2!==null){ gs.s1+=v1; gs.s2+=v2; } // les deux jouent → chacun encaisse
      else if(v1!==null){ gs.s1+=v1; }                  // J1 rafle le pot
      else { gs.s2+=v2; }                               // J2 rafle le pot
    }
    else if(j1Passe&&j2Passe){
      // Les deux passent → -5 pts chacun
      gs.s1=Math.max(0,gs.s1-5); gs.s2=Math.max(0,gs.s2-5);
    } else if(j1Passe&&!j2Passe){
      // J1 passe → J2 gagne pts + 5 bonus, J1 -5
      gs.s2+=p2+5; gs.s1=Math.max(0,gs.s1-5);
    } else if(!j1Passe&&j2Passe){
      // J2 passe → J1 gagne pts + 5 bonus, J2 -5
      gs.s1+=p1+5; gs.s2=Math.max(0,gs.s2-5);
    } else if(p1>p2){ gs.s1+=tot; }
    else if(p2>p1){ gs.s2+=tot; }
    // égalité → personne ne gagne

    // ── Gagnant de la manche + suivi des stats (l'hôte suit les 2 joueurs) ──
    var gagnant=0;
    if(jk1||jk2){
      var g1=(jk1==="j1"?tot:(jk1==="j2"?tot*2:0));
      var g2=(jk2==="j1"?tot:(jk2==="j2"?tot*2:0));
      gagnant=g1>g2?1:(g2>g1?2:0);
    } else if(j1Passe&&j2Passe){ gagnant=0; }
    else if(j1Passe){ gagnant=2; }
    else if(j2Passe){ gagnant=1; }
    else if(p1>p2){ gagnant=1; }
    else if(p2>p1){ gagnant=2; }
    if(DUEL.isHost && DUEL._stats){
      DUEL._suiviStats(1, gagnant===1, gs.b1, jk1, p1);
      DUEL._suiviStats(2, gagnant===2, gs.b2, jk2, p2);
    }

    // ── Décision de bonus (hôte, espacé : au moins 3 manches d'écart, destinataire au hasard) ──
    var _ecartBonus=gs.derniereMancheBonus?(gs.manche-gs.derniereMancheBonus):99;
    if(DUEL.isHost && !DUEL._bonusEnCours && gs.manche < gs.total && _ecartBonus>=3 && Math.random() < 0.35){
      gs.derniereMancheBonus=gs.manche;
      var _bkind=(gs.manche%2===0)?"sage":"question"; // alterne comme le Solo
      var _bpour=(Math.random()<0.5)?1:2;             // 1=hôte(J1), 2=invité(J2)
      DUEL._lancerBonusDuel(_bkind,_bpour);
      return; // l'avance se fera à la FIN du bonus
    }
    DUEL._avancerManche();
  },

  // Avance réellement à la manche suivante (ou déclenche la fin de partie).
  _avancerManche(){
    var gs=DUEL.gs; if(!gs) return;
    gs.manche++;
    if(gs.manche>gs.total){
      // Fin de partie
      gs.phase="fin";
      DUEL._send({type:"fin",s1:gs.s1,s2:gs.s2,statsAdv:(DUEL._stats?DUEL._stats.j2:null)});
      // Sauvegarder historique duel
      if(!S.historiqueParties) S.historiqueParties=[];
      var _monS=DUEL.isHost?gs.s1:gs.s2;
      var _advS=DUEL.isHost?gs.s2:gs.s1;
      S.historiqueParties.unshift({
        date:new Date().toLocaleDateString('fr-FR'),
        s1:_monS, s2:_advS,
        gagne:_monS>_advS,
        diff:"Duel 1v1",
        manches:gs.total,
        mode:"duel"
      });
      if(S.historiqueParties.length>10) S.historiqueParties.pop();
      sauvegarder();
      DUEL._recompenses(DUEL.isHost?gs.s1:gs.s2, DUEL.isHost?gs.s2:gs.s1, DUEL._stats?DUEL._stats.j1:null);
      S.ecran="duel_resultat"; render();
      return;
    }
    gs.phase="choixBase";
    gs.b1=null; gs.b2=null; gs.cb=null;
    gs.repJ1=null; gs.repJ2=null;
    gs.jokerJ1=null; gs.jokerJ2=null;
    DUEL._jokerArme=null;
    // Alternance STRICTE : on inverse explicitement qui a « la main » par rapport à la manche précédente.
    // (stocké dans gs → survit aux resyncs/reconnexions)
    if(!gs.attaquantCourant) gs.attaquantCourant=(gs.premierValideur||"host"); // référence = attaquant manche 1
    gs.attaquantCourant=(gs.attaquantCourant==="host")?"guest":"host";          // on passe la main à l'autre
    var j1Tour=(gs.attaquantCourant==="host");
    DUEL.myTurn=j1Tour?DUEL.isHost:!DUEL.isHost;
    DUEL._send({type:"next",manche:gs.manche,phase:"choixBase",j1Tour:j1Tour,attaquantCourant:gs.attaquantCourant});
    render();
  },

  // Revanche : SEUL l'hôte génère le nouveau pool de 24 cartes et l'envoie,
  // pour que les deux joueurs partagent EXACTEMENT le même tirage (split 12/12).
  lancerRevanche(){
    if(!DUEL.isHost) return;
    DUEL._initGS();
    DUEL.gs.phase="selection";
    DUEL.gs.selJ1Done=false;
    DUEL.gs.selJ2Done=false;
    DUEL._recompensesFaites=false;
    DUEL._send({type:"rejouer", gs:DUEL.gs});
    S.ecran="duel_jeu"; render();
    showToast("🔄 Revanche !","win",2000);
  },

  quitter(){
    DUEL._quitVolontaire=true;
    DUEL._stopRecon();
    DUEL._cacherSuspension();
    DUEL._stopTimer();
    DUEL._reset();
    effacerDuelEnCours(); // quitté volontairement
    S.ecran="menu"; render();
    DUEL._quitVolontaire=false;
  },
};

// ════════════════════════════════════════════════
// DUEL — BARRE DE DISCUSSION (chat entre les 2 joueurs)
// Widget persistant hors de #app (non effacé par render()).
// ════════════════════════════════════════════════
DUEL._chatMsgs = [];
DUEL._chatOpen = false;
DUEL._chatUnread = 0;
Object.assign(DUEL, {
  _envoiEmojis:["👍","😂","🔥","😮","😅","GG","🍀","💀"],

  sendChat(text){
    text=(text||"").toString().trim().slice(0,200);
    if(!text) return;
    DUEL._chatMsgs.push({mine:true,text:text});
    if(DUEL._chatMsgs.length>60) DUEL._chatMsgs.shift();
    DUEL._send({type:"chat",text:text});
    if(AUDIO.sfxClick) AUDIO.sfxClick();
    DUEL._renderChatMsgs(true);
  },

  _envoiSaisie(){
    var inp=document.getElementById("duel-chat-input");
    if(!inp) return;
    DUEL.sendChat(inp.value);
    inp.value="";
    inp.focus();
  },

  _recevoirChat(text){
    text=(text||"").toString().slice(0,200);
    if(!text) return;
    DUEL._chatMsgs.push({mine:false,text:text});
    if(DUEL._chatMsgs.length>60) DUEL._chatMsgs.shift();
    if(!DUEL._chatOpen){
      DUEL._chatUnread++;
      var nom=DUEL.adversaire?DUEL.adversaire.nom:"Adversaire";
      showToast("💬 "+nom+" : "+text,"info",2600);
    }
    DUEL._ensureChatUI();
    DUEL._renderChatMsgs(true);
    DUEL._majBadge();
  },

  _toggleChat(){
    DUEL._chatOpen=!DUEL._chatOpen;
    if(DUEL._chatOpen) DUEL._chatUnread=0;
    var panel=document.getElementById("duel-chat-panel");
    var btn=document.getElementById("duel-chat-btn");
    if(panel) panel.style.display=DUEL._chatOpen?"flex":"none";
    if(btn) btn.textContent=DUEL._chatOpen?"✕":"💬";
    DUEL._majBadge();
    if(DUEL._chatOpen){
      DUEL._renderChatMsgs(true);
      var inp=document.getElementById("duel-chat-input");
      if(inp) setTimeout(function(){ try{inp.focus();}catch(e){} },60);
    }
  },

  _majBadge(){
    var b=document.getElementById("duel-chat-badge");
    if(!b) return;
    if(DUEL._chatUnread>0 && !DUEL._chatOpen){
      b.textContent=DUEL._chatUnread>9?"9+":DUEL._chatUnread;
      b.style.display="flex";
    } else { b.style.display="none"; }
  },

  _renderChatMsgs(scroll){
    var box=document.getElementById("duel-chat-msgs");
    if(!box) return;
    if(DUEL._chatMsgs.length===0){
      box.innerHTML='<div style="text-align:center;color:var(--muted);font-size:11px;padding:16px 8px">Aucun message.<br>Dis bonjour à ton adversaire 👋</div>';
    } else {
      box.innerHTML=DUEL._chatMsgs.map(function(m){
        var esc=m.text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        if(m.mine){
          return '<div style="align-self:flex-end;max-width:80%;background:linear-gradient(135deg,#6b4fb0,#3d2b7d);color:#fff;padding:6px 10px;border-radius:12px 12px 3px 12px;font-size:13px;word-break:break-word">'+esc+'</div>';
        }
        return '<div style="align-self:flex-start;max-width:80%;background:rgba(255,255,255,0.1);color:#fff;padding:6px 10px;border-radius:12px 12px 12px 3px;font-size:13px;word-break:break-word">'+esc+'</div>';
      }).join("");
    }
    if(scroll) box.scrollTop=box.scrollHeight;
  },

  _ensureChatUI(){
    if(document.getElementById("duel-chat")) return;
    var advNom=DUEL.adversaire?DUEL.adversaire.nom:"Adversaire";
    var wrap=document.createElement("div");
    wrap.id="duel-chat";
    wrap.style.cssText="position:fixed;right:10px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:9990;display:flex;flex-direction:column;align-items:flex-end;gap:8px";
    // Panneau
    var quick=DUEL._envoiEmojis.map(function(e){
      return '<button onclick="DUEL.sendChat(&quot;'+e+'&quot;)" style="border:none;background:rgba(255,255,255,0.08);border-radius:8px;padding:4px 8px;font-size:15px;cursor:pointer;color:#fff">'+e+'</button>';
    }).join("");
    wrap.innerHTML=
      '<div id="duel-chat-panel" style="display:none;flex-direction:column;width:min(72vw,260px);height:min(40vh,300px);'
      +'background:linear-gradient(160deg,#1a0a35,#0c0620);border:1.5px solid var(--gold);border-radius:16px;'
      +'box-shadow:0 8px 30px rgba(0,0,0,0.6);overflow:hidden">'
        +'<div style="padding:10px 12px;background:rgba(212,175,55,0.12);border-bottom:1px solid rgba(212,175,55,0.3);'
        +'font-family:Cinzel,serif;font-size:13px;font-weight:700;color:var(--goldL);display:flex;align-items:center;gap:6px">'
        +'💬 Discussion — <span style="color:#fff">'+advNom.replace(/</g,"&lt;")+'</span></div>'
        +'<div id="duel-chat-msgs" style="flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch"></div>'
        +'<div style="display:flex;gap:5px;flex-wrap:wrap;padding:6px 8px;border-top:1px solid rgba(255,255,255,0.08)">'+quick+'</div>'
        +'<div style="display:flex;gap:6px;padding:8px;border-top:1px solid rgba(255,255,255,0.08)">'
        +'<input id="duel-chat-input" maxlength="200" placeholder="Message…" '
        +'style="flex:1;min-width:0;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);'
        +'border-radius:10px;padding:9px 12px;color:#fff;font-size:14px;outline:none" '
        +'onkeydown="if(event.key===&quot;Enter&quot;){event.preventDefault();DUEL._envoiSaisie();}">'
        +'<button onclick="DUEL._envoiSaisie()" style="border:none;background:linear-gradient(135deg,var(--gold),var(--goldL));'
        +'color:#12082e;font-weight:800;border-radius:10px;padding:0 16px;cursor:pointer;font-size:14px">➤</button>'
        +'</div>'
      +'</div>'
      +'<button id="duel-chat-btn" onclick="DUEL._toggleChat()" style="position:relative;width:52px;height:52px;border-radius:50%;'
      +'border:1.5px solid var(--gold);background:linear-gradient(135deg,#6b4fb0,#3d2b7d);color:#fff;font-size:22px;cursor:pointer;'
      +'box-shadow:0 4px 16px rgba(0,0,0,0.5)">💬'
      +'<span id="duel-chat-badge" style="display:none;position:absolute;top:-4px;right:-4px;min-width:20px;height:20px;'
      +'border-radius:10px;background:#e05555;color:#fff;font-size:11px;font-weight:800;align-items:center;justify-content:center;padding:0 5px">0</span>'
      +'</button>';
    document.body.appendChild(wrap);
    DUEL._chatOpen=false;
    DUEL._renderChatMsgs(false);
    DUEL._majBadge();
    // Fermer le chat dès qu'on touche ailleurs sur l'écran
    if(!DUEL._chatOutside){
      DUEL._chatOutside=function(e){
        if(!DUEL._chatOpen) return;
        var dansLeChat = e.target && e.target.closest && e.target.closest("#duel-chat");
        if(dansLeChat) return; // on a touché dans le chat → ne pas fermer
        DUEL._toggleChat();    // touché ailleurs → fermer
      };
      document.addEventListener("pointerdown", DUEL._chatOutside, true);
    }
  },

  _removeChatUI(){
    var w=document.getElementById("duel-chat");
    if(w) w.remove();
    if(DUEL._chatOutside){ document.removeEventListener("pointerdown", DUEL._chatOutside, true); DUEL._chatOutside=null; }
  },

  _resetChat(){
    DUEL._chatMsgs=[]; DUEL._chatOpen=false; DUEL._chatUnread=0;
    DUEL._removeChatUI();
  }
});

// ════════════════════════════════════════════════
// DUEL — PAUSE + ÉCRAN SPECTATEUR pendant un bonus
//   Le joueur actif fait son bonus ; l'adversaire attend
//   sans que rien ne s'annule. Anti-blocage (45 s) inclus.
//   (Le bonus factice ci-dessous sert à TESTER le mécanisme ;
//    il sera remplacé par les vrais bonus Sage/Question.)
// ════════════════════════════════════════════════
Object.assign(DUEL, {
  _bonusEnCours:false,
  _bonusWatchTO:null,

  _ensureSpectateUI(){
    if(document.getElementById("duel-spectate")) return;
    var d=document.createElement("div");
    d.id="duel-spectate";
    d.style.cssText="position:fixed;inset:0;z-index:9200;display:none;align-items:center;justify-content:center;"
      +"padding:24px;background:radial-gradient(circle at 50% 38%,rgba(45,27,105,0.93),rgba(7,3,18,0.97))";
    d.innerHTML='<div style="max-width:340px;text-align:center;color:#fff;font-family:\'Crimson Text\',serif">'
      +'<div id="duel-spectate-emoji" style="font-size:66px;margin-bottom:14px">🔮</div>'
      +'<div id="duel-spectate-titre" style="font-family:\'Cinzel\',serif;font-size:21px;font-weight:900;color:#D4AF37;margin-bottom:10px">Bonus de l\'adversaire</div>'
      +'<div id="duel-spectate-txt" style="font-size:16px;opacity:0.9;line-height:1.55"></div>'
      +'<div style="margin-top:20px;font-size:13px;opacity:0.6">⏳ La partie reprend juste après…</div>'
      +'</div>';
    document.body.appendChild(d);
  },
  _showSpectate(who, kind){
    DUEL._ensureSpectateUI();
    var q=(kind==="question");
    var e=document.getElementById("duel-spectate-emoji"); if(e) e.textContent=q?"❓":"🔮";
    var t=document.getElementById("duel-spectate-titre"); if(t) t.textContent=q?"Bonus Question de l'adversaire":"Bonus du Sage de l'adversaire";
    var x=document.getElementById("duel-spectate-txt");
    if(x) x.innerHTML=(who||"Ton adversaire")+" joue son "+(q?"Bonus Question":"Bonus du Sage")+".<br>Patiente, tu ne perds rien.";
    document.getElementById("duel-spectate").style.display="flex";
  },
  _hideSpectate(){
    var d=document.getElementById("duel-spectate"); if(d) d.style.display="none";
  },

  // Spectateur : l'adversaire ENTRE dans un bonus
  _onBonusStart(who, kind){
    DUEL._bonusEnCours=true;
    DUEL._stopTimer();
    if(DUEL._nextRoundInt){ clearTimeout(DUEL._nextRoundInt); DUEL._nextRoundInt=null; }
    DUEL._showSpectate(who, kind);
    if(DUEL._bonusWatchTO) clearTimeout(DUEL._bonusWatchTO);
    DUEL._bonusWatchTO=setTimeout(function(){
      if(DUEL.isHost) DUEL._finBonusSpectateur(0,true); else DUEL._onBonusEnd(0,true);
    }, 45000); // anti-blocage : ne jamais rester coincé si l'actif se déconnecte
  },
  // Spectateur : l'adversaire a FINI
  _onBonusEnd(gain, timeout){
    if(DUEL._bonusWatchTO){ clearTimeout(DUEL._bonusWatchTO); DUEL._bonusWatchTO=null; }
    DUEL._bonusEnCours=false;
    DUEL._hideSpectate();
    if(!timeout && gain>0) showToast("✨ Bonus adverse : +"+gain+" pts","info",2400);
    render();
  },
  _removeBonusUI(){
    DUEL._bonusEnCours=false;
    if(DUEL._bonusWatchTO){ clearTimeout(DUEL._bonusWatchTO); DUEL._bonusWatchTO=null; }
    ["duel-spectate","duel-mybonus"].forEach(function(id){ var el=document.getElementById(id); if(el) el.remove(); });
  },

  // Déclencheur de TEST : joue un VRAI bonus (Sage/Question) pour moi ; l'adversaire spectate.
  // (Servira de base au déclenchement automatique en fin de manche.)
  _testBonus(kind){
    kind=(kind==="question")?"question":"sage";
    if(!DUEL.conn){ showToast("Duel non connecté","info",1500); return; }
    if(DUEL._bonusEnCours||DUEL._monBonusActif) return;
    DUEL._chatOpen=false; var p=document.getElementById("duel-chat-panel"); if(p) p.style.display="none";
    DUEL._bonusEnCours=true;
    DUEL._bonusPendingAdvance=false; // test : on n'avance PAS la manche
    DUEL._stopTimer();
    DUEL._send({type:"bonus_start", who:(S.nom||"Ton adversaire"), kind:kind});
    DUEL._jouerMonBonus(kind);
  },

  // Hôte : lance un bonus pour le joueur choisi (1=hôte, 2=invité), l'autre spectate.
  _lancerBonusDuel(kind, pour){
    kind=(kind==="question")?"question":"sage";
    DUEL._bonusEnCours=true;
    DUEL._bonusPendingAdvance=true; // après ce bonus, on avancera la manche
    DUEL._stopTimer();
    if(pour===1){
      // Bonus pour l'HÔTE (moi) → je le joue, l'invité spectate
      DUEL._send({type:"bonus_start", who:(S.nom||"Ton adversaire"), kind:kind});
      DUEL._jouerMonBonus(kind);
    } else {
      // Bonus pour l'INVITÉ → je le lui accorde, je spectate
      DUEL._send({type:"bonus_grant", kind:kind, advance:true, who:(S.nom||"Ton adversaire")});
      var advNom=(DUEL.adversaire&&DUEL.adversaire.nom)?DUEL.adversaire.nom:"Ton adversaire";
      DUEL._showSpectate(advNom, kind);
      if(DUEL._bonusWatchTO) clearTimeout(DUEL._bonusWatchTO);
      DUEL._bonusWatchTO=setTimeout(function(){ DUEL._finBonusSpectateur(0,true); }, 60000);
    }
  },

  // Lance le VRAI mini-jeu bonus pour LE JOUEUR LOCAL, en mode Duel.
  _jouerMonBonus(kind){
    DUEL._monBonusActif=true;
    DUEL._monBonusKind=(kind==="question")?"question":"sage";
    if(DUEL._monBonusKind==="question"){ if(typeof BONUS!=="undefined"){ BONUS.answered=false; BONUS.launch(); } }
    else { if(typeof BONUS_SAGE!=="undefined") BONUS_SAGE.launch(); }
  },

  // Appelé par close() du bonus (via reroute) quand LE JOUEUR LOCAL a fini son bonus en Duel.
  _monBonusTermine(gain){
    gain=Math.max(0, gain||0);
    DUEL._monBonusActif=false; DUEL._monBonusKind=null;
    DUEL._bonusEnCours=false;
    if(DUEL.gs){
      if(DUEL.isHost){
        DUEL.gs.s1=Math.max(0,(DUEL.gs.s1||0)+gain);
        DUEL._send({type:"bonus_end", gain:gain});
        if(DUEL._bonusPendingAdvance && DUEL._avancerManche){ DUEL._bonusPendingAdvance=false; DUEL._avancerManche(); }
        DUEL._send({type:"state_update", gs:DUEL.gs});
      } else {
        // invité actif : l'hôte applique le gain à s2 (+avance si prévu)
        DUEL._send({type:"bonus_end", gain:gain});
      }
    }
    if(gain>0) showToast("✨ Bonus : +"+gain+" pts","win",2500);
    render();
  },

  // Hôte spectateur : l'invité (actif) a fini son bonus
  _finBonusSpectateur(gain, timeout){
    if(DUEL._bonusWatchTO){ clearTimeout(DUEL._bonusWatchTO); DUEL._bonusWatchTO=null; }
    DUEL._bonusEnCours=false;
    DUEL._hideSpectate();
    if(DUEL._bonusPendingAdvance && DUEL._avancerManche){ DUEL._bonusPendingAdvance=false; DUEL._avancerManche(); }
    if(DUEL.isHost && DUEL.gs) DUEL._send({type:"state_update", gs:DUEL.gs});
    render();
  }
});

// ════════════════════════════════════════════════
// DUEL — SUSPENSION & RECONNEXION AUTOMATIQUE
// ════════════════════════════════════════════════
DUEL._recon = { active:false, tries:0, timer:null };
DUEL._quitVolontaire = false;

Object.assign(DUEL, {

  _ice(){ return {config:{iceServers:[
    {urls:"stun:stun.l.google.com:19302"},
    {urls:"stun:stun1.l.google.com:19302"}
  ]}}; },

  _stopRecon(){
    if(DUEL._recon){ DUEL._recon.active=false;
      if(DUEL._recon.timer){ clearTimeout(DUEL._recon.timer); DUEL._recon.timer=null; } }
  },

  // ── Overlay de suspension ──
  _montrerSuspension(txt){
    if(DUEL.demo) return;
    var ov=document.getElementById("duel-suspendu-overlay");
    if(!ov){
      if(!document.getElementById("duel-spin-style")){
        var st=document.createElement("style"); st.id="duel-spin-style";
        st.textContent="@keyframes duelspin{to{transform:rotate(360deg)}}";
        document.head.appendChild(st);
      }
      ov=document.createElement("div");
      ov.id="duel-suspendu-overlay";
      ov.style.cssText="position:fixed;inset:0;z-index:9990;display:flex;flex-direction:column;"
        +"align-items:center;justify-content:center;background:rgba(7,5,20,0.94);padding:24px;text-align:center";
      ov.innerHTML='<div style="font-size:46px;margin-bottom:14px">⏸️</div>'
        +'<div style="font-family:Cinzel,serif;font-size:18px;font-weight:900;color:var(--goldL);margin-bottom:8px">Partie suspendue</div>'
        +'<div id="duel-suspendu-txt" style="font-size:13px;color:var(--muted);max-width:300px;line-height:1.5;margin-bottom:20px"></div>'
        +'<div style="width:38px;height:38px;border:3px solid rgba(212,175,55,0.25);border-top-color:var(--gold);border-radius:50%;animation:duelspin 0.9s linear infinite;margin-bottom:24px"></div>'
        +'<button onclick="DUEL._quitterDepuisSuspension()" style="min-height:42px;padding:0 22px;border-radius:12px;'
        +'background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer">Quitter le duel</button>';
      document.body.appendChild(ov);
    }
    ov.style.display="flex";
    var t=document.getElementById("duel-suspendu-txt");
    if(t) t.textContent=txt||"Reconnexion automatique en cours…";
  },
  _cacherSuspension(){
    var ov=document.getElementById("duel-suspendu-overlay");
    if(ov) ov.style.display="none";
  },
  _quitterDepuisSuspension(){
    DUEL._cacherSuspension();
    DUEL.quitter();
  },

  // ── Point d'entrée : connexion perdue ──
  _onDisconnect(){
    if(DUEL.demo) return;
    if(DUEL._quitVolontaire) return;
    if(!DUEL._recon) DUEL._recon={active:false,tries:0,timer:null};
    if(S.ecran!=="duel_jeu" && S.ecran!=="duel_lobby") return; // pas pendant résultat/menu
    if(DUEL._recon.active) return; // déjà en reconnexion
    sauvegarderDuelEnCours();
    DUEL._montrerSuspension("Connexion interrompue. Reconnexion automatique dès que possible…");
    DUEL._recon.active=true; DUEL._recon.tries=0;
    DUEL._reconnecter();
  },

  // ── Boucle de reconnexion ──
  _reconnecter(){
    if(!DUEL._recon.active) return;
    if(!DUEL.room){ DUEL._stopRecon(); return; }
    DUEL._recon.tries++;
    // Réveiller le peer au niveau du serveur de signalisation si nécessaire
    try{
      if(DUEL.peer && !DUEL.peer.destroyed && DUEL.peer.disconnected){ DUEL.peer.reconnect(); }
    }catch(e){}

    if(DUEL.isHost){
      // Hôte : garder l'identifiant eq-<CODE> vivant ; l'invité s'y reconnectera.
      if(!DUEL.peer || DUEL.peer.destroyed){ DUEL._recreerPeerHote(); }
    } else {
      // Invité : retenter la connexion vers l'hôte.
      DUEL._reconnecterInvite();
    }

    // Replanifier tant qu'on n'est pas reconnecté
    DUEL._recon.timer=setTimeout(function(){
      if(DUEL._recon.active) DUEL._reconnecter();
    }, Math.min(2500+DUEL._recon.tries*400, 6000));
  },

  _recreerPeerHote(){
    if(typeof Peer==="undefined") return;
    try{
      DUEL.peer=new Peer("eq-"+DUEL.room, DUEL._ice());
      DUEL._armerHotePeer(DUEL.peer);
    }catch(e){}
  },

  _armerHotePeer(peer){
    peer.on("connection",function(conn){
      DUEL.conn=conn;
      conn.on("open",function(){ render(); }); // l'invité enverra resync_req
      conn.on("data",function(data){ try{ DUEL._onMsg(JSON.parse(data)); }catch(e){} });
      conn.on("close",function(){ DUEL.conn=null; DUEL._onDisconnect(); });
    });
    peer.on("disconnected",function(){ try{ if(!peer.destroyed) peer.reconnect(); }catch(e){} });
    peer.on("error",function(e){
      // L'ancien identifiant hôte est peut-être encore réservé côté serveur → on réessaie
      if(e && e.type==="unavailable-id" && DUEL._recon.active){
        try{ peer.destroy(); }catch(x){}
        DUEL.peer=null;
      }
    });
  },

  _reconnecterInvite(){
    if(typeof Peer==="undefined") return;
    try{
      if(!DUEL.peer || DUEL.peer.destroyed){
        DUEL.myId=DUEL.genId();
        DUEL.peer=new Peer("eq-"+DUEL.myId, DUEL._ice());
        DUEL.peer.on("disconnected",function(){ try{ if(DUEL.peer && !DUEL.peer.destroyed) DUEL.peer.reconnect(); }catch(e){} });
        DUEL.peer.on("error",function(e){ /* peer-unavailable : l'hôte n'est pas encore là, on retentera */ });
        DUEL.peer.on("open",function(){ DUEL._tenterConnexionHote(); });
      } else {
        DUEL._tenterConnexionHote();
      }
    }catch(e){}
  },

  _tenterConnexionHote(){
    try{
      var conn=DUEL.peer.connect("eq-"+DUEL.room,{reliable:true});
      DUEL.conn=conn;
      conn.on("open",function(){
        try{ conn.send(JSON.stringify({type:"resync_req", nom:S.nom||"Joueur"})); }catch(e){}
      });
      conn.on("data",function(data){ try{ DUEL._onMsg(JSON.parse(data)); }catch(e){} });
      conn.on("close",function(){ DUEL._onDisconnect(); });
    }catch(e){}
  },

  _reconnexionReussie(){
    DUEL._stopRecon();
    DUEL._cacherSuspension();
    showToast("✅ Reconnecté — la partie reprend","win",2500);
    render();
  },

  // ── Reprise après redémarrage complet de l'app ──
  reprendre(data){
    DUEL._reset();
    DUEL._quitVolontaire=false;
    DUEL.gs=data.gs;
    DUEL.isHost=!!data.isHost;
    DUEL.myTurn=!!data.myTurn;
    DUEL.room=data.room;
    DUEL.adversaire=data.adversaire||{nom:"Adversaire",couleur:"#e05555",icon:"⚔️"};
    DUEL.demo=false;
    S.ecran="duel_jeu"; render();
    if(!DUEL.room){ showToast("⚠️ Code de salle manquant — reconnexion impossible","lose",3500); return; }
    DUEL._montrerSuspension("Reconnexion à votre partie en cours…");
    DUEL._recon.active=true; DUEL._recon.tries=0;
    _loadPeerJS(function(err){
      if(err||typeof Peer==="undefined"){
        DUEL._montrerSuspension("Réseau indisponible. La reconnexion reprendra dès le retour de la connexion…");
        DUEL._recon.timer=setTimeout(function(){ if(DUEL._recon.active) DUEL._reconnecter(); },4000);
        return;
      }
      DUEL._reconnecter();
    });
  },

});

// ════════════════════════════════════════════════
// DUEL — JOKERS (Espion + Échange)
// Brakeur/Multiplicateur (qui modifient le score commun)
// seront branchés ensuite avec synchro des deux côtés.
// ════════════════════════════════════════════════
Object.assign(DUEL, {

  _mesJoks(){ return DUEL.isHost?DUEL.gs.mainJokJ1:DUEL.gs.mainJokJ2; },
  _setMesJoks(arr){ if(DUEL.isHost) DUEL.gs.mainJokJ1=arr; else DUEL.gs.mainJokJ2=arr; },
  _maMain(){ return DUEL.isHost?DUEL.gs.mainRepJ1:DUEL.gs.mainRepJ2; },
  _setMaMain(arr){ if(DUEL.isHost) DUEL.gs.mainRepJ1=arr; else DUEL.gs.mainRepJ2=arr; },
  _advMain(){ return DUEL.isHost?DUEL.gs.mainRepJ2:DUEL.gs.mainRepJ1; },

  _jokerArme:null,
  _hasOffensive(side){
    if(!DUEL.gs) return false;
    var joks=side===1?DUEL.gs.mainJokJ1:DUEL.gs.mainJokJ2;
    return !!(joks&&joks.some(function(x){return x.id==="j1"||x.id==="j2";}));
  },

  // Décision d'un joker offensif APRÈS la révélation (comme le Solo)
  jokerFinal(id){
    var gs=DUEL.gs; if(!gs||gs.phase!=="apresReponses") return;
    if(id){
      var joks=DUEL._mesJoks();
      if(!joks.find(function(x){return x.id===id;})){ id=null; }
      else {
        DUEL._setMesJoks(joks.filter(function(x){return x.id!==id;}));
        if(DUEL.isHost) gs.jokerJ1=id; else gs.jokerJ2=id;
        var p1=(gs.repJ1&&gs.repJ1.pts)?gs.repJ1.pts:0;
        var p2=(gs.repJ2&&gs.repJ2.pts)?gs.repJ2.pts:0;
        var tot=p1+p2, ptsGain=id==="j1"?tot:tot*2;
        var jkObj=JOKERS.find(function(x){return x.id===id;});
        if(jkObj){ if(AUDIO.sfxJoker) AUDIO.sfxJoker(); showJokerOverlay(jkObj,ptsGain,"joueur",null); }
      }
    }
    if(DUEL.isHost) gs.jokDecidJ1=true; else gs.jokDecidJ2=true;
    // Prévenir l'adversaire
    DUEL._send({type:"joker_final",joker:id||null});
    render();
    DUEL._verifierResolution();
  },

  // L'hôte résout la manche quand LES DEUX joueurs ont décidé (garde-fou 5s)
  _verifierResolution(){
    var gs=DUEL.gs; if(!gs||gs.phase!=="apresReponses") return;
    if(!DUEL.isHost) return; // seul l'hôte déclenche la résolution
    if(gs.jokDecidJ1 && gs.jokDecidJ2){
      if(DUEL._jokDecideInt){ clearTimeout(DUEL._jokDecideInt); DUEL._jokDecideInt=null; }
      // Si un joker offensif a été joué, laisser l'animation (2,5s) se terminer
      var jokerJoue = gs.jokerJ1==="j1"||gs.jokerJ1==="j2"||gs.jokerJ2==="j1"||gs.jokerJ2==="j2";
      var deuxPassent = !gs.repJ1 && !gs.repJ2;
      DUEL._startNextRoundCountdown(deuxPassent?0.7:(jokerJoue?2:1.3));
    } else if(!DUEL._jokDecideInt){
      // Garde-fou : si une décision se perd/tarde, on force la résolution après 5s
      DUEL._jokDecideInt=setTimeout(function(){
        DUEL._jokDecideInt=null;
        if(DUEL.gs&&DUEL.gs.phase==="apresReponses"){
          DUEL.gs.jokDecidJ1=true; DUEL.gs.jokDecidJ2=true;
          DUEL._startNextRoundCountdown(1.3);
        }
      },5000);
    }
  },

  useJoker(id){
    var gs=DUEL.gs; if(!gs) return;
    if(gs.phase==="afficheBases" && gs.cb){
      if(id==="j3"){ DUEL.useEspion(); return; }
      if(id==="j4"){ DUEL.useEchange(); return; }
    }
    if(gs.phase==="apresReponses" && (id==="j1"||id==="j2")){ DUEL.jokerFinal(id); return; }
    if(id==="j1"||id==="j2"){ showToast("💡 Brakeur & Multiplicateur se jouent après les réponses","info",2400); return; }
    showToast("Ce joker s'utilise pendant la phase de réponse","info",2200);
  },

  useEspion(){
    var gs=DUEL.gs; if(!gs||!gs.cb) return;
    var joks=DUEL._mesJoks();
    if(!joks.find(function(x){return x.id==="j3";})) return;
    DUEL._setMesJoks(joks.filter(function(x){return x.id!=="j3";}));
    DUEL._send({type:"joker_used",id:"j3"});
    var vues=DUEL._advMain().filter(function(c){return c.combo===gs.cb;})
      .sort(function(a,b){return b.pts-a.pts;}).slice(0,3);
    gs.repAdvVues=vues; gs.espionActif=true;
    if(AUDIO.sfxJoker) AUDIO.sfxJoker();
    showToast("👁 Espion — 3 meilleures cartes de l'adversaire révélées !","win",3000);
    render();
    setTimeout(function(){ if(DUEL.gs){ DUEL.gs.espionActif=false; render(); } },6000);
  },

  useEchange(){
    var gs=DUEL.gs; if(!gs||!gs.cb) return;
    if(!DUEL._mesJoks().find(function(x){return x.id==="j4";})) return;
    gs.phaseEchange=true;
    showToast("🔄 Choisissez la carte à sacrifier","info",3000);
    render();
  },

  confirmerEchange(idSacrifice){
    var gs=DUEL.gs; if(!gs||!gs.phaseEchange) return;
    var main=DUEL._maMain().filter(function(x){return x.id!==idSacrifice;});
    var enMain=new Set(main.map(function(x){return x.id;}));
    var poss=REPONSES.filter(function(r){return r.combo===gs.cb && !enMain.has(r.id);});
    var source=poss.length>0?poss:REPONSES.filter(function(r){return r.combo===gs.cb;});
    var nouvelle=Object.assign({},pick(source),{id:"ech_"+Date.now()});
    main.push(nouvelle);
    DUEL._setMaMain(main);
    DUEL._setMesJoks(DUEL._mesJoks().filter(function(x){return x.id!=="j4";}));
    DUEL._send({type:"joker_used",id:"j4"});
    gs.phaseEchange=false;
    if(AUDIO.sfxBadge) AUDIO.sfxBadge();
    showToast('🔄 Échange ! "'+nouvelle.name+'" ('+nouvelle.pts+' pts) intégrée !',"win",3000);
    render();
  },

  annulerEchange(){
    if(DUEL.gs) DUEL.gs.phaseEchange=false;
    render();
  },

  useEchangeLibre(){
    var gs=DUEL.gs; if(!gs||!gs.cb) return;
    if(!DUEL._mesJoks().find(function(x){return x.id==="j4";})) return;
    var main=DUEL._maMain();
    var enMain=new Set(main.map(function(x){return x.id;}));
    var poss=REPONSES.filter(function(r){return r.combo===gs.cb && !enMain.has(r.id);});
    var source=poss.length>0?poss:REPONSES.filter(function(r){return r.combo===gs.cb;});
    var nouvelle=Object.assign({},pick(source),{id:"ech_"+Date.now()});
    DUEL._setMaMain([...main,nouvelle]);
    DUEL._setMesJoks(DUEL._mesJoks().filter(function(x){return x.id!=="j4";}));
    DUEL._send({type:"joker_used",id:"j4"});
    if(AUDIO.sfxBadge) AUDIO.sfxBadge();
    showToast('🔄 "'+nouvelle.name+'" ('+nouvelle.pts+' pts) piochée !',"win",2500);
    render();
  },

});

// ════════════════════════════════════════════════
// DUEL — RÉCOMPENSES (XP, badges, classement) façon Solo
// L'hôte suit les stats des 2 joueurs et envoie à l'invité
// les siennes dans le message "fin". Chacun s'attribue alors
// XP + badges + classement, localement.
// ════════════════════════════════════════════════
DUEL._stats=null;
DUEL._recompensesFaites=false;
Object.assign(DUEL, {

  _freshStats(){
    return { manchesGagnees:0, streak:0, maxStreak:0, piliers:{},
             brakeurWin:false, multiWin:false, cartes40:0, remontada:false };
  },

  _suiviStats(side, won, pilier, joker, pts){
    if(!DUEL._stats) return;
    var s=DUEL._stats["j"+side]; if(!s) return;
    if(won){
      s.manchesGagnees++;
      s.streak++; if(s.streak>s.maxStreak) s.maxStreak=s.streak;
      if(pilier) s.piliers[pilier]=(s.piliers[pilier]||0)+1;
      if(joker==="j1") s.brakeurWin=true;
      if(joker==="j2") s.multiWin=true;
    } else {
      s.streak=0;
    }
    if(pts===40) s.cartes40++;
  },

  _recompenses(monScore, advScore, stats){
    if(DUEL._recompensesFaites) return;
    DUEL._recompensesFaites=true;
    monScore=monScore||0; advScore=advScore||0;
    var win=monScore>advScore;
    // XP : même esprit que le Solo (≈ points gagnés + bonus victoire)
    var xpG=Math.round(monScore*1.5)+(win?50:10);
    if(xpG>0) S.xp=(S.xp||0)+xpG;
    // Badges : mêmes règles que le Solo (checkBadges)
    if(stats && typeof G!=="undefined" && G.checkBadges){
      try{
        G.checkBadges({
          streak:stats.maxStreak||0, piliers:stats.piliers||{},
          manchesGagnees:stats.manchesGagnees||0,
          brakeurWin:!!stats.brakeurWin, multiWin:!!stats.multiWin,
          cartes40:stats.cartes40||0, remontada:!!stats.remontada, battuExpert:false
        });
      }catch(e){}
    }
    // Classement
    if(!S.classement) S.classement=[];
    S.classement.push({nom:S.nom||"Joueur",pts:monScore,xp:S.xp});
    enregistrerStat(monScore>advScore?"win":(monScore<advScore?"lose":"draw"), monScore, null);
    S.classement.sort(function(a,b){return b.pts-a.pts;});
    S.classement=S.classement.slice(0,10);
    showToast("⚡ +"+xpG+" XP"+(win?" · Victoire 🏆":""), win?"win":"info", 3200);
    if(typeof sauvegarder==="function") sauvegarder();
  },

});

// ── Confettis victoire (nombre + couleurs paramétrables) ──
function showConfetti(n,colors){
  colors=colors||["#D4AF37","#F0D060","#45c97a","#e05555","#9B59B6","#3498db","#fff"];
  n=n||60;
  for(var i=0;i<n;i++){
    (function(i){
      setTimeout(function(){
        var d=document.createElement("div");
        var col=colors[Math.floor(Math.random()*colors.length)];
        var size=(Math.random()*10+6)+"px";
        d.style.cssText="position:fixed;top:-20px;left:"+(Math.random()*100)+"vw;z-index:9999;"
          +"width:"+size+";height:"+size+";border-radius:"+(Math.random()>0.5?"50%":"3px")+";"
          +"background:"+col+";pointer-events:none;box-shadow:0 0 6px "+col+"88;"
          +"animation:confettiFall "+(2+Math.random()*3)+"s "+(Math.random())+"s ease both,"
          +"confettiSway "+(1+Math.random())+"s ease-in-out infinite";
        document.body.appendChild(d);
        setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},5000);
      },i*40);
    })(i);
  }
}

// ── Célébration de victoire à 3 paliers (selon le SCORE TOTAL du vainqueur) ──
// Pour basculer sur l'ÉCART, remplacer l'argument passé par (scoreVainqueur - scoreAdversaire).
function niveauCelebration(score){
  if(score>=101) return "diamond";
  if(score>=51)  return "gold";
  return "argent";
}
function celebrerVictoire(score){
  var niv=niveauCelebration(score);
  var cfg={
    argent :{cols:["#c8ccd0","#e8ecf0","#a8b0b8","#f4f8fc","#889098","#d0d6dc"],n:45,badge:"🥈",titre:"VICTOIRE ARGENT",coul:"#dbe0e6",glow:"rgba(200,210,222,0.65)"},
    gold   :{cols:["#ffd23c","#ffb020","#fff0a0","#ffcc00","#ff9500","#fffbe0","#f0d060"],n:80,badge:"🥇",titre:"VICTOIRE OR",coul:"#ffd23c",glow:"rgba(255,190,40,0.75)"},
    diamond:{cols:["#b9f2ff","#e0ffff","#a0e0ff","#ff9ff3","#c0f0ff","#ffffff","#7ec8ff","#e0b0ff","#9ad8ff"],n:130,badge:"💎",titre:"VICTOIRE DIAMANT",coul:"#b9f2ff",glow:"rgba(130,200,255,0.85)"}
  }[niv];
  showConfetti(cfg.n,cfg.cols);
  var old=document.getElementById("celebration-badge"); if(old&&old.parentNode) old.parentNode.removeChild(old);
  var ov=document.createElement("div"); ov.id="celebration-badge";
  ov.style.cssText="position:fixed;left:0;right:0;top:16%;z-index:10000;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;animation:celebPop 0.7s cubic-bezier(.2,1.4,.4,1) both";

    +'<div style="font-family:Cinzel,serif;font-size:26px;font-weight:900;color:'+cfg.coul+';letter-spacing:3px;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,0.85),0 0 26px '+cfg.glow+'">'+cfg.titre+'</div>';

        mesJoks.forEach(function(jk){
          if(jk.id==="j4") jokCards2+='<div style="width:var(--card-w);min-height:var(--card-h);display:flex;flex-shrink:0">'+jokerCardHTML(jk,{onClick:"DUEL.useEchangeLibre()"})+'</div>';

  html+='</div>';

  if(html.indexOf("<!--HAND-->")!==-1){

    var _ouvre=html.slice(0,_pOpen).replace("min-height:100vh","height:100vh;height:100dvh;overflow:hidden");
    var _rest=html.slice(_pOpen);
    var _mi=_rest.indexOf("<!--HAND-->");

      +'<div style="flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%">'+_main+'</div>'

    setTimeout(startTensionMsgs, 100);

  }
  DUEL._updateTimer();
}

function DUEL_CREER(){
  // Hôte — connexion automatique, pas besoin de nom saisi
  // Utiliser S.nom si défini, sinon "Hôte"
  if(!S.nom||S.nom==="Joueur") S.nom="Hôte";
  DUEL.creerSalle();
}

function DUEL_REJOINDRE(){
  var inp=document.getElementById("duel-code-input");
  var code=(inp?inp.value:"").trim().toUpperCase();
  if(code.length!==4){ showToast("⚠️ Entrez le code 4 lettres reçu","info",2000); return; }
  if(!S.nom||S.nom==="Joueur") S.nom="Invité";
  DUEL.rejoindre(code);
}

function DUEL_VALIDER_NOM(cb){
  var inp=document.getElementById("duel-nom");
  var nom=(inp?inp.value:"").trim();
  if(!nom||nom.length<2){ showToast("⚠️ Entrez votre prénom (2 lettres min)","info",2000); return; }
  S.nom=nom; sauvegarder(); cb();
}

function render(){
  setBg(S.theme);
  const app=document.getElementById("app");
  app.innerHTML="";
  const fn={menu:renderMenu,selection:renderSelection,jeu:renderJeu,duel_menu:renderDuelMenu,duel_connecting:renderDuelConnecting,duel_lobby:renderDuelLobby,duel_jeu:renderDuelJeu,duel_resultat:renderDuelResultat,
    resultat:renderResultat,classement:renderClassement,statistiques:renderStats,defis:renderDefis,
    badges:renderBadges,regles:renderRegles,
    }[S.ecran];
  try{ if(fn)fn(app); }catch(e){ if(window.__logErr) window.__logErr(e,"render:"+S.ecran); else throw e; }
  // Barre de discussion du Duel : widget persistant hors de #app
  try{
    if(typeof DUEL!=="undefined" && DUEL._ensureChatUI){
      if((S.ecran==="duel_jeu"||S.ecran==="duel_lobby") && DUEL.conn) DUEL._ensureChatUI();
      else DUEL._removeChatUI();
    }
  }catch(e){}
  // Sauvegarde automatique de la partie en cours
  try{ sauvegarderPartieEnCours(); sauvegarderDuelEnCours(); }catch(e){ if(window.__logErr) window.__logErr(e,"sauvegarde"); }
}

  const st=PILIER[p];
  const{size="md",selected=false,disabled=false,glow=false,played=false,showCount=null,onClick=""}=opts;
  // Tailles adaptatives selon breakpoint
  const vw=window.innerWidth||390;

function jokerCardHTML(j,opts={}){
  const{used=false,bonus=0,onClick=""}=opts;
  const phaseLabel={j1:"Après réponses",j2:"Après réponses",j3:"Avant réponse",j4:"Si aucune carte"}[j.id]||"";
  const phaseCol={j1:"#9b59b6",j2:"#3498db",j3:"#27ae60",j4:"#8e44ad"}[j.id]||j.color;

  // Motif hexagonal subtil
  const hexPat=`<svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.04;pointer-events:none" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="h${j.id}" width="20" height="22" patternUnits="userSpaceOnUse"><polygon points="10,1 19,5.5 19,16.5 10,21 1,16.5 1,5.5" fill="none" stroke="${j.color}" stroke-width="0.7"/></pattern></defs><rect width="100%" height="100%" fill="url(#h${j.id})"/></svg>`;

  return`<div class="carte-joker ${used?"used":""}" style="
    background:${used?"#0a0a16":
      `radial-gradient(ellipse at 50% 25%,${j.color}55 0%,transparent 60%),
       linear-gradient(165deg,${j.color}77 0%,${j.color}22 40%,#050310 100%)`};
    border:2px solid ${used?"#151525":j.color+"cc"};
    box-shadow:${used?"none":

       0 0 24px ${j.color}55,

    padding:12px 8px;gap:6px;"
    ${used?"":"onclick=\""+onClick+"\""}

    ${!used?hexPat:""}

    ${!used?`<div style="position:absolute;top:0;left:0;right:0;height:42%;background:linear-gradient(180deg,rgba(255,255,255,0.1),transparent);pointer-events:none;border-radius:14px 14px 0 0"></div>`:""}
    <!-- Coins -->
    ${!used?`
      <div style="position:absolute;top:5px;left:5px;width:12px;height:12px;border-top:1.5px solid ${j.color}99;border-left:1.5px solid ${j.color}99;border-radius:2px 0 0 0"></div>
      <div style="position:absolute;top:5px;right:5px;width:12px;height:12px;border-top:1.5px solid ${j.color}99;border-right:1.5px solid ${j.color}99;border-radius:0 2px 0 0"></div>
      <div style="position:absolute;bottom:5px;left:5px;width:12px;height:12px;border-bottom:1.5px solid ${j.color}99;border-left:1.5px solid ${j.color}99;border-radius:0 0 0 2px"></div>
      <div style="position:absolute;bottom:5px;right:5px;width:12px;height:12px;border-bottom:1.5px solid ${j.color}99;border-right:1.5px solid ${j.color}99;border-radius:0 0 2px 0"></div>`:""}

    <!-- Icône avec double halo -->
    <div style="position:relative;z-index:1;display:flex;align-items:center;justify-content:center;margin-top:4px">
      ${!used?`<div style="position:absolute;width:56px;height:56px;border-radius:50%;background:radial-gradient(circle,${j.color}44 0%,transparent 70%)"></div>
      <div style="position:absolute;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,${j.color}66 0%,transparent 70%);animation:pulse 2s infinite"></div>`:""}
      <div style="font-size:30px;position:relative;filter:${used?"none":`drop-shadow(0 0 10px ${j.color}) drop-shadow(0 0 24px ${j.color}88)`}">${j.icon}</div>
    </div>

    <!-- Séparateur -->
    ${!used?`<div style="position:relative;z-index:1;display:flex;align-items:center;gap:3px;width:78%">
      <div style="flex:1;height:1px;background:linear-gradient(90deg,transparent,${j.color}aa)"></div>
      <div style="font-size:6px;color:${j.color}cc">✦</div>
      <div style="flex:1;height:1px;background:linear-gradient(90deg,${j.color}aa,transparent)"></div>
    </div>`:""}

    <!-- Nom -->
    <div style="position:relative;z-index:1;font-size:10px;font-weight:700;
      color:${used?"#1e1e30":"#F0D060"};text-align:center;font-family:'Cinzel',serif;
      letter-spacing:0.5px;text-shadow:${used?"none":`0 0 10px ${j.color}88`}">${j.name}</div>

    <!-- Description -->
    <div style="position:relative;z-index:1;font-size:7.5px;
      color:${used?"#151525":"rgba(190,180,210,0.8)"};text-align:center;line-height:1.45;padding:0 5px">${j.desc}</div>

    <!-- Badge phase -->
    ${!used?`<div style="position:relative;z-index:1;font-size:7px;color:${phaseCol};
      background:${phaseCol}18;border:1px solid ${phaseCol}44;border-radius:6px;padding:2px 8px;
      letter-spacing:0.5px;font-weight:600">${phaseLabel}</div>`:""}

    <!-- Bonus points -->
    ${bonus>0&&!used?`<div style="position:relative;z-index:1;font-size:12px;font-weight:700;color:#F0D060;
      background:rgba(240,208,96,0.12);border:1px solid rgba(240,208,96,0.4);
      border-radius:8px;padding:4px 12px;box-shadow:0 0 10px rgba(240,208,96,0.2)">→ +${bonus} pts</div>`:""}

    <!-- Bouton d'action visible -->
    ${!used&&onClick?`<div style="position:relative;z-index:2;margin-top:2px;font-size:8.5px;font-weight:900;color:#12082e;
      background:linear-gradient(135deg,${j.color},${j.color}cc);border-radius:8px;padding:4px 14px;
      letter-spacing:1px;font-family:'Cinzel',serif;box-shadow:0 2px 10px ${j.color}aa,inset 0 1px 0 rgba(255,255,255,0.4);text-transform:uppercase">▶ Utiliser</div>`:""}

    ${used?`<div style="font-size:7px;color:#252535;letter-spacing:2px;font-weight:700;position:relative;z-index:1">UTILISÉ</div>`:""}
  </div>`;

function showJokerOverlay(joker, ptsReveal, who, callback){
  const ov=document.getElementById("joker-overlay");
  const bg=document.getElementById("jov-bg");
  const card=document.getElementById("jov-card");
  const ripple=document.getElementById("jov-ripple");
  const ripple2=document.getElementById("jov-ripple2");
  const icon=document.getElementById("jov-icon");
  const name=document.getElementById("jov-name");
  const desc=document.getElementById("jov-desc");
  const title=document.getElementById("jov-title");
  const subdesc=document.getElementById("jov-subdesc");
  const pts=document.getElementById("jov-pts");

  // Couleurs selon joker
  const colors={j1:"#6a0dad",j2:"#0d47a1",j3:"#1b5e20",j4:"#4a148c"};
  const jcol=colors[joker.id]||"#D4AF37";

  // CSS variable couleur
  ov.style.setProperty("--jcolor",jcol);

  // Fond semi-transparent coloré
  bg.style.background=`radial-gradient(ellipse at center,${jcol}cc 0%,rgba(7,5,20,0.97) 70%)`;

  // Carte grande
  card.style.background=`linear-gradient(160deg,${jcol}44,rgba(7,5,20,0.95))`;
  icon.textContent=joker.icon;
  name.textContent=joker.name;
  desc.textContent=joker.desc;

  // Texte selon qui joue
  if(who==="joueur"){
    title.textContent=joker.name.toUpperCase()+" !";
    title.style.color="var(--goldL)";
    subdesc.textContent=joker.id==="j1"?"Vous raflез TOUT le pot !"
      :joker.id==="j2"?"Le pot est multiplié par 2 !"
      :joker.id==="j3"?"Vous révélez les cartes adverses !"
      :"Une carte est générée automatiquement !";
  }else if(who==="adversaire"){
    title.textContent="ADVERSAIRE : "+joker.name.toUpperCase()+" !";
    title.style.color="#ff6b6b";
    subdesc.textContent=joker.id==="j1"?"L'adversaire rafle TOUT le pot !"
      :joker.id==="j2"?"L'adversaire double le pot — attention !"
      :joker.id==="j3"?"L'adversaire observe vos cartes…"
      :"L'adversaire pioche une carte !";
  }else{
    title.textContent="L'IA JOUE "+joker.name.toUpperCase()+" !";
    title.style.color="#ff6b6b";
    subdesc.textContent=joker.id==="j1"?"L'IA rafle TOUT le pot !"
      :"L'IA double le pot — attention !";
  }

  // Points
  if(ptsReveal!==null){
    pts.style.display="block";
    const ptCol=who==="joueur"?"var(--goldL)":"#ff6b6b";
    pts.style.color=ptCol;
    pts.style.textShadow=`0 0 20px ${jcol},0 0 40px ${jcol}88`;
    pts.textContent=(who==="joueur"?"+":"-")+ptsReveal+" pts !";
  }else{
    pts.style.display="none";
  }

  // Reset animations
  [card,title,subdesc,pts,bg,ripple,ripple2].forEach(el=>{
    el.style.animation="none";
    void el.offsetWidth; // force reflow
  });
  card.style.animation="jokerFlash 0.6s cubic-bezier(.34,1.56,.64,1) both, jokerGlow 1s 0.5s infinite";
  bg.style.animation="jokerBg 2.5s ease forwards";
  title.style.animation="jokerTitle 0.5s 0.4s both";
  subdesc.style.animation="jokerSub 0.6s 0.7s both";
  pts.style.animation="jokerSub 0.5s 1.0s both";
  ripple.style.borderColor=jcol;
  ripple2.style.borderColor=jcol;
  ripple.style.animation="ripple 1s 0.3s ease-out infinite";
  ripple2.style.animation="ripple 1s 0.7s ease-out infinite";

  // Shake l'écran
  document.getElementById("app").style.animation="screenShake 0.5s 0.1s ease both";
  setTimeout(()=>{document.getElementById("app").style.animation="none";},700);

  // Afficher
  ov.classList.add("active");

  // Fermer après 2.5s et appeler callback
  setTimeout(()=>{
    ov.classList.remove("active");
    if(callback)callback();
  },2500);
}
