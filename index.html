// LOGIQUE JEU
// ════════════════════════════════════════════════
const G={
  startJeu(survie=false){
    S.survieActif=survie;
    if(survie){ S.viesSurvie=3; S.diff="Expert"; }
    const r=shuffle([...REPONSES]);
    const j=shuffle([...JOKERS]);
    S.jeu={
      phase:"selection",
      allRepJ1:r.slice(0,12),allRepJ2:r.slice(12,24),
      allJokJ1:j.slice(0,2),allJokJ2:j.slice(2,4),
      mainRepJ1:[],mainRepJ2:[],mainJokJ1:[],mainJokJ2:[],
      selTemp:[],
      s1:0,s2:0,manche:1,total:12,premier:"j1",
      b1:null,b2:null,cb:null,
      repChoisie:null,repIA:null,
      jActif:null,jIA:null,
      msg:"",
      profil:{Spiritualité:0,Amour:0,Santé:0,Argent:0},
      historique:[],
      streak:0,maxStreak:0,manchesGagnees:0,
      brakeurWin:false,multiWin:false,cartes40:0,remontada:false,battuExpert:false,
      piliers:{},
      iaDlg:null,iaTyping:false,
      espionCartes:[],espionActif:false,phaseEchange:false,gainFinal:null,bonusHistory:[],
      timerSec:0,
      repIAVues:[],
    };
    S.jeu.bonusManches = initBonusManches();
    S.ecran="selection";
    render();
    AUDIO.sfxStart();
    AUDIO.startBg();
    setTimeout(()=>{
      const iaPr=IA_PROFILS[S.diff]||IA_PROFILS.Intermédiaire;
      G.showIADlg(pick(iaPr.dlg.debut));
    },800);
  },

  confirmerSelection(){
    const j=S.jeu;
    if(j.selTemp.length<10)return;
    j.mainRepJ1=[...j.selTemp];
    j.mainJokJ1=[...j.allJokJ1];
    // Lancer animation distribution avant de passer à choixBase
    showCardDealAnimation(j.mainRepJ1, function(){
      // IA sélectionne ses 10
      if(S.diff==="Expert"){j.mainRepJ2=[...j.allRepJ2].sort((a,b)=>b.pts-a.pts).slice(0,10);}
      else if(S.diff==="Débutant"){j.mainRepJ2=shuffle([...j.allRepJ2]).slice(0,10);}
      else{const s=[...j.allRepJ2].sort((a,b)=>b.pts-a.pts);j.mainRepJ2=[...s.slice(0,7),...shuffle(s.slice(7)).slice(0,3)];}
      j.mainJokJ2=[...j.allJokJ2];
      j.phase="choixBase";
      S.ecran="jeu";
      render();
    });
  },

  _selInt:null,
  _apresInt:null,
  _iaInt:null,
  _startSelCountdown(){
    if(G._selInt) clearInterval(G._selInt);
    var sec=3;
    var el=document.getElementById("solo-sel-sec");
    if(el) el.textContent=sec;
    G._selInt=setInterval(function(){
      sec--;
      var el=document.getElementById("solo-sel-sec");
      if(el) el.textContent=sec;
      if(sec<=0){
        clearInterval(G._selInt); G._selInt=null;
        if(S.jeu&&S.jeu.selTemp.length>=10){ AUDIO.sfxConfirm(); G.confirmerSelection(); }
      }
    },1000);
  },

  toggleSel(id){
    const j=S.jeu;
    const idx=j.selTemp.findIndex(c=>c.id===id);
    if(idx>=0){
      j.selTemp.splice(idx,1);
      if(G._selInt){ clearInterval(G._selInt); G._selInt=null; }
    }
    else if(j.selTemp.length<10){
      const c=j.allRepJ1.find(x=>x.id===id);
      if(c){
        j.selTemp.push(c);
        // Son + vibration à la 10e carte
        if(j.selTemp.length===10) AUDIO.sfx10eme();
        else AUDIO.sfxClick();
      }
    }
    renderSelection(document.getElementById("app"));
  },

  choisirBase(p){
    const j=S.jeu;
    if(j.phase!=="choixBase")return;
    if(!j.mainRepJ1.some(c=>c.combo.includes(p))){ showToast("Aucune carte "+p+" — choisis un pilier où tu as une carte","info",2200); return; }
    j.b1=p;j.phase="j1AChoisi";
    const iaPr=IA_PROFILS[S.diff]||IA_PROFILS.Intermédiaire;
    G.showIADlg(pick(iaPr.dlg.bluff));
    render();
  },

  iaRepond(){
    const j=S.jeu;
    const tous=PILIERS.filter(p=>p!==j.b1);
    // Ne garder que les piliers où l'IA a RÉELLEMENT une carte du combo (sinon elle passerait pour rien)
    const jouables=tous.filter(p=>j.mainRepJ2.some(c=>c.combo===mkCombo(j.b1,p)));
    const cands=jouables.length>0?jouables:tous; // aucune carte de la couleur → elle devra passer
    let baseIA;
    if(S.diff==="Expert"){
      baseIA=[...cands].sort((a,z)=>{
        const ma=Math.max(...j.mainRepJ2.filter(c=>c.combo===mkCombo(j.b1,a)).map(c=>c.pts),0);
        const mz=Math.max(...j.mainRepJ2.filter(c=>c.combo===mkCombo(j.b1,z)).map(c=>c.pts),0);
        return mz-ma;
      })[0];
    }else if(S.diff==="Débutant"){baseIA=pick(cands);}
    else{
      const opt=[...cands].sort((a,z)=>{
        const ma=Math.max(...j.mainRepJ2.filter(c=>c.combo===mkCombo(j.b1,a)).map(c=>c.pts),0);
        const mz=Math.max(...j.mainRepJ2.filter(c=>c.combo===mkCombo(j.b1,z)).map(c=>c.pts),0);
        return mz-ma;
      })[0];
      baseIA=Math.random()<0.6?opt:pick(cands);
    }
    j.b2=baseIA;j.cb=mkCombo(j.b1,baseIA);
    j.repChoisie=null;j.repIA=null;j.phase="afficheBases";
    G.startTimer();render();
  },

  j1RepondIA(p){
    const j=S.jeu;
    if(p===j.b2)return;
    j.b1=p;j.cb=mkCombo(p,j.b2);
    j.repChoisie=null;j.repIA=null;j.phase="afficheBases";
    G.startTimer();render();
  },

  selRep(id){
    const j=S.jeu;
    if(!j||j.phase!=="afficheBases"||j.phaseEchange)return;
    const c=j.mainRepJ1.find(x=>x.id===id);
    if(!c)return;
    j.repChoisie=(j.repChoisie?.id===id)?null:c;
    render();
  },

  jouerRep(){
    const j=S.jeu;
    G.stopTimer();
    if(!j.repChoisie)return;
    AUDIO.sfxCard();
    G.execRep(j.repChoisie);
  },

  passerTour(){
    G.stopTimer();
    AUDIO.sfxClick();
    G.execRep(null);
  },

  execRep(cJ1){
    const j=S.jeu;
    G.stopTimer();
    const vIA=j.mainRepJ2.filter(c=>c.combo===j.cb);
    let cIA=null;
    if(vIA.length>0){
      if(S.diff==="Expert")cIA=[...vIA].sort((a,b)=>b.pts-a.pts)[0];
      else if(S.diff==="Débutant")cIA=[...vIA].sort((a,b)=>a.pts-b.pts)[0];
      else cIA=pick(vIA);
    }
    if(cJ1)j.mainRepJ1=j.mainRepJ1.filter(x=>x.id!==cJ1.id);
    if(cIA)j.mainRepJ2=j.mainRepJ2.filter(x=>x.id!==cIA.id);
    j.repChoisie=cJ1;j.repIA=cIA;

    // ── Cas passe ──────────────────────────────────────
    const j1Passe=!cJ1;
    const iaPasse=!cIA;

    if(j1Passe&&iaPasse){
      // Les deux passent → pénalité 5 pts chacun, manche suivante immédiate
      j.s1=Math.max(0,j.s1-5);
      j.s2=Math.max(0,j.s2-5);
      showToast("❌ Aucune carte des deux côtés — -5 pts chacun !","lose",2200);
      j.phase="fin";
      j.msg="🤝 Aucune carte — -5 pts chacun";
      j.gainFinal={p1:0,p2:0,joker:null};
      render();
      if(G._apresInt) clearTimeout(G._apresInt);
      G._apresInt=setTimeout(function(){G._apresInt=null;if(S.jeu&&!TOURNOI.actif)G.mancheSuivante();},2000);
      return;
    }

    if(j1Passe&&!iaPasse){
      // Joueur passe, IA joue seule → IA gagne ses pts + 5 pénalité
      const bonus=5;
      j.s2+=cIA.pts+bonus;
      j.s1=Math.max(0,j.s1-bonus);
      showToast("⚠️ Pas de carte — l'IA gagne +"+cIA.pts+" pts (+5 pénalité)","lose",2200);
      j.phase="fin";
      j.msg="💀 L'IA gagne +"+cIA.pts+" pts (+5 pénalité sur vous)";
      j.gainFinal={p1:0,p2:cIA.pts+bonus,joker:null};
      render();
      if(G._apresInt) clearTimeout(G._apresInt);
      G._apresInt=setTimeout(function(){G._apresInt=null;if(S.jeu&&!TOURNOI.actif)G.mancheSuivante();},2000);
      return;
    }

    if(!j1Passe&&iaPasse){
      // IA passe, joueur joue seul → Joueur gagne ses pts + 5 pénalité
      const bonus=5;
      j.s1+=cJ1.pts+bonus;
      j.s2=Math.max(0,j.s2-bonus);
      showToast("✅ L'IA n'a pas de carte — vous gagnez +"+cJ1.pts+" pts (+5 bonus)","win",2200);
      j.phase="fin";
      j.msg="🏆 Vous gagnez +"+cJ1.pts+" pts (+5 pénalité sur l'IA)";
      j.gainFinal={p1:cJ1.pts+bonus,p2:0,joker:null};
      render();
      if(G._apresInt) clearTimeout(G._apresInt);
      G._apresInt=setTimeout(function(){G._apresInt=null;if(S.jeu&&!TOURNOI.actif)G.mancheSuivante();},2000);
      return;
    }

    // Cas normal — les deux ont une carte → résolution auto après 1.5s
    j.phase="apresReponses";
    render();
    if(G._apresInt) clearTimeout(G._apresInt);
    G._apresInt=setTimeout(function(){
      G._apresInt=null;
      if(S.jeu&&S.jeu.phase==="apresReponses"&&!TOURNOI.actif){
        G.resoudre(S.jeu.repChoisie,S.jeu.repIA,null);
      }
    },1500);
  },

  useJoker(id){
    if(!S.jeu && DUEL.gs){ return DUEL.useJoker(id); }
    const j=S.jeu;
    if(j.phase==="afficheBases"){
      if(id==="j3"){G.useEspion();return;}
      if(id==="j4"){G.useEchange();return;}
    }
  },

  useEspion(){
    const j=S.jeu;
    const jok=j.mainJokJ1.find(x=>x.id==="j3");
    if(!jok)return;
    j.mainJokJ1=j.mainJokJ1.filter(x=>x.id!=="j3");
    const vues=j.mainRepJ2.filter(c=>c.combo===j.cb).sort((a,b)=>b.pts-a.pts).slice(0,3);
    j.repIAVues=vues;j.espionActif=true;
    showToast("👁 Espion — 3 cartes de l'IA révélées !");
    render();
    setTimeout(()=>{j.espionActif=false;render();},5000);
  },

  useEchange(){
    const j=S.jeu;
    const jok=j.mainJokJ1.find(x=>x.id==="j4");
    if(!jok||!j.cb) return;

    // Passer en mode sélection Échange
    j.phaseEchange=true;
    showToast("🔄 Choisissez la carte à sacrifier","info",3000);
    render();
  },

  // Appelé quand le joueur clique sur une carte à sacrifier
  confirmerEchange(idSacrifice){
    const j=S.jeu;
    if(!j.phaseEchange) return;

    // Retirer la carte sacrifiée de la main
    j.mainRepJ1=j.mainRepJ1.filter(x=>x.id!==idSacrifice);
    if(j.repChoisie?.id===idSacrifice) j.repChoisie=null;

    // Piocher une nouvelle carte du même combo non encore en main
    const enMain=new Set(j.mainRepJ1.map(x=>x.id));
    const poss=REPONSES.filter(r=>r.combo===j.cb&&!enMain.has(r.id));
    const source=poss.length>0?poss:REPONSES.filter(r=>r.combo===j.cb);
    const nouvelleCarte={...pick(source), id:"ech_"+Date.now()};

    // Ajouter la nouvelle carte à la main
    j.mainRepJ1=[...j.mainRepJ1, nouvelleCarte];

    // Consommer le joker
    j.mainJokJ1=j.mainJokJ1.filter(x=>x.id!=="j4");
    j.phaseEchange=false;

    // Sélectionner automatiquement la nouvelle carte
    j.repChoisie=nouvelleCarte;

    AUDIO.sfxBadge();
    showToast(`🔄 Échange ! "${nouvelleCarte.name}" (${nouvelleCarte.pts} pts) intégrée !`,"win",3000);
    render();
  },

  annulerEchange(){
    const j=S.jeu;
    j.phaseEchange=false;
    render();
  },

  // Échange libre : pas de sacrifice, juste piocher une carte (quand aucune valide)
  useEchangeLibre(){
    const j=S.jeu;
    const jok=j.mainJokJ1.find(x=>x.id==="j4");
    if(!jok) return;
    const enMain=new Set(j.mainRepJ1.map(x=>x.id));
    const poss=REPONSES.filter(r=>r.combo===j.cb&&!enMain.has(r.id));
    const source=poss.length>0?poss:REPONSES.filter(r=>r.combo===j.cb);
    const nouvelleCarte={...pick(source), id:"ech_"+Date.now()};
    j.mainRepJ1=[...j.mainRepJ1, nouvelleCarte];
    j.mainJokJ1=j.mainJokJ1.filter(x=>x.id!=="j4");
    j.repChoisie=nouvelleCarte;
    AUDIO.sfxBadge();
    showToast(`🔄 "${nouvelleCarte.name}" (${nouvelleCarte.pts} pts) piochée !`,"win",2500);
    render();
  },

  appliquerJoker(id){
    if(G._apresInt){ clearTimeout(G._apresInt); G._apresInt=null; }
    const j=S.jeu;
    let joker=id?j.mainJokJ1.find(x=>x.id===id):null;
    if(joker)j.mainJokJ1=j.mainJokJ1.filter(x=>x.id!==id);
    if(joker){
      AUDIO.sfxJoker();
      const tot=(j.repChoisie?.pts||0)+(j.repIA?.pts||0);
      const ptsGain=joker.id==="j1"?tot:joker.id==="j2"?tot*2:null;
      showJokerOverlay(joker,ptsGain,"joueur",()=>G.resoudre(j.repChoisie,j.repIA,joker));
    }else{
      G.resoudre(j.repChoisie,j.repIA,null);
    }
  },

  resoudre(cJ1,cIA,jokerFinal){
    const j=S.jeu;
    let jIAUsed=null;
    if(j.mainJokJ2.length>0){
      const p1=cJ1?.pts||0,p2=cIA?.pts||0;
      const brak=j.mainJokJ2.find(x=>x.id==="j1"),mult=j.mainJokJ2.find(x=>x.id==="j2");
      if(S.diff==="Expert"){if(p1>p2&&brak)jIAUsed=brak;else if(p2>=p1&&mult)jIAUsed=mult;}
      else if(S.diff==="Intermédiaire"&&Math.random()<0.25)jIAUsed=pick(j.mainJokJ2);
      else if(S.diff==="Débutant"&&Math.random()<0.08)jIAUsed=pick(j.mainJokJ2);
      if(jIAUsed)j.mainJokJ2=j.mainJokJ2.filter(x=>x.id!==jIAUsed.id);
    }
    // IA joue un joker offensif → overlay IA avant le calcul
    if(!jokerFinal&&jIAUsed&&(jIAUsed.id==="j1"||jIAUsed.id==="j2")){
      const tot=(cJ1?.pts||0)+(cIA?.pts||0);
      const ptsPerdus=jIAUsed.id==="j1"?tot:tot*2;
      showJokerOverlay(jIAUsed,ptsPerdus,"ia",()=>G._calcul(cJ1,cIA,jokerFinal,jIAUsed));
      return;
    }
    G._calcul(cJ1,cIA,jokerFinal,jIAUsed);
  },

  _calcul(cJ1,cIA,jokerFinal,jIAUsed){
    const j=S.jeu;
    const iaPr=IA_PROFILS[S.diff]||IA_PROFILS.Intermédiaire;
    let p1=cJ1?.pts||0,p2=cIA?.pts||0;
    const tot=p1+p2; // total des deux cartes jouées cette manche

    // ── Brakeur joueur : vole TOUT le pot (p1+p2), même si IA ou joueur a passé ──
    if(jokerFinal?.id==="j1"){
      p1=tot; // le joueur prend tout
      p2=0;
    }
    // ── Multiplicateur joueur : double le total ──
    else if(jokerFinal?.id==="j2"){
      p1=tot*2;
      p2=0;
    }
    // ── Brakeur IA : l'IA vole tout le pot, même si joueur a passé ──
    if(!jokerFinal&&jIAUsed?.id==="j1"){
      p2=tot; // l'IA prend tout
      p1=0;
    }
    // ── Multiplicateur IA ──
    else if(!jokerFinal&&jIAUsed?.id==="j2"){
      p2=tot*2;
      p1=0;
    }

    let msg="",xpG=0,gagnant=0;
    const j1p=!cJ1&&jokerFinal?.id!=="j1"; // passe réel = pas de carte ET pas de Brakeur
    const iap=!cIA&&jIAUsed?.id!=="j1";

    // Stocker gain réel (après joker) pour affichage phase fin
    j.gainFinal={p1,p2,joker:jokerFinal?.id||jIAUsed?.id||null};

    if(!cJ1&&!cIA&&!jokerFinal&&!jIAUsed){
      msg="🤝 Aucune carte — égalité !";
      j.gainFinal={p1:0,p2:0,joker:null};
      j.msg=msg;j.phase="fin";
      showToast(msg,"info",1800);
      render();
      // Manche suivante automatique après 1.8s
      setTimeout(()=>G.mancheSuivante(),1900);
      return;
    }
    // Brakeur joueur — il prend tout même si l'IA a une carte
    else if(jokerFinal?.id==="j1"){
      j.s1+=p1;
      msg=`💀 BRAKEUR ! ${S.nom} rafle +${p1} pts !`;
      xpG=p1*2;gagnant=1;showAnimPts(p1);
    }
    // Brakeur IA — elle prend tout
    else if(!jokerFinal&&jIAUsed?.id==="j1"){
      j.s2+=p2;
      msg=`💀 Brakeur IA ! L'IA rafle +${p2} pts`;
    }
    else if(j1p&&iap){msg="🤝 Aucune carte — égalité !";}
    else if(j1p){j.s2+=p2;msg=`💔 IA gagne +${p2} pts`;}
    else if(iap){
      j.s1+=p1;
      msg=`🏆 ${S.nom} gagne +${p1} pts !`;
      xpG=p1*2;gagnant=1;showAnimPts(p1);
    }
    else if(p1>p2){
      const gain=p1+p2;
      j.s1+=gain;
      if(jokerFinal?.id==="j2") msg=`🏆 ×2 ! ${S.nom} gagne +${gain} pts !`;
      else msg=`🏆 ${S.nom} gagne +${gain} pts !`;
      xpG=gain*2;gagnant=1;showAnimPts(gain);
    }
    else if(p2>p1){j.s2+=p1+p2;msg=`💔 IA gagne +${p1+p2} pts`;}
    else{msg="🤝 Égalité !";}
    j.manchesGagnees+=gagnant;
    j.streak=gagnant?j.streak+1:0;
    j.maxStreak=Math.max(j.maxStreak,j.streak);
    if(j.b1)j.piliers[j.b1]=(j.piliers[j.b1]||0)+1;
    if(jokerFinal?.id==="j1"&&gagnant)j.brakeurWin=true;
    if(jokerFinal?.id==="j2"&&gagnant)j.multiWin=true;
    if(cJ1?.pts===40)j.cartes40++;
    // Remontada : était à -60 ou plus et gagne maintenant
    if(gagnant===1&&(j.s2-j.s1+p1+p2)>=60)j.remontada=true;
    if(cJ1){const[a,b]=cJ1.combo.split("+");j.profil[a]=(j.profil[a]||0)+Math.round(cJ1.pts/2);j.profil[b]=(j.profil[b]||0)+Math.round(cJ1.pts/2);}
    G.checkBadges(j);
    if(xpG>0)S.xp+=xpG;
    j.jIA=jIAUsed;j.jActif=jokerFinal||j.jActif;j.msg=msg;
    j.historique.push({manche:j.manche,b1:j.b1,b2:j.b2,cb:j.cb,cJ1,cIA,jokerFinal,jIAUsed,gagnant});
    const tp=gagnant===1?"win":gagnant===0&&!j1p&&!iap?"info":"lose";
    if(gagnant===1)AUDIO.sfxWin();
    else if(tp==="lose")AUDIO.sfxLose();
    showToast(msg,tp);
    setTimeout(()=>G.showIADlg(pick(iaPr.dlg[gagnant===1?"perd":gagnant===0&&!j1p&&!iap?"egal":"gagne"])),400);
    j.phase="fin";
    render();
    // Bonus imprévisible — alterne entre Question et Bonus du Sage
    // Toujours planifier mancheSuivante — annulée si bonus se lance
    if(G._apresInt) clearTimeout(G._apresInt);
    G._apresInt=setTimeout(function(){
      G._apresInt=null;
      if(S.jeu&&S.jeu.phase==="fin"&&!TOURNOI.actif) G.mancheSuivante();
    }, 2000);

    if(j.bonusManches&&j.bonusManches.has(j.manche)){
      setTimeout(()=>{
        const sbOv=document.getElementById("sage-bonus-overlay");
        const bOv=document.getElementById("bonus-overlay");
        if(sbOv?.classList.contains("active")||bOv?.classList.contains("active")) return;
        // Annuler le setTimeout et laisser le bonus gérer la manche suivante
        if(G._apresInt){ clearTimeout(G._apresInt); G._apresInt=null; }
        if(j.manche%2===0) BONUS_SAGE.launch();
        else BONUS.launch();
      }, 1800);
    }
  },

  mancheSuivante(){
    if(!S.jeu) return; // Sécurité tournoi
    const j=S.jeu;
    if(j.manche>=j.total||j.mainRepJ1.length===0){
      G.finPartie();return;
    }
    G._doMancheSuivante(j);
  },

  _doMancheSuivante(j){
    const prochain=j.premier==="j1"?"ia":"j1";
    j.premier=prochain;j.manche++;
    j.b1=null;j.b2=null;j.cb=null;
    j.repChoisie=null;j.repIA=null;j.msg="";j.lastBonusQ=j.lastBonusQ||null;
    j.jActif=null;j.jIA=null;j.espionActif=false;j.repIAVues=[];j.phaseEchange=false;j.gainFinal=null;
    if(prochain==="ia"){
      // Choisir un pilier où l'IA a encore des cartes disponibles
      const piliersDispo=PILIERS.filter(p=>
        PILIERS.some(p2=>p2!==p&&j.mainRepJ2.some(c=>c.combo===mkCombo(p,p2)))
      );
      j.b2=piliersDispo.length>0?pick(piliersDispo):pick(PILIERS);
      j.phase="iaChoisitBase";
    }
    else j.phase="choixBase";
    render();
  },

  finPartie(){
    const j=S.jeu;
    // Mode Tournoi — passer à l'étape suivante
    if(TOURNOI&&TOURNOI.actif){
      var _ts1=j.s1||0, _ts2=j.s2||0;
      S.jeu=null;
      S.ecran="menu";
      render();
      TOURNOI.finEtape(_ts1,_ts2);
      return;
    }
    // Sauvegarder données de partage avant tout
    var _gagne=j.s1>j.s2;
    _partageData="⚖️ ÉQUILIBRE — "+(_gagne?"VICTOIRE 🏆":"DÉFAITE 💀")+"!\n"
      +(S.nom||"Joueur")+" : "+j.s1+" pts vs IA : "+j.s2+" pts\n"
      +"Manches : "+(j.manche-1)+"/"+j.total+" | #Equilibre #JeuDeCartes";
    // Son victoire/défaite finale
    if(j.s1>j.s2) setTimeout(function(){AUDIO.sfxFanfare();},400);
    else AUDIO.sfxLose();
    // Sauvegarder dans historique
    if(!S.historiqueParties) S.historiqueParties=[];
    S.historiqueParties.unshift({
      date:new Date().toLocaleDateString('fr-FR'),
      s1:j.s1,s2:j.s2,
      gagne:j.s1>j.s2,
      diff:S.diff,
      manches:j.manche-1
    });
    if(S.historiqueParties.length>10) S.historiqueParties.pop();
    sauvegarder();
    // Vérifier défis
    let bonusXP=0;
    DEFIS.forEach(d=>{
      if(!S.defisDone.includes(d.id)){
        const ok=d.check(j.historique,j.s1,j.s2,S.diff,j.maxStreak);
        if(ok){S.defisDone.push(d.id);bonusXP+=d.xp;showToast(`${d.icon} Défi accompli ! +${d.xp} XP`,"badge",3500);}
      }
    });
    S.xp+=bonusXP;
    // Badge battu expert — AVANT checkBadges
    if(S.diff==="Expert"&&j.s1>j.s2)j.battuExpert=true;
    j.battuExpert=j.battuExpert; // expose sur l'objet jeu
    G.checkBadges(j);
    // Classement
    S.classement.push({nom:S.nom,pts:j.s1,xp:S.xp});
    enregistrerStat(j.s1>j.s2?"win":(j.s1<j.s2?"lose":"draw"), j.s1, j.profil);
    S.classement.sort((a,b)=>b.pts-a.pts);
    S.classement=S.classement.slice(0,10);
    // Survie
    if(S.survieActif&&j.s1<=j.s2){
      S.viesSurvie--;
      if(S.viesSurvie<=0){S.survieActif=false;S.viesSurvie=3;}
    }
    if(S.jeu&&S.jeu.s1>S.jeu.s2)celebrerVictoire(S.jeu.s1);
    S.ecran="resultat";sauvegarder();render();
  },

  checkBadges(jeu){
    const statsObj={
      streak:jeu.streak,piliers:jeu.piliers,manchesGagnees:jeu.manchesGagnees,
      brakeurWin:jeu.brakeurWin,multiWin:jeu.multiWin,cartes40:jeu.cartes40,
      remontada:jeu.remontada,battuExpert:jeu.battuExpert
    };
    BADGES.forEach(b=>{
      if(!S.badgesTotal.includes(b.id)&&b.check(statsObj)){
        S.badgesTotal.push(b.id);
        AUDIO.sfxBadge();
        showToast(`${b.icon} Badge débloqué : ${b.name} !`,"badge",3500);
      }
    });
  },

  showIADlg(texte,delay=0){
    const j=S.jeu;if(!j)return;
    j.iaTyping=true;j.iaDlg=null;
    // Ne pas re-render si on est en phase fin (résultat déjà affiché)
    if(j.phase!=="fin") render();
    setTimeout(()=>{j.iaTyping=false;j.iaDlg=texte;if(S.jeu?.phase!=="fin")render();},delay+700);
    setTimeout(()=>{j.iaDlg=null;if(S.jeu?.phase!=="fin")render();},delay+4200);
  },

  // Timer
  _timerInt:null,
  _timerFired:false,
  startTimer(){
    const j=S.jeu;
    G._timerFired=false;
    clearInterval(G._timerInt);

    // ── Si aucune carte valide pour le joueur → passer immédiatement ──
    const validesJ1now=j.cb?j.mainRepJ1.filter(c=>c.combo===j.cb):[];
    const validesJ2now=j.cb?j.mainRepJ2.filter(c=>c.combo===j.cb):[];
    if(validesJ1now.length===0){
      // Joueur sans carte → passe immédiatement
      if(validesJ2now.length===0){
        // Les deux sans carte → manche suivante immédiate
        showToast("⚡ Aucune carte valide — manche suivante !","info",1500);
        setTimeout(()=>G.execRep(null),400);
      } else {
        // Seul le joueur passe, l'IA joue normalement
        showToast("⚠️ Aucune carte valide — passage automatique","info",1500);
        setTimeout(()=>G.execRep(null),400);
      }
      return;
    }

    // ── Timer 20s normal ──
    j.timerSec=20;
    G._timerInt=setInterval(()=>{
      if(!S.jeu||S.jeu.phase!=="afficheBases"){clearInterval(G._timerInt);return;}
      j.timerSec--;
      G.updateTimer();
      if(j.timerSec<=0){
        clearInterval(G._timerInt);
        if(!G._timerFired){
          G._timerFired=true;
          if(S.jeu?.repChoisie) G.jouerRep();
          else G.execRep(null);
        }
      }
    },1000);
  },
  stopTimer(){
    clearInterval(G._timerInt);
    G._timerFired=true; // empêche double appel
    if(S.jeu)S.jeu.timerSec=0;
  },
  updateTimer(){
    const el=document.getElementById("timerNum");
    const bar=document.getElementById("timerBar");
    if(!el||!bar)return;
    const sec=S.jeu?.timerSec||0;
    const col=sec<=5?"#e05555":sec<=10?"#FFA500":"#45c97a";
    el.textContent=sec;el.style.color=col;
    bar.style.width=(sec/20*100)+"%";bar.style.background=col;
    if(sec<=5)el.closest?.(".timer-wrap")?.style?.setProperty?.("animation","urgence 0.5s infinite");
  },
};

    {i:"⚡",t:"Jokers &amp; Bonus",d:"Vous avez <strong style='color:var(--goldL)'>2 Jokers</strong> pour renverser une manche. Et des <strong style='color:var(--goldL)'>bonus surprise</strong> (Sage, Questions) rapportent des points en cours de partie."},
    {i:"🎮",t:"À vous de jouer !",d:"4 modes : Solo vs IA, Survie, <strong style='color:var(--goldL)'>Duel 1v1 en ligne</strong> et Tournoi. Besoin d'un rappel ? Le bouton <strong style='color:var(--goldL)'>📖 Comment jouer</strong> est toujours là. Bonne partie !"}
  ];
  var idx=0;
  var ov=document.createElement("div");
  ov.id="tuto-overlay";
  ov.style.cssText="position:fixed;inset:0;z-index:99990;display:flex;align-items:center;justify-content:center;background:rgba(7,5,20,0.96);padding:22px";
  document.body.appendChild(ov);
  function fermer(){ try{ localStorage.setItem("equilibre_tuto_vu","1"); }catch(e){} if(ov&&ov.parentNode) ov.parentNode.removeChild(ov); }
  function dessine(){
    var e=etapes[idx], dots="";
    for(var k=0;k<etapes.length;k++){ dots+='<div style="width:8px;height:8px;border-radius:50%;background:'+(k===idx?'var(--goldL)':'rgba(255,255,255,0.2)')+'"></div>'; }
    var dernier=(idx===etapes.length-1);
    ov.innerHTML='<div style="width:100%;max-width:360px;background:linear-gradient(160deg,#1a0a35,#0a0520);border:2px solid var(--gold);border-radius:22px;padding:28px 22px 22px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.6);position:relative">'
      +'<div onclick="__tutoSkip()" style="position:absolute;top:12px;right:14px;font-size:11px;color:var(--muted);cursor:pointer;letter-spacing:1px">Passer ✕</div>'
      +'<div style="font-size:58px;margin-bottom:12px;line-height:1">'+e.i+'</div>'
      +'<div style="font-family:Cinzel,serif;font-size:19px;font-weight:900;color:var(--goldL);margin-bottom:12px;line-height:1.3">'+e.t+'</div>'
      +'<div style="font-size:14px;color:var(--text);line-height:1.7;margin-bottom:20px">'+e.d+'</div>'
      +'<div style="display:flex;justify-content:center;gap:6px;margin-bottom:20px">'+dots+'</div>'
      +'<div style="display:flex;gap:10px">'
      +(idx>0?'<button onclick="__tutoPrev()" style="flex:1;min-height:46px;border-radius:12px;border:1px solid rgba(212,175,55,0.4);background:transparent;color:var(--goldL);font-weight:700;font-size:14px;cursor:pointer">← Précédent</button>':'')
      +'<button onclick="__tutoNext()" style="flex:2;min-height:46px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),var(--goldL));color:#12082e;font-family:Cinzel,serif;font-weight:900;font-size:15px;cursor:pointer">'+(dernier?'🎮 Commencer !':'Suivant →')+'</button>'
      +'</div></div>';
  }
  window.__tutoNext=function(){ if(idx<etapes.length-1){ idx++; dessine(); } else { fermer(); } };
  window.__tutoPrev=function(){ if(idx>0){ idx--; dessine(); } };
  window.__tutoSkip=function(){ fermer(); };
  dessine();
}

// Données de partage
var _partageData=null;

function partagerResultat(){
  // Construire le texte
  var txt=_partageData;
  if(!txt && S.jeu){
    var j=S.jeu;
    var g=j.s1>j.s2;
    txt="⚖️ ÉQUILIBRE\n"
      +(g?"🏆 VICTOIRE !":"💀 DÉFAITE")+"\n"
      +(S.nom||"Joueur")+": "+j.s1+" pts | IA: "+j.s2+" pts\n"
      +"#Equilibre";
  }
  if(!txt){ showToast("Pas de résultat à partager","info",2000); return; }

  // iOS Safari : navigator.share sans URL (plus compatible)
  try {
    if(navigator && navigator.share){
      navigator.share({title:"ÉQUILIBRE",text:txt}).catch(function(){});
      return;
    }
  } catch(e){}

  // Fallback : copier dans presse-papiers
  try {
    if(navigator && navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){
        showToast("✅ Résultat copié ! Collez dans WhatsApp 📋","win",3000);
      }).catch(function(){
        _partagerFallback(txt);
      });
      return;
    }
  } catch(e){}

  _partagerFallback(txt);
}

function _partagerFallback(txt){
  // Créer un textarea temporaire pour copier
  var ta=document.createElement("textarea");
  ta.value=txt;
  ta.style.cssText="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;padding:10px;border-radius:8px;width:80%;font-size:14px;";
  document.body.appendChild(ta);
  ta.select();
  ta.setSelectionRange(0,99999);
  try{ document.execCommand("copy"); showToast("✅ Copié !","win",2000); }
  catch(e){ showToast("📋 "+txt.slice(0,50),"info",4000); }
  setTimeout(function(){if(ta.parentNode)ta.parentNode.removeChild(ta);},500);
}

// Partage du résultat de Duel — chaîne robuste (partage natif → presse-papiers → repli visible)
function partagerResultatDuel(){
  var gs=DUEL.gs||{};
  var ms=DUEL.isHost?(gs.s1||0):(gs.s2||0);
  var as=DUEL.isHost?(gs.s2||0):(gs.s1||0);
  var advNom=(DUEL.adversaire&&DUEL.adversaire.nom)||"Adversaire";
  var res=ms>as?"VICTOIRE 🏆":(ms===as?"ÉGALITÉ 🤝":"DÉFAITE 💀");
  var txt="⚖️ ÉQUILIBRE DUEL — "+res+" !\n"
    +(S.nom||"Vous")+" : "+ms+" pts vs "+advNom+" : "+as+" pts\n"
    +"#Equilibre #Duel1v1";
  // 1) Partage natif
  try {
    if(navigator && navigator.share){
      navigator.share({title:"ÉQUILIBRE",text:txt}).catch(function(err){
        // annulation = normal ; autre échec → on copie
        if(!(err && err.name==="AbortError")){
          if(navigator.clipboard&&navigator.clipboard.writeText){
            navigator.clipboard.writeText(txt).then(function(){showToast("✅ Copié !","win",2500);}).catch(function(){_partagerFallback(txt);});
          } else _partagerFallback(txt);
        }
      });
      return;
    }
  } catch(e){}
  // 2) Presse-papiers
  try {
    if(navigator && navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){showToast("✅ Résultat copié ! Collez où vous voulez 📋","win",3000);}).catch(function(){_partagerFallback(txt);});
      return;
    }
  } catch(e){}
  // 3) Repli visible garanti
  _partagerFallback(txt);
}

// Reconnexion immédiate dès que le réseau revient ou que l'app repasse au premier plan
function _relancerReconDuel(){
  if(typeof DUEL!=="undefined" && DUEL._recon && DUEL._recon.active){
    if(DUEL._recon.timer){ clearTimeout(DUEL._recon.timer); DUEL._recon.timer=null; }
    DUEL._reconnecter();
  }
}
// ── Détection d'une coupure silencieuse (appel téléphonique / app en arrière-plan) ──
function _duelEnJeu(){
  return (typeof DUEL!=="undefined") && DUEL.gs && !DUEL.demo && !DUEL._quitVolontaire
      && (S.ecran==="duel_jeu" || S.ecran==="duel_lobby");
}
// Battement de cœur : chaque pair envoie un ping toutes les 5 s ; l'autre répond pong.
// Si plus rien n'arrive pendant 15 s, la connexion est considérée coupée.
function _duelHeartbeat(){
  if(!_duelEnJeu() || !DUEL._lastRx) return;      // jamais connecté encore → rien à surveiller
  if(DUEL._recon && DUEL._recon.active) return;    // reconnexion déjà en cours
  var conn=DUEL.conn;
  if(!conn || !conn.open){ DUEL._onDisconnect(); return; }
  DUEL._send({type:"ping"});
  if(Date.now()-DUEL._lastRx > 15000) DUEL._onDisconnect();
}
setInterval(_duelHeartbeat, 5000);
// Au retour au premier plan / réseau (ex. fin d'appel) : vérifier activement que la connexion vit.
function _duelVerifierConnexion(){
  if(!_duelEnJeu() || !DUEL._lastRx) return;
  if(DUEL._recon && DUEL._recon.active){ _relancerReconDuel(); return; }
  var conn=DUEL.conn;
  if(!conn || !conn.open){ DUEL._onDisconnect(); return; }
  var avant=DUEL._lastRx;
  DUEL._send({type:"ping"});
  setTimeout(function(){
    if(!_duelEnJeu() || (DUEL._recon && DUEL._recon.active)) return;
    if((DUEL._lastRx||0) <= avant) DUEL._onDisconnect();   // aucune réponse → connexion morte
  }, 3500);
}
function _duelAuRetour(){
  try{ _relancerReconDuel(); }catch(e){}
  try{ _duelVerifierConnexion(); }catch(e){}
}
window.addEventListener("online", _duelAuRetour);
window.addEventListener("focus", _duelAuRetour);
document.addEventListener("visibilitychange",function(){
  if(document.visibilityState==="visible") _duelAuRetour();
});

          <div style="font-size:8px;color:var(--muted);letter-spacing:1px">RÉPONSE IA</div>
          ${j.repIA?carteRepHTML(j.repIA,{}):`<div style="display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border-radius:12px;padding:20px 10px;width:100%;font-size:12px;color:var(--muted);font-style:italic">Passé</div>`}
        </div>

      ${j.repChoisie||j.repIA?`

          <div style="font-size:10px;color:var(--gold);margin-bottom:4px;letter-spacing:1px">💬 SAGESSE DU TOUR</div>
          <div style="font-size:11px;color:var(--muted);font-style:italic;line-height:1.6">"${j.repChoisie.cit}"</div>
          <div style="font-size:10px;color:var(--goldL);margin-top:3px;font-weight:700">— ${j.repChoisie.name}</div>
        </div>`:""}

      <div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px">
        Cartes restantes : ${j.mainRepJ1.length} · Jokers : ${j.mainJokJ1.length}
        ${j.streak>=2?`<span style="margin-left:8px;color:#ff6b35">🔥 Streak ×${j.streak}</span>`:""}
      </div>
      <button class="btn-gold" onclick="AUDIO.sfxConfirm();G.mancheSuivante()">
        ${j.manche>=j.total?"🏆 Voir les résultats":`Manche suivante (${j.manche+1}/${j.total}) →`}
      </button>

  }

  // Découpe : tout ce qui précède la main reste FIGÉ ; seule la main (« VOS CARTES ») défile.
  // Découpe : tout ce qui précède le 1er repère <!--HAND--> reste FIGÉ ; le reste défile.
  var _mi=content.indexOf("<!--HAND-->");
  var _hasHand=_mi!==-1;
  var _cTop=_hasHand?content.slice(0,_mi):"";
  var _cHand=(_hasHand?content.slice(_mi+11):content).replace(/<!--HAND-->/g,"");

  app.innerHTML=`
  <div style="height:100vh;height:100dvh;overflow:hidden;background:transparent;font-family:'Crimson Text',Georgia,serif;color:var(--text);padding:min(12px,2vw);display:flex;flex-direction:column;gap:min(10px,1.5vw);max-width:var(--max-w);margin:0 auto;width:100%">

      <div style="font-size:10px;color:var(--muted)">Manche ${j.manche}/${j.total}</div>
      <button onclick="MULTI_CONFIRM_MENU()" style="background:rgba(255,80,80,0.12);border:1px solid rgba(255,80,80,0.3);border-radius:8px;padding:4px 10px;color:#e05555;font-size:11px;font-weight:700;cursor:pointer">🏠</button>
    </div>

    <!-- Score + piliers (figés) -->
    <div style="flex-shrink:0;width:100%">
      ${progrBar}
      ${scoreBarHTML(j.s1,j.s2,S.nom)}
      ${j.iaDlg||j.iaTyping?iaBulle(iaPr,j.iaDlg,j.iaTyping):""}
      ${_cTop}
    </div>

    <!-- Cartes-réponses (zone défilante) -->
    <div style="flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%">
      ${_cHand}
    </div>
  </div>`;

  // Auto iaRepond après 1.5s en phase j1AChoisi
  if(j.phase==="j1AChoisi"){
    if(G._iaInt) clearTimeout(G._iaInt);
    G._iaInt=setTimeout(function(){
      G._iaInt=null;
      if(S.jeu&&S.jeu.phase==="j1AChoisi") G.iaRepond();
    },1500);
  } else {
    if(G._iaInt){ clearTimeout(G._iaInt); G._iaInt=null; }
  }
}

// ── Invite « Ajouter à l'écran d'accueil » (PWA) ──
(function(){
  function estStandalone(){ try{ return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true; }catch(e){ return false; } }
  function dejaVu(){ try{ return !!localStorage.getItem("equilibre_install_vu"); }catch(e){ return true; } }
  function marquerVu(){ try{ localStorage.setItem("equilibre_install_vu","1"); }catch(e){} }
  function fermer(){ var b=document.getElementById("install-banner"); if(b&&b.parentNode) b.parentNode.removeChild(b); }
  function banniere(html){
    if(document.getElementById("install-banner")) return;
    var b=document.createElement("div"); b.id="install-banner";
    b.style.cssText="position:fixed;left:12px;right:12px;bottom:14px;z-index:99980;max-width:440px;margin:0 auto;background:linear-gradient(135deg,#1a0a35,#0a0520);border:1.5px solid var(--gold);border-radius:16px;padding:13px 15px;box-shadow:0 8px 30px rgba(0,0,0,0.55);display:flex;align-items:center;gap:12px;animation:popIn 0.4s both";
    b.innerHTML=html; document.body.appendChild(b);
  }
  window.__installPlusTard=function(){ marquerVu(); fermer(); };
  var deferred=null;
  window.addEventListener("beforeinstallprompt",function(e){
    e.preventDefault(); deferred=e;
    if(estStandalone()||dejaVu()) return;
    setTimeout(function(){ banniere(
      '<div style="font-size:26px">📲</div>'
      +'<div style="flex:1;font-size:12px;color:var(--text);line-height:1.45"><strong style="color:var(--goldL)">Installer ÉQUILIBRE</strong><br>Ajoutez le jeu à votre écran d\'accueil.</div>'
      +'<button onclick="__installGo()" style="min-height:40px;padding:0 14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold),var(--goldL));color:#12082e;font-family:Cinzel,serif;font-weight:900;font-size:13px;cursor:pointer">Installer</button>'
      +'<div onclick="__installPlusTard()" style="font-size:14px;color:var(--muted);cursor:pointer;padding:2px 4px">✕</div>'
    ); },4000);
  });
  window.__installGo=function(){ fermer(); marquerVu(); if(deferred){ try{ deferred.prompt(); }catch(e){} deferred=null; } };
  window.addEventListener("appinstalled",function(){ marquerVu(); fermer(); });
  var ua=navigator.userAgent||"";
  var estIOS=/iphone|ipad|ipod/i.test(ua) && !window.MSStream;
  var estSafari=/^((?!chrome|android|crios|fxios|edgios).)*safari/i.test(ua);
  if(estIOS && estSafari && !estStandalone() && !dejaVu()){
    setTimeout(function(){ banniere(
      '<div style="font-size:26px">📲</div>'
      +'<div style="flex:1;font-size:12px;color:var(--text);line-height:1.45"><strong style="color:var(--goldL)">Installer ÉQUILIBRE</strong><br>Appuyez sur <strong>Partager</strong> ⬆️ puis <strong>« Sur l\'écran d\'accueil »</strong>.</div>'
      +'<div onclick="__installPlusTard()" style="font-size:14px;color:var(--muted);cursor:pointer;padding:2px 6px">✕</div>'
    ); },5000);
  }
})();
</script>

<script>
/* PWA : enregistrement du service worker (installable + hors-ligne).
   Chemin relatif → compatible avec un déploiement en sous-dossier (github.io/equilibre-jeu/).
   Certains contextes refusent l'enregistrement (aperçu in-app / WKWebView "app-bound domains",
   file://) : ce n'est PAS bloquant, le jeu fonctionne quand même. On échoue en silence. */
if("serviceWorker" in navigator &&
   (location.protocol==="https:" || location.hostname==="localhost" || location.hostname==="127.0.0.1")){
  window.addEventListener("load",function(){
    try{
      var p=navigator.serviceWorker.register("sw.js");
      if(p&&p.catch) p.catch(function(){ /* contexte restreint : ignoré */ });
    }catch(e){ /* ignoré */ }
  });
}
</script>
