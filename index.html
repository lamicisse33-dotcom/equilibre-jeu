<html lang="fr">

<title>⚖️ ÉQUILIBRE — Les 4 Piliers de Vie</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#D4AF37;--goldL:#F0D060;--text:#EEE8D5;--muted:#9B8FA8;
  --red:#e05555;--green:#45c97a;--deep:#070514;--dark:#0F0A28;
  /* Mobile first */
  --card-w:min(110px,25vw);--card-h:min(156px,36vw);
  --pilier-sm:min(76px,17vw);--pilier-md:min(86px,20vw);--pilier-lg:min(104px,23vw);
  --gap-sm:6px;--gap-md:8px;
  --font-base:13px;
  --max-w:480px;
}
/* Tablette */
@media(min-width:600px){
  :root{
    --card-w:120px;--card-h:170px;
    --pilier-sm:86px;--pilier-md:100px;--pilier-lg:120px;
    --gap-sm:8px;--gap-md:12px;
    --max-w:560px;
  }
}
/* Desktop */
@media(min-width:900px){
  :root{
    --card-w:130px;--card-h:185px;
    --pilier-sm:96px;--pilier-md:112px;--pilier-lg:136px;
    --gap-sm:10px;--gap-md:16px;
    --max-w:680px;
  }
}
html,body{
  min-height:100vh;min-height:100dvh;
  background:var(--deep);color:var(--text);
  font-family:'Crimson Text',Georgia,serif;
  overscroll-behavior:none;overflow-x:hidden;
}
button{cursor:pointer;border:none;font-family:'Crimson Text',Georgia,serif;
  transition:all 0.16s;outline:none;-webkit-tap-highlight-color:transparent;}
button:active{transform:scale(0.94);}
input{font-family:'Crimson Text',Georgia,serif;outline:none;}
select{font-family:'Crimson Text',Georgia,serif;}

#app{min-height:100vh;min-height:100dvh;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--gold)44;border-radius:2px;}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0.78);opacity:0}65%{transform:scale(1.07)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes float{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-80px) scale(1.4)}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(212,175,55,0.2)}50%{box-shadow:0 0 36px rgba(212,175,55,0.65)}}
@keyframes trophyPop{0%{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.28) rotate(5deg)}80%{transform:scale(0.95) rotate(-2deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes shimmer{0%,100%{text-shadow:0 0 20px #D4AF37,0 0 40px #D4AF3777}50%{text-shadow:0 0 40px #F0D060,0 0 80px #D4AF37aa,0 0 120px #D4AF3744}}
@keyframes pulseScore{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes starPop{from{transform:scale(0) rotate(-30deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes cf{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes urgence{0%,100%{background:rgba(224,85,85,0.08)}50%{background:rgba(224,85,85,0.22)}}
@keyframes barFill{from{width:0}to{width:var(--w)}}

.fade{animation:fadeIn 0.28s ease both;}
.pop{animation:popIn 0.38s cubic-bezier(.34,1.56,.64,1) both;}
.slideUp{animation:slideUp 0.4s ease both;}
.slide{animation:slideIn 0.25s ease both;}

/* Layout */
.screen{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;padding:16px;width:100%;max-width:var(--max-w);margin:0 auto;}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;padding:0 16px;}
.w100{width:100%;max-width:var(--max-w);}
/* Desktop : fond avec motif autour du panneau de jeu */
@media(min-width:900px){
  body{background:radial-gradient(ellipse at center,#0d0830 0%,var(--deep) 70%);}
  #app>div{box-shadow:0 0 80px rgba(212,175,55,0.15);}
}

/* Boutons */
.btn-gold{width:100%;padding:14px 0;border-radius:12px;font-size:16px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:var(--deep);
  box-shadow:0 4px 20px rgba(212,175,55,0.4);}
.btn-ghost{width:100%;padding:12px 0;border-radius:12px;font-size:14px;font-weight:600;
  background:rgba(255,255,255,0.06);color:var(--text);border:1px solid rgba(212,175,55,0.25);}
.btn-ghost:hover{background:rgba(255,255,255,0.1);}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px);
  box-shadow:0 6px 28px rgba(212,175,55,0.55);}
@media(min-width:900px){
  .btn-gold{padding:16px 0;font-size:17px;border-radius:14px;}
  .btn-ghost{padding:13px 0;font-size:15px;}
}
.btn-gold:disabled{background:#333;color:#666;box-shadow:none;cursor:default;opacity:0.5;}
.btn-danger{border:1px solid rgba(255,107,53,0.4);color:#ff6b35;}

/* Cards */
.card{background:rgba(255,255,255,0.04);border-radius:16px;
  border:1px solid rgba(212,175,55,0.18);padding:16px;}
@media(min-width:900px){
  .card{padding:20px 24px;border-radius:18px;}
}
.card-glow{border-color:rgba(212,175,55,0.55);box-shadow:0 0 32px rgba(212,175,55,0.3);}

/* Pill */
.pill{display:inline-flex;align-items:center;gap:8px;
  background:rgba(212,175,55,0.1);border-radius:20px;padding:5px 16px;
  border:1px solid rgba(212,175,55,0.35);}

/* Toast */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:999;
  background:var(--dark);border-radius:12px;padding:11px 22px;
  font-size:14px;font-weight:700;white-space:nowrap;
  pointer-events:none;display:none;animation:popIn 0.3s both;
  border:1px solid rgba(212,175,55,0.3);
  box-shadow:0 4px 24px rgba(0,0,0,0.5);}
@media(min-width:900px){
  #toast{font-size:15px;padding:13px 28px;}
}

/* Anim pts */
#animPts{position:fixed;top:30%;left:50%;z-index:700;
  font-size:60px;font-weight:900;pointer-events:none;display:none;
  font-family:'Cinzel',serif;text-shadow:0 0 30px var(--gold),0 0 60px rgba(212,175,55,0.4);}

/* Score bar */
.score-bar-bg{height:8px;border-radius:4px;background:rgba(255,255,255,0.07);overflow:hidden;}
.score-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--goldL));transition:width 0.6s;}

/* XP bar */
.xp-bar-bg{height:5px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden;margin-top:3px;}
.xp-bar-fill{height:100%;border-radius:3px;transition:width 1s;}

/* ── Carte Pilier ───────────────────────────── */
.pilier-card{
  border-radius:18px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;user-select:none;
  transition:transform 0.2s,box-shadow 0.2s,filter 0.2s;
  position:relative;flex-shrink:0;overflow:hidden;
}
.pilier-card:active{transform:scale(0.93) !important;}
.pilier-card.selected{
  transform:scale(1.12) !important;
  box-shadow:0 0 0 2px #F0D06088,0 0 40px rgba(240,208,96,0.7),0 16px 40px rgba(0,0,0,0.8) !important;
}
.pilier-card.disabled{opacity:0.75;cursor:default;transform:none !important;}
.pilier-card.played{opacity:0.38;filter:brightness(0.5) saturate(0.4);cursor:default;transform:none !important;}
.pilier-card.glow{animation:glow 2s infinite;}

/* ── Carte Réponse ──────────────────────────── */
.carte-rep{
  border-radius:16px;display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  user-select:none;transition:transform 0.18s,box-shadow 0.18s;
  flex-shrink:0;width:var(--card-w);min-height:var(--card-h);
  position:relative;overflow:hidden;
}
.carte-rep.clickable{cursor:pointer;}
.carte-rep.clickable:active{transform:scale(0.93) !important;}
.carte-rep.selected{
  transform:scale(1.1) !important;
  box-shadow:0 0 0 2px #F0D06088,0 0 36px rgba(240,208,96,0.65),0 16px 36px rgba(0,0,0,0.8) !important;
}
.carte-rep.disabled{opacity:0.75;cursor:default;}
.carte-rep .pts-num{font-family:'Cinzel',serif;line-height:1;font-weight:900;}

/* ── Carte Joker ────────────────────────────── */
.carte-joker{
  border-radius:16px;display:flex;flex-direction:column;
  align-items:center;cursor:pointer;
  transition:transform 0.18s,box-shadow 0.18s;
  user-select:none;flex:1;position:relative;overflow:hidden;
}
.carte-joker:active{transform:scale(0.93);}
.carte-joker.used{opacity:0.12;cursor:default;filter:saturate(0) brightness(0.3);}

/* Joker overlay cinématique */
#joker-overlay{
  position:fixed;inset:0;z-index:800;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;
}
#joker-overlay.active{display:flex;}

@keyframes jokerFlash{
  0%{opacity:0;transform:scale(0.4) rotate(-10deg);}
  30%{opacity:1;transform:scale(1.18) rotate(3deg);}
  55%{transform:scale(0.96) rotate(-1deg);}
  70%{transform:scale(1.06) rotate(1deg);}
  100%{transform:scale(1) rotate(0deg);opacity:1;}
}
@keyframes jokerGlow{
  0%,100%{box-shadow:0 0 40px var(--jcolor),0 0 80px var(--jcolor)55;}
  50%{box-shadow:0 0 80px var(--jcolor),0 0 160px var(--jcolor)88,0 0 240px var(--jcolor)33;}
}
@keyframes jokerBg{
  0%{opacity:0;}25%{opacity:1;}80%{opacity:1;}100%{opacity:0;}
}
@keyframes ripple{
  0%{transform:scale(0);opacity:0.8;}
  100%{transform:scale(3.5);opacity:0;}
}
@keyframes jokerTitle{
  0%{opacity:0;transform:translateY(20px) scale(0.8);}
  50%{opacity:1;transform:translateY(-4px) scale(1.05);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}
@keyframes jokerSub{
  0%,40%{opacity:0;transform:translateY(10px);}
  100%{opacity:1;transform:translateY(0);}
}
@keyframes screenShake{
  0%,100%{transform:translateX(0);}
  15%{transform:translateX(-8px);}
  30%{transform:translateX(8px);}
  45%{transform:translateX(-5px);}
  60%{transform:translateX(5px);}
  75%{transform:translateX(-2px);}
  90%{transform:translateX(2px);}
}

.joker-overlay-bg{
  position:absolute;inset:0;
  animation:jokerBg 2.5s ease forwards;
}
.joker-card-big{
  width:180px;min-height:240px;border-radius:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:20px 14px;position:relative;z-index:2;
  animation:jokerFlash 0.6s cubic-bezier(.34,1.56,.64,1) both, jokerGlow 1s 0.5s infinite;
  border:3px solid var(--jcolor);
}
.joker-ripple{
  position:absolute;width:200px;height:200px;border-radius:50%;
  border:3px solid var(--jcolor);z-index:1;
  animation:ripple 1s 0.3s ease-out infinite;
}
.joker-title-big{
  font-family:'Cinzel',serif;font-size:28px;font-weight:900;letter-spacing:3px;
  color:var(--goldL);text-align:center;z-index:2;
  animation:jokerTitle 0.5s 0.4s both;
  text-shadow:0 0 20px var(--jcolor),0 0 40px var(--jcolor)88;
}
.joker-desc-big{
  font-size:14px;color:var(--muted);text-align:center;z-index:2;
  max-width:260px;line-height:1.6;
  animation:jokerSub 0.6s 0.7s both;
}
.joker-pts-reveal{
  font-family:'Cinzel',serif;font-size:52px;font-weight:900;
  z-index:2;animation:jokerSub 0.5s 1s both;
}

/* Carte joker */
.carte-joker{border-radius:12px;padding:10px 5px;display:flex;flex-direction:column;
  align-items:center;gap:4px;cursor:pointer;transition:all 0.2s;user-select:none;flex:1;}
.carte-joker.used{opacity:0.18;cursor:default;}







/* ── Jackpot Flash ────────────────────────────── */
#jackpot-overlay{
  position:fixed;inset:0;z-index:902;
  display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0);
  transition:background 0.5s;
  overflow-y:auto;

}
#jackpot-overlay.active{
  display:flex !important;
  flex-direction:column;
}
#jackpot-overlay.show{background:rgba(0,0,0,0.93);}

@keyframes jackpotEntry{
  0%{transform:scale(0.2) rotate(-6deg);opacity:0;}
  60%{transform:scale(1.07) rotate(2deg);}
  80%{transform:scale(0.97);}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
@keyframes reelSpin{
  0%{transform:translateY(0);}
  100%{transform:translateY(-300%);}
}
@keyframes jackpotWin{
  0%,100%{box-shadow:0 0 20px var(--gold),0 0 40px var(--gold)55;}
  50%{box-shadow:0 0 60px var(--goldL),0 0 120px var(--gold)99;}
}
@keyframes symbolPop{
  0%{transform:scale(0) rotate(-20deg);opacity:0;}
  70%{transform:scale(1.3) rotate(5deg);}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
@keyframes flashLight{
  0%,100%{opacity:1;}
  50%{opacity:0.3;}
}

/* ── Jeu Bonus ────────────────────────────────── */
#bonus-overlay{
  position:fixed;inset:0;z-index:900;display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0);
  transition:background 0.5s;
}
#bonus-overlay.active{display:flex !important;flex-direction:column;}
#bonus-overlay.show{background:rgba(0,0,0,0.88);}

/* Animation oiseau — vole depuis le haut en arc avant d'atterrir */
@keyframes bonusEntry{
  0%  {transform:translateY(-120vh) translateX(60px) rotate(-20deg) scale(0.4);opacity:0;}
  30% {transform:translateY(-30px) translateX(-15px) rotate(5deg) scale(1.05);opacity:1;}
  55% {transform:translateY(12px) translateX(6px) rotate(-3deg) scale(0.97);}
  72% {transform:translateY(-8px) translateX(-3px) rotate(1deg) scale(1.02);}
  85% {transform:translateY(4px) translateX(1px) rotate(0deg) scale(0.99);}
  100%{transform:translateY(0) translateX(0) rotate(0deg) scale(1);opacity:1;}
}
@keyframes bonusGlow{
  0%,100%{box-shadow:0 0 40px #D4AF37,0 0 80px #D4AF3766,0 0 120px #D4AF3733;}
  50%    {box-shadow:0 0 60px #F0D060,0 0 120px #F0D06099,0 0 200px #D4AF3766;}
}
@keyframes starSpin{
  from{transform:rotate(0deg);}to{transform:rotate(360deg);}
}
@keyframes bonusTitle{
  0%  {letter-spacing:0px;opacity:0;}
  50% {letter-spacing:8px;opacity:1;}
  100%{letter-spacing:4px;opacity:1;}
}
@keyframes repPop{
  0%  {transform:translateX(-30px);opacity:0;}
  100%{transform:translateX(0);opacity:1;}
}
@keyframes pulseGold{
  0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,0);}
  50%    {box-shadow:0 0 0 8px rgba(212,175,55,0.2);}
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-5px);}
  80%{transform:translateX(5px);}
}
@keyframes confettiFall{
  0%  {transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}

/* IA bubble */
.ia-bubble{display:flex;align-items:flex-start;gap:10px;animation:slideIn 0.3s both;}
.ia-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid;}
.ia-text{flex:1;background:rgba(255,255,255,0.07);border-radius:0 12px 12px 12px;
  padding:10px 14px;}

/* Dots typing */
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);
  display:inline-block;animation:pulse 1s infinite;}

/* Timer */
.timer-num{font-family:'Cinzel',serif;font-weight:900;line-height:1;}

/* Combo badge */
.combo-badge{display:inline-flex;align-items:center;gap:6px;
  border-radius:20px;padding:4px 14px;border:1px solid rgba(212,175,55,0.35);}

/* Confettis */
.confetti-piece{position:absolute;top:-16px;animation:cf linear forwards;}

/* Desktop optimizations */
@media(min-width:640px){
  :root{--card-w:118px;--card-h:166px;}
  .screen{padding:24px;}
  .btn-gold{font-size:17px;padding:15px 0;}
  .pilier-card{min-width:100px;}
}

<div id="app"></div>

  <div id="jackpot-card" style="
    width:min(94vw,400px);

    border:3px solid var(--gold);border-radius:24px;

    animation:jackpotEntry 0.65s cubic-bezier(.34,1.56,.64,1) both;
    box-shadow:0 0 60px rgba(212,175,55,0.6)">

    <!-- Lumières clignotantes haut -->
    <div style="display:flex;justify-content:space-around;padding:8px 16px;
      background:linear-gradient(135deg,#1a0030,#2a0050)">
      <span id="jl1" style="font-size:10px;animation:flashLight 0.4s infinite">💡</span>
      <span id="jl2" style="font-size:10px;animation:flashLight 0.4s 0.1s infinite">💡</span>
      <span id="jl3" style="font-size:10px;animation:flashLight 0.4s 0.2s infinite">💡</span>
      <span id="jl4" style="font-size:10px;animation:flashLight 0.4s 0.3s infinite">💡</span>
      <span id="jl5" style="font-size:10px;animation:flashLight 0.4s 0.4s infinite">💡</span>
    </div>

    <!-- Header -->
    <div style="background:linear-gradient(135deg,#1a0030,#3a0060,#1a0030);
      padding:14px 24px 10px;text-align:center">
      <div style="font-family:'Cinzel',serif;font-size:24px;font-weight:900;
        color:var(--goldL);letter-spacing:5px;
        text-shadow:0 0 20px var(--gold),0 0 40px var(--gold)88">
        ⚡ JACKPOT FLASH ⚡
      </div>
      <div style="font-size:10px;color:rgba(212,175,55,0.6);letter-spacing:2px;margin-top:3px">
        ALIGNEZ 3 SYMBOLES IDENTIQUES
      </div>
    </div>

    <!-- Machine à sous -->
    <div style="padding:20px 16px">

      <!-- Rouleaux -->
      <div style="display:flex;gap:10px;justify-content:center;margin-bottom:16px">
        <div id="reel-0" style="width:88px;height:88px;border-radius:12px;
          background:rgba(0,0,0,0.6);border:2px solid rgba(212,175,55,0.5);

// AUDIO — Musique douce & effets sonores
// ════════════════════════════════════════════════
const AUDIO = {
  ctx:null, bgGain:null, playing:false, muted:false, _bgTimer:null,

  init(){
    if(this.ctx) return;
    try{ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  },

  // Réverbération douce
  _reverb(ctx){
    const conv = ctx.createConvolver();
    const len = ctx.sampleRate * 1.5;
    const buf = ctx.createBuffer(2, len, ctx.sampleRate);
    for(let ch=0;ch<2;ch++){
      const d = buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 3);
    }
    conv.buffer = buf;
    return conv;
  },

  // Note douce avec enveloppe
  _note(freq, start, dur, vol=0.3, type='sine', detune=0){
    const ctx = this.ctx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const rev = this._reverb(ctx);
    const revGain = ctx.createGain();
    revGain.gain.value = 0.25;
    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(vol, start + 0.08);
    gain.gain.setValueAtTime(vol * 0.7, start + dur * 0.4);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.connect(rev);
    rev.connect(revGain);
    revGain.connect(ctx.destination);
    osc.start(start);
    osc.stop(start + dur + 0.05);
  },

  // ── MUSIQUE DE FOND : Harpe céleste & piano doux ──
  startBg(){
    this.init();
    if(this.playing||!this.ctx) return;
    this.playing = true;
    const ctx = this.ctx;
    this.bgGain = ctx.createGain();
    this.bgGain.gain.value = this.muted ? 0 : 0.22;
    this.bgGain.connect(ctx.destination);

    // Gamme pentatonique de Ré mineur : Ré Fa Sol La Do
    const scale = [
      293.66, 349.23, 392.00, 440.00, 523.25,  // octave 1
      587.33, 698.46, 783.99, 880.00, 1046.50,  // octave 2
      146.83, 174.61, 196.00, 220.00, 261.63,   // octave 0 (basse)
    ];

    let t = ctx.currentTime + 0.3;

    const playBar = () => {
      if(!this.playing) return;
      const bar = ctx.createGain();
      bar.gain.value = this.muted ? 0 : 1;
      bar.connect(this.bgGain);

      // Pattern harpe arpégé : montée douce
      const arp = [0,2,4,7, 9,7,4,2, 1,3,5,8, 6,4,2,0];
      const dur = 10; // durée totale du bar

      arp.forEach((idx, i) => {
        const freq = scale[idx % scale.length];
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        const rev = this._reverb(ctx);
        const rg = ctx.createGain();
        rg.gain.value = 0.3;

        osc.type = 'sine';
        osc.frequency.value = freq;

        const st = t + i * (dur / arp.length);
        const noteDur = (dur / arp.length) * 2.2;

        g.gain.setValueAtTime(0, st);
        g.gain.linearRampToValueAtTime(0.28, st + 0.06);
        g.gain.exponentialRampToValueAtTime(0.0001, st + noteDur);

        osc.connect(g);
        g.connect(bar);
        g.connect(rev);
        rev.connect(rg);
        rg.connect(bar);
        osc.start(st);
        osc.stop(st + noteDur + 0.1);

        // Harmonique douce (quinte)
        const osc2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        osc2.type = 'triangle';
        osc2.frequency.value = freq * 1.498; // quinte juste
        g2.gain.setValueAtTime(0, st);
        g2.gain.linearRampToValueAtTime(0.08, st + 0.1);
        g2.gain.exponentialRampToValueAtTime(0.0001, st + noteDur * 0.7);
        osc2.connect(g2); g2.connect(bar);
        osc2.start(st); osc2.stop(st + noteDur);
      });

      // Pad ambient doux (fond continu)
      [146.83, 220.00, 261.63].forEach(freq => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.06, t + 1.5);
        g.gain.setValueAtTime(0.06, t + dur - 1.5);
        g.gain.linearRampToValueAtTime(0, t + dur);
        osc.connect(g); g.connect(bar);
        osc.start(t); osc.stop(t + dur + 0.1);
      });

      t += dur;
      this._bgTimer = setTimeout(playBar, (dur - 0.8) * 1000);
    };
    playBar();
  },

  stopBg(){

  playCelebration(){
    this.init();

    const ctx = this.ctx;
    const master = ctx.createGain();

    master.connect(ctx.destination);

    // Mélodie de victoire — gamme de Do majeur ascendante puis accord
    const melody = [
      {f:523.25, t:0.0,  d:0.3, v:0.5},
      {f:587.33, t:0.25, d:0.3, v:0.5},
      {f:659.25, t:0.50, d:0.3, v:0.5},

      {f:783.99, t:1.0,  d:0.5, v:0.6},
      {f:880.00, t:1.4,  d:0.4, v:0.6},
      {f:987.77, t:1.75, d:0.4, v:0.65},
      {f:1046.5, t:2.1,  d:1.2, v:0.7},

      const osc = ctx.createOscillator();

      osc.connect(g); g.connect(master); g.connect(rev);
      osc.start(st); osc.stop(st + d + 0.1);

      // Harmonique octave basse
      const osc2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      osc2.type = 'sine';
      osc2.frequency.value = f / 2;
      g2.gain.setValueAtTime(0, st);

      g2.gain.exponentialRampToValueAtTime(0.0001, st + d * 0.8);
      osc2.connect(g2); g2.connect(master);
      osc2.start(st); osc2.stop(st + d);

    // Accord final Do majeur arpégé (Do-Mi-Sol-Do)
    [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {

      const g = ctx.createGain();

      g.gain.linearRampToValueAtTime(0.35 - i*0.05, st + 0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, st + 2.0);
      osc.connect(g); g.connect(master); g.connect(rev);
      osc.start(st); osc.stop(st + 2.1);
    });

      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      const st = ctx.currentTime + 3.5 + i * 0.18;
      g.gain.setValueAtTime(0.4, st);
      g.gain.exponentialRampToValueAtTime(0.0001, st + 1.5);
      osc.connect(g); g.connect(master); g.connect(rev);
      osc.start(st); osc.stop(st + 1.6);
    });

// Mélanger les réponses d'une question
function shuffleRep(q){
  const reps=[...q.rep];
  for(let i=reps.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [reps[i],reps[j]]=[reps[j],reps[i]];
  }
  return{...q,rep:reps};
}

// Bonus imprévisible : 1 à 5 fois par partie, manches aléatoires
function initBonusManches(){
  const total = 1 + Math.floor(Math.random()*5); // entre 1 et 5
  const manches = new Set();
  while(manches.size < total){
    manches.add(2 + Math.floor(Math.random()*10)); // manches 2-11
  }
  return manches;
}

const getNiveau=xp=>[...NIVEAUX].reverse().find(n=>xp>=n.min)||NIVEAUX[0];
const getIdxNiv=xp=>NIVEAUX.indexOf(getNiveau(xp));
const getXPProg=xp=>{
  const c=getNiveau(xp),i=NIVEAUX.indexOf(c),n=NIVEAUX[i+1];
  if(!n)return{pct:100,label:"MAX"};
  return{pct:Math.round(((xp-c.min)/(n.min-c.min))*100),label:(xp-c.min)+"/"+(n.min-c.min)+" XP"};
};

// ── Jeu Bonus Logic ──────────────────────────────
const BONUS = {
  current: null,
  answered: false,

  // Lancer le bonus avec entrée spectaculaire
  launch(){
    if(BONUS.answered) return;
    // Éviter les répétitions — tracker les questions déjà posées cette partie
    if(!S.jeu.bonusHistory) S.jeu.bonusHistory=[];
    const disponibles = BONUS_QUESTIONS.filter(q=>!S.jeu.bonusHistory.includes(q.q));
    // Si toutes posées, repartir de zéro
    const pool = disponibles.length>0 ? disponibles : BONUS_QUESTIONS;
    // Choisir aléatoirement en équilibrant les piliers non encore posés
    const piliersNonPoses=[...new Set(pool.map(q=>q.pilier))];
    const pilierChoisi=pick(piliersNonPoses);
    const questionsDuPilier=pool.filter(q=>q.pilier===pilierChoisi);
    const q = shuffleRep(pick(questionsDuPilier));
    S.jeu.bonusHistory.push(q.q);
    BONUS.current = q;
    BONUS.answered = false;

    // Sons
    AUDIO.init();
    AUDIO.sfxJoker();
    setTimeout(()=>AUDIO.sfxBadge(), 400);

    // Confettis
    const conf = document.getElementById("bonus-confetti");
    const colors = ["#F0D060","#fff","#9B59B6","#E74C3C","#27AE60","#F39C12"];
    conf.innerHTML = Array.from({length:20},(_,i)=>`
      <div style="position:absolute;left:${Math.random()*100}%;top:0;
        width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
        background:${colors[i%colors.length]};
        border-radius:${i%2===0?"50%":"2px"};
        animation:confettiFall ${1+Math.random()}s ${Math.random()*0.5}s ease-in forwards">
      </div>`).join("");

    // Pilier
    const st = PILIER[q.pilier]||{icon:"⚖️",accent:"#D4AF37"};
    document.getElementById("bonus-pilier").innerHTML = `
      <div style="display:inline-flex;align-items:center;gap:8px;
        background:${st.accent}22;border:1px solid ${st.accent}66;
        border-radius:20px;padding:5px 16px;margin-bottom:4px">
        <span style="font-size:18px">${st.icon}</span>
        <span style="font-size:11px;color:${st.accent};font-weight:700;letter-spacing:1px">PILIER ${q.pilier.toUpperCase()}</span>
      </div>`;

    // Question
    document.getElementById("bonus-question").textContent = q.q;

    // Réponses avec apparition décalée
    const repDiv = document.getElementById("bonus-reponses");
    repDiv.innerHTML = q.rep.map((r,i)=>`
      <button onclick="BONUS.answer(${i})" style="
        width:100%;padding:13px 16px;border-radius:12px;
        background:rgba(255,255,255,0.06);
        border:1.5px solid rgba(212,175,55,0.3);
        color:#EEE8D5;font-size:15px;font-weight:600;text-align:left;
        cursor:pointer;font-family:'Crimson Text',Georgia,serif;
        animation:repPop 0.4s ${0.6+i*0.12}s both;
        transition:all 0.18s;line-height:1.5;
        display:flex;align-items:center;gap:10px;"
        onmouseover="this.style.background='rgba(212,175,55,0.12)';this.style.borderColor='var(--gold)'"
        onmouseout="if(!this.dataset.answered){this.style.background='rgba(255,255,255,0.06)';this.style.borderColor='rgba(212,175,55,0.3)'}"
        data-idx="${i}">
        <span style="display:inline-flex;align-items:center;justify-content:center;
          min-width:28px;height:28px;border-radius:50%;flex-shrink:0;
          background:rgba(212,175,55,0.15);border:1px solid rgba(212,175,55,0.4);
          font-size:12px;font-weight:700;color:var(--goldL);
          font-family:'Cinzel',serif">${String.fromCharCode(65+i)}</span>
        <span style="flex:1;font-size:15px;line-height:1.5">${r.t}</span>
      </button>`).join("");

    document.getElementById("bonus-result").style.display = "none";

    // Afficher overlay
    const ov = document.getElementById("bonus-overlay");
    ov.classList.add("active");
    requestAnimationFrame(()=>ov.classList.add("show"));

    // Shake écran
    document.getElementById("app").style.animation = "shake 0.5s ease";
    setTimeout(()=>document.getElementById("app").style.animation="none", 600);
  },

  answer(idx){
    if(BONUS.answered) return;
    BONUS.answered = true;
    const q = BONUS.current;
    const chosen = q.rep[idx];
    const pts = chosen.pts;
    const best = Math.max(...q.rep.map(r=>r.pts));
    const isCorrect = pts === best;

    // Colorier toutes les réponses
    const btns = document.querySelectorAll("#bonus-reponses button");
    btns.forEach((btn, i)=>{
      btn.disabled = true;
      btn.dataset.answered = "1";
      const p = q.rep[i].pts;
      const isBest = p === best;
      const isChosen = i === idx;
      if(isBest){
        btn.style.background = "rgba(69,201,122,0.25)";
        btn.style.borderColor = "#45c97a";
        btn.style.color = "#45c97a";
      } else if(isChosen && !isBest){
        btn.style.background = "rgba(224,85,85,0.2)";
        btn.style.borderColor = "#e05555";
        btn.style.color = "#e05555";
        btn.style.animation = "shake 0.4s ease";
      } else {
        btn.style.opacity = "0.45";
      }
      // Afficher les points sur chaque bouton
      btn.innerHTML += `<span style="float:right;font-weight:900;color:${isBest?"#45c97a":p===0?"#e05555":"#f39c12"};
        font-family:'Cinzel',serif;font-size:14px">+${p} pts</span>`;
    });

    // Son
    if(isCorrect){ AUDIO.sfxWin(); setTimeout(()=>AUDIO.sfxBadge(),300); }
    else AUDIO.sfxLose();

    // Résultat
    const res = document.getElementById("bonus-result");
    res.style.display = "block";
    res.innerHTML = `
      <div style="font-size:${isCorrect?52:36}px;margin-bottom:8px;
        animation:popIn 0.5s cubic-bezier(.34,1.56,.64,1) both">
        ${isCorrect?"🏆":pts===0?"💔":pts===50?"🥈":"🥉"}
      </div>
      <div style="font-size:${isCorrect?20:16}px;font-weight:900;
        font-family:'Cinzel',serif;letter-spacing:2px;
        color:${isCorrect?"#F0D060":pts===0?"#e05555":"#f39c12"};
        text-shadow:0 0 20px ${isCorrect?"#D4AF37":pts===0?"#e05555":"#f39c12"};
        margin-bottom:6px">
        ${isCorrect?"PARFAIT !":pts===0?"MAUVAISE RÉPONSE":pts===50?"BIEN ESSAYÉ !":"PAS MAL !"}
      </div>
      <div style="font-size:28px;font-weight:900;color:${isCorrect?"#F0D060":pts===0?"#e05555":"#f39c12"};
        font-family:'Cinzel',serif;margin-bottom:4px">
        +${pts} pts
      </div>
      ${isCorrect?`<div style="font-size:10px;color:var(--muted);margin-bottom:12px">Meilleure réponse !</div>`
        :`<div style="font-size:10px;color:var(--muted);margin-bottom:12px">La meilleure réponse était : <strong style="color:#45c97a">${q.rep.find(r=>r.pts===best).t}</strong></div>`}
      <button onclick="BONUS.close(${pts})" style="
        background:linear-gradient(135deg,var(--gold),var(--goldL));
        color:#12082e;font-weight:900;border:none;border-radius:12px;
        padding:12px 32px;font-size:14px;cursor:pointer;
        font-family:'Cinzel',serif;letter-spacing:1px;
        box-shadow:0 4px 20px rgba(212,175,55,0.4);
        animation:pulseGold 1.5s infinite">
        Continuer →
      </button>`;

    // Anim points flottants
    if(pts > 0) showAnimPts(pts);
  },

  close(pts){
    if(S.jeu) S.jeu.s1 = Math.max(0,(S.jeu.s1||0) + pts);
    const ov = document.getElementById("bonus-overlay");
    ov.classList.remove("show");
    setTimeout(()=>{
      ov.classList.remove("active");
      // Mettre à jour le score visible sans re-render complet
      const scoreEl = document.querySelector(".score-bar-bg");
      if(scoreEl) render();
    }, 400);
    if(pts>0){
      showAnimPts(pts);
      showToast(`🎯 Bonus +${pts} pts !`, "win", 2500);
    }
  },
};


// ════════════════════════════════════════════════
// MODE DUEL 1v1 — Vrai adversaire (PeerJS)
// ════════════════════════════════════════════════
const DUEL = {
  peer: null,
  conn: null,
  room: null,
  myId: null,
  isHost: false,
  adversaire: {nom:"Adversaire", couleur:"#e05555", icon:"⚔️"},
  // État partagé
  gs: null, // game state synchronisé
  myTurn: false,
  demo: false,

  _reset(){
    if(DUEL.conn){try{DUEL.conn.close();}catch(e){}}
    if(DUEL.peer){try{DUEL.peer.destroy();}catch(e){}}
    DUEL.peer=null; DUEL.conn=null;
    DUEL.room=null; DUEL.myId=null; DUEL.isHost=false;
    DUEL.gs=null; DUEL.myTurn=false; DUEL.demo=false;
    DUEL.adversaire={nom:"Adversaire", couleur:"#e05555", icon:"⚔️"};
  },

  // ── Créer salle hôte ──
  creerSalle(){
    DUEL._reset();
    DUEL.isHost=true;
    DUEL.room=MULTI.genCode();
    DUEL.myId=DUEL.room;

    // Initialiser état solo avec J2 = invité
    DUEL._initGS();

    S.ecran="duel_lobby"; render();
    showToast("🔑 Code : "+DUEL.room,"win",4000);

    _loadPeerJS(function(err){
      if(err||typeof Peer==="undefined"){
        DUEL.demo=true;
        showToast("🎮 Mode démo local","info",2000);
        return;
      }
      DUEL.peer=new Peer("duel-"+DUEL.room,{
        host:"0.peerjs.com",port:443,path:"/",secure:true,
        config:{iceServers:[{urls:"stun:stun.l.google.com:19302"}]}
      });
      DUEL.peer.on("open",function(){
        showToast("🌐 Salle en ligne !","win",2000);
        render();
      });
      DUEL.peer.on("connection",function(conn){
        DUEL.conn=conn;
        conn.on("open",function(){
          showToast("⚔️ Adversaire connecté !","win",2000);
          render();
        });
        conn.on("data",function(data){
          try{ DUEL._onMsg(JSON.parse(data)); }catch(e){}
        });
        conn.on("close",function(){
          if(S.ecran.startsWith("duel_")&&S.ecran!=="duel_resultat"){
            showToast("⚠️ Connexion perdue","lose",3000);
          }
        });
      });
      DUEL.peer.on("error",function(e){
        showToast("⚠️ Erreur réseau — mode démo","info",2000);
        DUEL.demo=true;
      });
    });
  },

  // ── Rejoindre (invité) ──
  rejoindre(code){
    code=(code||"").toUpperCase().trim();
    if(code.length!==4){ showToast("⚠️ Code 4 lettres requis","info",2000); return; }

    DUEL._reset();
    DUEL.isHost=false;
    DUEL.room=code;
    DUEL.myId=MULTI.genId();

    showToast("🔄 Connexion…","info",2000);

    _loadPeerJS(function(err){
      if(err||typeof Peer==="undefined"){
        showToast("❌ PeerJS indisponible","lose",2500); return;
      }
      DUEL.peer=new Peer("duel-"+DUEL.myId,{
        host:"0.peerjs.com",port:443,path:"/",secure:true,
        config:{iceServers:[{urls:"stun:stun.l.google.com:19302"}]}
      });
      DUEL.peer.on("open",function(){
        var conn=DUEL.peer.connect("duel-"+code,{reliable:true});
        DUEL.conn=conn;
        conn.on("open",function(){
          conn.send(JSON.stringify({type:"join",nom:S.nom||"Joueur",icon:"⚡"}));
          S.ecran="duel_lobby"; render();
          showToast("✅ Connecté !","win",2000);
        });
        conn.on("data",function(data){
          try{ DUEL._onMsg(JSON.parse(data)); }catch(e){}
        });
        conn.on("error",function(){
          showToast("❌ Salle introuvable : "+code,"lose",3000);
          DUEL._reset(); S.ecran="duel_menu"; render();
        });
      });
      DUEL.peer.on("error",function(e){
        showToast("❌ Erreur : "+e.type,"lose",3000);
        DUEL._reset(); S.ecran="duel_menu"; render();
      });
    });
  },

  // ── Envoyer au pair ──
  _send(msg){
    if(DUEL.demo) return;
    if(DUEL.conn&&DUEL.conn.open){
      try{ DUEL.conn.send(JSON.stringify(msg)); }catch(e){}
    }
  },

  // ── Initialiser l'état de jeu ──
  _initGS(){
    const r=shuffle([...REPONSES]);
    const joks=shuffle([...JOKERS]);
    DUEL.gs={
      phase:"attente", // attend que l'invité rejoigne
      // Cartes J1 (hôte) et J2 (invité)
      allRepJ1:r.slice(0,12), allRepJ2:r.slice(12,24),
      allJokJ1:joks.slice(0,2), allJokJ2:joks.slice(2,4),
      mainRepJ1:[], mainRepJ2:[],
      mainJokJ1:[], mainJokJ2:[],
      selJ1:[], selJ2Done:false,
      s1:0, s2:0, manche:1, total:12,
      b1:null, b2:null, cb:null,
      repJ1:null, repJ2:null,
      gainFinal:null, bonusHistory:[],
      timerSec:0,
    };
  },

  // ── Messages reçus ──
  _onMsg(msg){
    if(!msg||!msg.type) return;
    switch(msg.type){

      case "join":
        // Hôte reçoit l'invité
        DUEL.adversaire={nom:msg.nom||"Adversaire",couleur:"#e05555",icon:msg.icon||"⚔️"};
        DUEL._send({type:"welcome",
          nom:S.nom||"Joueur", icon:"👑",
          gs:DUEL.gs, // envoyer l'état de jeu initial
          adversaire:{nom:S.nom||"Joueur",couleur:"#D4AF37",icon:"👑"}
        });
        DUEL.gs.phase="selection";
        S.ecran="duel_jeu"; render();
        showToast("⚔️ "+DUEL.adversaire.nom+" a rejoint !","win",2500);
        break;

      case "welcome":
        // Invité reçoit l'accueil
        DUEL.adversaire={nom:msg.nom||"Adversaire",couleur:"#D4AF37",icon:msg.icon||"👑"};
        DUEL.gs=msg.gs; // utiliser l'état de jeu de l'hôte
        DUEL.gs.phase="selection";
        // Inverser J1/J2 pour l'invité (il joue en tant que J2)
        S.ecran="duel_jeu"; render();
        AUDIO.sfxStart();
        break;

      case "sel_done":
        // L'adversaire a confirmé sa sélection
        if(DUEL.isHost){
          DUEL.gs.mainRepJ2=[...msg.main];
          DUEL.gs.mainJokJ2=[...msg.joks];
          DUEL.gs.selJ2Done=true;
        } else {
          DUEL.gs.mainRepJ1=[...msg.main];
          DUEL.gs.mainJokJ1=[...msg.joks];
        }
        if(DUEL.gs.mainRepJ1.length>0&&DUEL.gs.mainRepJ2.length>0){
          DUEL.gs.phase="choixBase";
          DUEL.myTurn=DUEL.isHost; // hôte commence
          render();
        }
        break;

      case "base1":
        // J1 a choisi son pilier
        DUEL.gs.b1=msg.b1;
        DUEL.gs.phase="choixBase2";
        DUEL.myTurn=!DUEL.isHost; // invité répond
        render();
        break;

      case "base2":
        // J2 a choisi son pilier de réponse
        DUEL.gs.b2=msg.b2;
        DUEL.gs.cb=[DUEL.gs.b1,msg.b2].sort().join("+");
        DUEL.gs.phase="afficheBases";
        DUEL.gs.repJ1=null; DUEL.gs.repJ2=null;
        DUEL.myTurn=true; // les deux jouent
        DUEL._startTimer(20);
        render();
        break;

      case "rep":
        // L'adversaire a joué sa carte
        if(DUEL.isHost){
          DUEL.gs.repJ2=msg.rep; // {pts, id, name}
          // Retirer la carte de sa main
          if(msg.rep) DUEL.gs.mainRepJ2=DUEL.gs.mainRepJ2.filter(function(x){return x.id!==msg.rep.id;});
        } else {
          DUEL.gs.repJ1=msg.rep;
          if(msg.rep) DUEL.gs.mainRepJ1=DUEL.gs.mainRepJ1.filter(function(x){return x.id!==msg.rep.id;});
        }
        DUEL._checkBothPlayed();
        break;

      case "next":
        // Manche suivante
        DUEL.gs.manche=msg.manche;
        DUEL.gs.phase=msg.phase||"choixBase";
        DUEL.gs.b1=null; DUEL.gs.b2=null; DUEL.gs.cb=null;
        DUEL.gs.repJ1=null; DUEL.gs.repJ2=null;
        DUEL.myTurn=msg.j1Tour?DUEL.isHost:!DUEL.isHost;
        render();
        break;

      case "fin":
        DUEL.gs.s1=msg.s1; DUEL.gs.s2=msg.s2;
        S.ecran="duel_resultat"; render();
        break;

      case "rejouer":
        DUEL._initGS();
        DUEL.gs.phase="selection";
        S.ecran="duel_jeu"; render();
        showToast("🔄 Revanche !","win",2000);
        break;
    }
  },

  // ── Timer ──
  _timerInt:null, _timerSec:0,
  _startTimer(sec){
    if(DUEL._timerInt) clearInterval(DUEL._timerInt);
    DUEL._timerSec=sec||20;
    DUEL._updateTimer();
    DUEL._timerInt=setInterval(function(){
      DUEL._timerSec--;
      DUEL._updateTimer();
      if(DUEL._timerSec<=0){
        clearInterval(DUEL._timerInt);
        DUEL._timerInt=null;
        // Passer automatiquement si pas encore joué
        if(DUEL.gs&&DUEL.gs.phase==="afficheBases"&&!DUEL._myRepPlayed()){
          DUEL.jouerCarte(null);
        }
      }
    },1000);
  },
  _stopTimer(){
    if(DUEL._timerInt){ clearInterval(DUEL._timerInt); DUEL._timerInt=null; }
    DUEL._timerSec=0;
    DUEL._updateTimer();
  },
  _updateTimer(){
    var el=document.getElementById("duel-timer");
    if(!el) return;
    var s=DUEL._timerSec;
    var col=s<=5?"#e05555":s<=10?"#FFA500":"#45c97a";
    el.innerHTML=s>0
      ?'<div style="display:flex;align-items:center;gap:8px;justify-content:center">'
        +'<div style="font-size:26px;font-weight:900;color:'+col+';font-family:Cinzel,serif">'+s+'</div>'
        +'<div style="flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,0.1)">'
        +'<div style="height:100%;border-radius:3px;background:'+col+';width:'+(s/20*100)+'%;transition:width 1s linear"></div>'
        +'</div></div>'
      :'';
  },

  // ── Ma réponse déjà jouée ? ──
  _myRepPlayed(){
    return DUEL.isHost
      ? DUEL.gs.repJ1!==undefined && DUEL.gs.repJ1!==null && DUEL.gs.repJ1!==false
      : DUEL.gs.repJ2!==undefined && DUEL.gs.repJ2!==null && DUEL.gs.repJ2!==false;
  },

  // ── Confirmer sélection cartes ──
  confirmerSel(){
    var gs=DUEL.gs;
    var myMain=DUEL.isHost?gs.mainRepJ1:gs.mainRepJ2;
    var myJoks=DUEL.isHost?gs.mainJokJ1:gs.mainJokJ2;
    if(myMain.length<10){ showToast("⚠️ Choisissez 10 cartes","info",2000); return; }
    AUDIO.sfxConfirm();
    showToast("✅ Sélection confirmée !","win",2000);
    DUEL._send({type:"sel_done",main:myMain,joks:myJoks});
    DUEL._onMsg({type:"sel_done",main:myMain,joks:myJoks});
  },

  toggleSel(id){
    var gs=DUEL.gs; if(!gs) return;
    var pool=DUEL.isHost?gs.allRepJ1:gs.allRepJ2;
    var main=DUEL.isHost?gs.mainRepJ1:gs.mainRepJ2;
    var idx=main.findIndex(function(c){return c.id===id;});
    if(idx>=0){ main.splice(idx,1); }
    else if(main.length<10){
      var carte=pool.find(function(x){return x.id===id;});
      if(carte) main.push(carte);
    }
    render();
  },

  // ── Choisir pilier ──
  choisirBase(pilier){
    var gs=DUEL.gs; if(!gs||!DUEL.myTurn) return;
    if(!PILIER[pilier]) return;
    AUDIO.sfxClick();
    if(gs.phase==="choixBase"){
      gs.b1=pilier; gs.phase="choixBase2";
      DUEL.myTurn=false;
      DUEL._send({type:"base1",b1:pilier});
      DUEL._onMsg({type:"base1",b1:pilier});
    } else if(gs.phase==="choixBase2"){
      if(pilier===gs.b1) return; // même pilier interdit
      gs.b2=pilier;
      gs.cb=[gs.b1,pilier].sort().join("+");
      gs.phase="afficheBases";
      gs.repJ1=null; gs.repJ2=null;
      DUEL.myTurn=true;
      DUEL._send({type:"base2",b2:pilier});
      DUEL._onMsg({type:"base2",b2:pilier});
      DUEL._startTimer(20);
    }
    render();
  },

  // ── Jouer une carte réponse ──
  jouerCarte(carte){
    var gs=DUEL.gs; if(!gs||gs.phase!=="afficheBases") return;
    if(DUEL._myRepPlayed()) return; // déjà joué
    DUEL._stopTimer();
    if(carte){
      AUDIO.sfxCard();
      // Retirer de la main
      if(DUEL.isHost) gs.mainRepJ1=gs.mainRepJ1.filter(function(x){return x.id!==carte.id;});
      else gs.mainRepJ2=gs.mainRepJ2.filter(function(x){return x.id!==carte.id;});
    }
    var rep=carte?{pts:carte.pts,id:carte.id,name:carte.name,combo:carte.combo}:null;
    if(DUEL.isHost) gs.repJ1=rep||0;
    else gs.repJ2=rep||0;
    DUEL._send({type:"rep",rep:rep});
    DUEL._checkBothPlayed();
    render();
  },

  // ── Vérifier si les deux ont joué ──
  _checkBothPlayed(){
    var gs=DUEL.gs; if(!gs) return;
    var j1Done=gs.repJ1!==null&&gs.repJ1!==undefined;
    var j2Done=gs.repJ2!==null&&gs.repJ2!==undefined;
    if(j1Done&&j2Done){
      DUEL._stopTimer();
      gs.phase="apresReponses";
      render();
      // Auto-manche suivante après 3s
      if(DUEL.isHost) setTimeout(function(){ DUEL._mancheSuivante(); },3000);
    } else {
      render();
    }
  },

  // ── Manche suivante ──
  _mancheSuivante(){
    var gs=DUEL.gs; if(!gs) return;
    // Calculer résultat
    var p1=gs.repJ1?gs.repJ1.pts:0;
    var p2=gs.repJ2?gs.repJ2.pts:0;
    var tot=p1+p2;
    if(p1>p2){ gs.s1+=tot; }
    else if(p2>p1){ gs.s2+=tot; }
    // égalité → personne ne gagne

    gs.manche++;
    if(gs.manche>gs.total){
      // Fin de partie
      gs.phase="fin";
      DUEL._send({type:"fin",s1:gs.s1,s2:gs.s2});
      S.ecran="duel_resultat"; render();
      return;
    }
    gs.phase="choixBase";
    gs.b1=null; gs.b2=null; gs.cb=null;
    gs.repJ1=null; gs.repJ2=null;
    // Alterner qui commence
    var j1Tour=(gs.manche%2===1);
    DUEL.myTurn=j1Tour?DUEL.isHost:!DUEL.isHost;
    DUEL._send({type:"next",manche:gs.manche,phase:"choixBase",j1Tour:j1Tour});
    render();
  },

  quitter(){
    DUEL._stopTimer();
    DUEL._reset();
    S.ecran="menu"; render();
  },
};

          +cartesValides.map(function(carte){
            return '<div onclick="DUEL.jouerCarte(this._carte)" data-id="'+carte.id+'" style="flex-shrink:0;cursor:pointer">'
              +carteRepHTML(carte,{clickable:true,onClick:"DUEL.jouerCarte(DUEL.gs["+(DUEL.isHost?"mainRepJ1":"mainRepJ2")+"].find(function(x){return x.id=\'"+carte.id+"\';}))"})
              +'</div>';
          }).join("")
          +'</div>';
      } else {
        html+='<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">'
          +'Aucune carte pour ce combo'
          +'<br><button onclick="DUEL.jouerCarte(null)" style="margin-top:8px;padding:8px 20px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:var(--muted);cursor:pointer;">⏭️ Passer</button>'
          +'</div>';
      }
      html+='</div>';
    }
  }

  html+='</div>';
  app.innerHTML=html;

  // Démarrer tension msgs si attente
  var phaseNow2=DUEL.gs&&DUEL.gs.phase||"";
  if(!DUEL.myTurn&&(phaseNow2==="choixBase"||phaseNow2==="choixBase2")){
    setTimeout(startTensionMsgs, 100);
  } else if(phaseNow2==="afficheBases"&&(maRep!==null&&maRep!==undefined)){
    setTimeout(startTensionMsgs, 100);
  } else {
    stopTensionMsgs();
  }
  DUEL._updateTimer();
}

}

// JOKER OVERLAY CINÉMATIQUE
// ════════════════════════════════════════════════
function showJokerOverlay(joker, ptsReveal, who, callback){
  const ov=document.getElementById("joker-overlay");
  const bg=document.getElementById("jov-bg");
  const card=document.getElementById("jov-card");
  const ripple=document.getElementById("jov-ripple");
  const ripple2=document.getElementById("jov-ripple2");
  const icon=document.getElementById("jov-icon");
  const name=document.getElementById("jov-name");
  const desc=document.getElementById("jov-desc");
  const title=document.getElementById("jov-title");
  const subdesc=document.getElementById("jov-subdesc");
  const pts=document.getElementById("jov-pts");

  // Couleurs selon joker
  const colors={j1:"#6a0dad",j2:"#0d47a1",j3:"#1b5e20",j4:"#4a148c"};
  const jcol=colors[joker.id]||"#D4AF37";

  // CSS variable couleur
  ov.style.setProperty("--jcolor",jcol);

  // Fond semi-transparent coloré
  bg.style.background=`radial-gradient(ellipse at center,${jcol}cc 0%,rgba(7,5,20,0.97) 70%)`;

  // Carte grande
  card.style.background=`linear-gradient(160deg,${jcol}44,rgba(7,5,20,0.95))`;
  icon.textContent=joker.icon;
  name.textContent=joker.name;
  desc.textContent=joker.desc;

  // Texte selon qui joue
  if(who==="joueur"){
    title.textContent=joker.name.toUpperCase()+" !";
    title.style.color="var(--goldL)";
    subdesc.textContent=joker.id==="j1"?"Vous raflез TOUT le pot !"
      :joker.id==="j2"?"Le pot est multiplié par 2 !"
      :joker.id==="j3"?"Vous révélez les cartes adverses !"
      :"Une carte est générée automatiquement !";
  }else{
    title.textContent="L'IA JOUE "+joker.name.toUpperCase()+" !";
    title.style.color="#ff6b6b";
    subdesc.textContent=joker.id==="j1"?"L'IA rafle TOUT le pot !"
      :"L'IA double le pot — attention !";
  }

  // Points
  if(ptsReveal!==null){
    pts.style.display="block";
    const ptCol=who==="joueur"?"var(--goldL)":"#ff6b6b";
    pts.style.color=ptCol;
    pts.style.textShadow=`0 0 20px ${jcol},0 0 40px ${jcol}88`;
    pts.textContent=(who==="joueur"?"+":"-")+ptsReveal+" pts !";
  }else{
    pts.style.display="none";
  }

  // Reset animations
  [card,title,subdesc,pts,bg,ripple,ripple2].forEach(el=>{
    el.style.animation="none";
    void el.offsetWidth; // force reflow
  });
  card.style.animation="jokerFlash 0.6s cubic-bezier(.34,1.56,.64,1) both, jokerGlow 1s 0.5s infinite";
  bg.style.animation="jokerBg 2.5s ease forwards";
  title.style.animation="jokerTitle 0.5s 0.4s both";
  subdesc.style.animation="jokerSub 0.6s 0.7s both";
  pts.style.animation="jokerSub 0.5s 1.0s both";
  ripple.style.borderColor=jcol;
  ripple2.style.borderColor=jcol;
  ripple.style.animation="ripple 1s 0.3s ease-out infinite";
  ripple2.style.animation="ripple 1s 0.7s ease-out infinite";

  // Shake l'écran
  document.getElementById("app").style.animation="screenShake 0.5s 0.1s ease both";
  setTimeout(()=>{document.getElementById("app").style.animation="none";},700);

  // Afficher
  ov.classList.add("active");

  // Fermer après 2.5s et appeler callback
  setTimeout(()=>{
    ov.classList.remove("active");
    if(callback)callback();
  },2500);
}

// LOGIQUE JEU
// ════════════════════════════════════════════════
const G={
  startJeu(survie=false){
    S.survieActif=survie;
    if(survie)S.viesSurvie=3;
    const r=shuffle([...REPONSES]);
    const j=shuffle([...JOKERS]);
    S.jeu={
      phase:"selection",
      allRepJ1:r.slice(0,12),allRepJ2:r.slice(12,24),
      allJokJ1:j.slice(0,2),allJokJ2:j.slice(2,4),
      mainRepJ1:[],mainRepJ2:[],mainJokJ1:[],mainJokJ2:[],
      selTemp:[],
      s1:0,s2:0,manche:1,total:12,premier:"j1",
      b1:null,b2:null,cb:null,
      repChoisie:null,repIA:null,
      jActif:null,jIA:null,
      msg:"",
      profil:{Spiritualité:0,Amour:0,Santé:0,Argent:0},
      historique:[],
      streak:0,maxStreak:0,manchesGagnees:0,
      brakeurWin:false,multiWin:false,cartes40:0,remontada:false,battuExpert:false,
      piliers:{},
      iaDlg:null,iaTyping:false,
      espionCartes:[],espionActif:false,phaseEchange:false,gainFinal:null,bonusHistory:[],
      timerSec:0,
      repIAVues:[],
    };
    S.jeu.bonusManches = initBonusManches();
    S.ecran="selection";
    render();
    AUDIO.sfxStart();
    AUDIO.startBg();
    setTimeout(()=>{
      const iaPr=IA_PROFILS[S.diff]||IA_PROFILS.Intermédiaire;
      G.showIADlg(pick(iaPr.dlg.debut));
    },800);
  },

  confirmerSelection(){
    const j=S.jeu;
    if(j.selTemp.length<10)return;
    j.mainRepJ1=[...j.selTemp];
    j.mainJokJ1=[...j.allJokJ1];
    // IA sélectionne ses 10
    if(S.diff==="Expert"){j.mainRepJ2=[...j.allRepJ2].sort((a,b)=>b.pts-a.pts).slice(0,10);}
    else if(S.diff==="Débutant"){j.mainRepJ2=shuffle([...j.allRepJ2]).slice(0,10);}
    else{const s=[...j.allRepJ2].sort((a,b)=>b.pts-a.pts);j.mainRepJ2=[...s.slice(0,7),...shuffle(s.slice(7)).slice(0,3)];}
    j.mainJokJ2=[...j.allJokJ2];
    j.phase="choixBase";
    S.ecran="jeu";
    render();
  },

  toggleSel(id){
    const j=S.jeu;
    const idx=j.selTemp.findIndex(c=>c.id===id);
    if(idx>=0){j.selTemp.splice(idx,1);}
    else if(j.selTemp.length<10){const c=j.allRepJ1.find(x=>x.id===id);if(c)j.selTemp.push(c);}
    renderSelection(document.getElementById("app"));
  },

  choisirBase(p){
    const j=S.jeu;
    if(j.phase!=="choixBase")return;
    j.b1=p;j.phase="j1AChoisi";
    const iaPr=IA_PROFILS[S.diff]||IA_PROFILS.Intermédiaire;
    G.showIADlg(pick(iaPr.dlg.bluff));
    render();
  },

  iaRepond(){
    const j=S.jeu;
    const cands=PILIERS.filter(p=>p!==j.b1);
    let baseIA;
    if(S.diff==="Expert"){
      baseIA=[...cands].sort((a,z)=>{
        const ma=Math.max(...j.mainRepJ2.filter(c=>c.combo===mkCombo(j.b1,a)).map(c=>c.pts),0);
        const mz=Math.max(...j.mainRepJ2.filter(c=>c.combo===mkCombo(j.b1,z)).map(c=>c.pts),0);
        return mz-ma;
      })[0];
    }else if(S.diff==="Débutant"){baseIA=pick(cands);}
    else{
      const opt=[...cands].sort((a,z)=>{
        const ma=Math.max(...j.mainRepJ2.filter(c=>c.combo===mkCombo(j.b1,a)).map(c=>c.pts),0);
        const mz=Math.max(...j.mainRepJ2.filter(c=>c.combo===mkCombo(j.b1,z)).map(c=>c.pts),0);
        return mz-ma;
      })[0];
      baseIA=Math.random()<0.6?opt:pick(cands);
    }
    j.b2=baseIA;j.cb=mkCombo(j.b1,baseIA);
    j.repChoisie=null;j.repIA=null;j.phase="afficheBases";
    G.startTimer();render();
  },

  j1RepondIA(p){
    const j=S.jeu;
    if(p===j.b2)return;
    j.b1=p;j.cb=mkCombo(p,j.b2);
    j.repChoisie=null;j.repIA=null;j.phase="afficheBases";
    G.startTimer();render();
  },

  selRep(id){
    const j=S.jeu;
    if(!j||j.phase!=="afficheBases"||j.phaseEchange)return;
    const c=j.mainRepJ1.find(x=>x.id===id);
    if(!c)return;
    j.repChoisie=(j.repChoisie?.id===id)?null:c;
    render();
  },

  jouerRep(){
    const j=S.jeu;
    G.stopTimer();
    if(!j.repChoisie)return;
    AUDIO.sfxCard();
    G.execRep(j.repChoisie);
  },

  passerTour(){
    G.stopTimer();
    AUDIO.sfxClick();
    G.execRep(null);
  },

  execRep(cJ1){
    const j=S.jeu;
    G.stopTimer();
    const vIA=j.mainRepJ2.filter(c=>c.combo===j.cb);
    let cIA=null;
    if(vIA.length>0){
      if(S.diff==="Expert")cIA=[...vIA].sort((a,b)=>b.pts-a.pts)[0];
      else if(S.diff==="Débutant")cIA=[...vIA].sort((a,b)=>a.pts-b.pts)[0];
      else cIA=pick(vIA);
    }
    if(cJ1)j.mainRepJ1=j.mainRepJ1.filter(x=>x.id!==cJ1.id);
    if(cIA)j.mainRepJ2=j.mainRepJ2.filter(x=>x.id!==cIA.id);
    j.repChoisie=cJ1;j.repIA=cIA;
    // Si aucune carte des deux côtés → égalité, manche suivante immédiate
    if(!cJ1&&!cIA){
      showToast("🤝 Aucune carte — manche suivante !","info",1800);
      G._calcul(null,null,null,null);
      return;
    }
    j.phase="apresReponses";
    render();
  },

  useJoker(id){
    const j=S.jeu;
    if(j.phase==="afficheBases"){
      if(id==="j3"){G.useEspion();return;}
      if(id==="j4"){G.useEchange();return;}
    }
  },

  useEspion(){
    const j=S.jeu;
    const jok=j.mainJokJ1.find(x=>x.id==="j3");
    if(!jok)return;
    j.mainJokJ1=j.mainJokJ1.filter(x=>x.id!=="j3");
    const vues=j.mainRepJ2.filter(c=>c.combo===j.cb).sort((a,b)=>b.pts-a.pts).slice(0,3);
    j.repIAVues=vues;j.espionActif=true;
    showToast("👁 Espion — 3 cartes de l'IA révélées !");
    render();
    setTimeout(()=>{j.espionActif=false;render();},5000);
  },

  useEchange(){
    const j=S.jeu;
    const jok=j.mainJokJ1.find(x=>x.id==="j4");
    if(!jok||!j.cb) return;

    // Passer en mode sélection Échange
    j.phaseEchange=true;
    showToast("🔄 Choisissez la carte à sacrifier","info",3000);
    render();
  },

  // Appelé quand le joueur clique sur une carte à sacrifier
  confirmerEchange(idSacrifice){
    const j=S.jeu;
    if(!j.phaseEchange) return;

    // Retirer la carte sacrifiée de la main
    j.mainRepJ1=j.mainRepJ1.filter(x=>x.id!==idSacrifice);
    if(j.repChoisie?.id===idSacrifice) j.repChoisie=null;

    // Piocher une nouvelle carte du même combo non encore en main
    const enMain=new Set(j.mainRepJ1.map(x=>x.id));
    const poss=REPONSES.filter(r=>r.combo===j.cb&&!enMain.has(r.id));
    const source=poss.length>0?poss:REPONSES.filter(r=>r.combo===j.cb);
    const nouvelleCarte={...pick(source), id:"ech_"+Date.now()};

    // Ajouter la nouvelle carte à la main
    j.mainRepJ1=[...j.mainRepJ1, nouvelleCarte];

    // Consommer le joker
    j.mainJokJ1=j.mainJokJ1.filter(x=>x.id!=="j4");
    j.phaseEchange=false;

    // Sélectionner automatiquement la nouvelle carte
    j.repChoisie=nouvelleCarte;

    AUDIO.sfxBadge();
    showToast(`🔄 Échange ! "${nouvelleCarte.name}" (${nouvelleCarte.pts} pts) intégrée !`,"win",3000);
    render();
  },

  annulerEchange(){
    const j=S.jeu;
    j.phaseEchange=false;
    render();
  },

  // Échange libre : pas de sacrifice, juste piocher une carte (quand aucune valide)
  useEchangeLibre(){
    const j=S.jeu;
    const jok=j.mainJokJ1.find(x=>x.id==="j4");
    if(!jok) return;
    const enMain=new Set(j.mainRepJ1.map(x=>x.id));
    const poss=REPONSES.filter(r=>r.combo===j.cb&&!enMain.has(r.id));
    const source=poss.length>0?poss:REPONSES.filter(r=>r.combo===j.cb);
    const nouvelleCarte={...pick(source), id:"ech_"+Date.now()};
    j.mainRepJ1=[...j.mainRepJ1, nouvelleCarte];
    j.mainJokJ1=j.mainJokJ1.filter(x=>x.id!=="j4");
    j.repChoisie=nouvelleCarte;
    AUDIO.sfxBadge();
    showToast(`🔄 "${nouvelleCarte.name}" (${nouvelleCarte.pts} pts) piochée !`,"win",2500);
    render();
  },

  appliquerJoker(id){
    const j=S.jeu;
    let joker=id?j.mainJokJ1.find(x=>x.id===id):null;
    if(joker)j.mainJokJ1=j.mainJokJ1.filter(x=>x.id!==id);
    if(joker){
      AUDIO.sfxJoker();
      const tot=(j.repChoisie?.pts||0)+(j.repIA?.pts||0);
      const ptsGain=joker.id==="j1"?tot:joker.id==="j2"?tot*2:null;
      showJokerOverlay(joker,ptsGain,"joueur",()=>G.resoudre(j.repChoisie,j.repIA,joker));
    }else{
      G.resoudre(j.repChoisie,j.repIA,null);
    }
  },

  resoudre(cJ1,cIA,jokerFinal){
    const j=S.jeu;
    let jIAUsed=null;
    if(j.mainJokJ2.length>0){
      const p1=cJ1?.pts||0,p2=cIA?.pts||0;
      const brak=j.mainJokJ2.find(x=>x.id==="j1"),mult=j.mainJokJ2.find(x=>x.id==="j2");
      if(S.diff==="Expert"){if(p1>p2&&brak)jIAUsed=brak;else if(p2>=p1&&mult)jIAUsed=mult;}
      else if(S.diff==="Intermédiaire"&&Math.random()<0.25)jIAUsed=pick(j.mainJokJ2);
      else if(S.diff==="Débutant"&&Math.random()<0.08)jIAUsed=pick(j.mainJokJ2);
      if(jIAUsed)j.mainJokJ2=j.mainJokJ2.filter(x=>x.id!==jIAUsed.id);
    }
    // IA joue un joker offensif → overlay IA avant le calcul
    if(!jokerFinal&&jIAUsed&&(jIAUsed.id==="j1"||jIAUsed.id==="j2")){
      const tot=(cJ1?.pts||0)+(cIA?.pts||0);
      const ptsPerdus=jIAUsed.id==="j1"?tot:tot*2;
      showJokerOverlay(jIAUsed,ptsPerdus,"ia",()=>G._calcul(cJ1,cIA,jokerFinal,jIAUsed));
      return;
    }
    G._calcul(cJ1,cIA,jokerFinal,jIAUsed);
  },

  _calcul(cJ1,cIA,jokerFinal,jIAUsed){
    const j=S.jeu;
    const iaPr=IA_PROFILS[S.diff]||IA_PROFILS.Intermédiaire;
    let p1=cJ1?.pts||0,p2=cIA?.pts||0;
    const tot=p1+p2; // total des deux cartes jouées cette manche

    // ── Brakeur joueur : vole TOUT le pot (p1+p2), même si IA ou joueur a passé ──
    if(jokerFinal?.id==="j1"){
      p1=tot; // le joueur prend tout
      p2=0;
    }
    // ── Multiplicateur joueur : double le total ──
    else if(jokerFinal?.id==="j2"){
      p1=tot*2;
      p2=0;
    }
    // ── Brakeur IA : l'IA vole tout le pot, même si joueur a passé ──
    if(!jokerFinal&&jIAUsed?.id==="j1"){
      p2=tot; // l'IA prend tout
      p1=0;
    }
    // ── Multiplicateur IA ──
    else if(!jokerFinal&&jIAUsed?.id==="j2"){
      p2=tot*2;
      p1=0;
    }

    let msg="",xpG=0,gagnant=0;
    const j1p=!cJ1&&jokerFinal?.id!=="j1"; // passe réel = pas de carte ET pas de Brakeur
    const iap=!cIA&&jIAUsed?.id!=="j1";

    // Stocker gain réel (après joker) pour affichage phase fin
    j.gainFinal={p1,p2,joker:jokerFinal?.id||jIAUsed?.id||null};

    if(!cJ1&&!cIA&&!jokerFinal&&!jIAUsed){
      msg="🤝 Aucune carte — égalité !";
      j.gainFinal={p1:0,p2:0,joker:null};
      j.msg=msg;j.phase="fin";
      showToast(msg,"info",1800);
      render();
      // Manche suivante automatique après 1.8s
      setTimeout(()=>G.mancheSuivante(),1900);
      return;
    }
    // Brakeur joueur — il prend tout même si l'IA a une carte
    else if(jokerFinal?.id==="j1"){
      j.s1+=p1;
      msg=`💀 BRAKEUR ! ${S.nom} rafle +${p1} pts !`;
      xpG=p1*2;gagnant=1;showAnimPts(p1);
    }
    // Brakeur IA — elle prend tout
    else if(!jokerFinal&&jIAUsed?.id==="j1"){
      j.s2+=p2;
      msg=`💀 Brakeur IA ! L'IA rafle +${p2} pts`;
    }
    else if(j1p&&iap){msg="🤝 Aucune carte — égalité !";}
    else if(j1p){j.s2+=p2;msg=`💔 IA gagne +${p2} pts`;}
    else if(iap){
      j.s1+=p1;
      msg=`🏆 ${S.nom} gagne +${p1} pts !`;
      xpG=p1*2;gagnant=1;showAnimPts(p1);
    }
    else if(p1>p2){
      const gain=p1+p2;
      j.s1+=gain;
      if(jokerFinal?.id==="j2") msg=`🏆 ×2 ! ${S.nom} gagne +${gain} pts !`;
      else msg=`🏆 ${S.nom} gagne +${gain} pts !`;
      xpG=gain*2;gagnant=1;showAnimPts(gain);
    }
    else if(p2>p1){j.s2+=p1+p2;msg=`💔 IA gagne +${p1+p2} pts`;}
    else{msg="🤝 Égalité !";}
    j.manchesGagnees+=gagnant;
    j.streak=gagnant?j.streak+1:0;
    j.maxStreak=Math.max(j.maxStreak,j.streak);
    if(j.b1)j.piliers[j.b1]=(j.piliers[j.b1]||0)+1;
    if(jokerFinal?.id==="j1"&&gagnant)j.brakeurWin=true;
    if(jokerFinal?.id==="j2"&&gagnant)j.multiWin=true;
    if(cJ1?.pts===40)j.cartes40++;
    // Remontada : était à -60 ou plus et gagne maintenant
    if(gagnant===1&&(j.s2-j.s1+p1+p2)>=60)j.remontada=true;
    if(cJ1){const[a,b]=cJ1.combo.split("+");j.profil[a]=(j.profil[a]||0)+Math.round(cJ1.pts/2);j.profil[b]=(j.profil[b]||0)+Math.round(cJ1.pts/2);}
    G.checkBadges(j);
    if(xpG>0)S.xp+=xpG;
    j.jIA=jIAUsed;j.jActif=jokerFinal||j.jActif;j.msg=msg;
    j.historique.push({manche:j.manche,b1:j.b1,b2:j.b2,cb:j.cb,cJ1,cIA,jokerFinal,jIAUsed,gagnant});
    const tp=gagnant===1?"win":gagnant===0&&!j1p&&!iap?"info":"lose";
    if(gagnant===1)AUDIO.sfxWin();
    else if(tp==="lose")AUDIO.sfxLose();
    showToast(msg,tp);
    setTimeout(()=>G.showIADlg(pick(iaPr.dlg[gagnant===1?"perd":gagnant===0&&!j1p&&!iap?"egal":"gagne"])),400);
    j.phase="fin";
    render();
    // Bonus imprévisible — alterne entre Questions et Jackpot Flash
    if(j.bonusManches&&j.bonusManches.has(j.manche)){
      setTimeout(()=>{
        // Guard : ne pas lancer si un overlay est déjà actif
        const jpOv=document.getElementById("jackpot-overlay");
        const bOv=document.getElementById("bonus-overlay");
        if(jpOv?.classList.contains("active")||bOv?.classList.contains("active")) return;
        if(j.manche%2===0) JACKPOT.launch();
        else BONUS.launch();
      }, 1800);
    }
  },

  mancheSuivante(){
    const j=S.jeu;
    if(j.manche>=j.total||j.mainRepJ1.length===0){
      G.finPartie();return;
    }
    G._doMancheSuivante(j);
  },

  _doMancheSuivante(j){
    const prochain=j.premier==="j1"?"ia":"j1";
    j.premier=prochain;j.manche++;
    j.b1=null;j.b2=null;j.cb=null;
    j.repChoisie=null;j.repIA=null;j.msg="";j.lastBonusQ=j.lastBonusQ||null;
    j.jActif=null;j.jIA=null;j.espionActif=false;j.repIAVues=[];j.phaseEchange=false;j.gainFinal=null;
    if(prochain==="ia"){
      // Choisir un pilier où l'IA a encore des cartes disponibles
      const piliersDispo=PILIERS.filter(p=>
        PILIERS.some(p2=>p2!==p&&j.mainRepJ2.some(c=>c.combo===mkCombo(p,p2)))
      );
      j.b2=piliersDispo.length>0?pick(piliersDispo):pick(PILIERS);
      j.phase="iaChoisitBase";
    }
    else j.phase="choixBase";
    render();
  },

  finPartie(){
    const j=S.jeu;
    // Vérifier défis
    let bonusXP=0;
    DEFIS.forEach(d=>{
      if(!S.defisDone.includes(d.id)){
        const ok=d.check(j.historique,j.s1,j.s2,S.diff,j.maxStreak);
        if(ok){S.defisDone.push(d.id);bonusXP+=d.xp;showToast(`${d.icon} Défi accompli ! +${d.xp} XP`,"badge",3500);}
      }
    });
    S.xp+=bonusXP;
    // Badge battu expert — AVANT checkBadges
    if(S.diff==="Expert"&&j.s1>j.s2)j.battuExpert=true;
    j.battuExpert=j.battuExpert; // expose sur l'objet jeu
    G.checkBadges(j);
    // Classement
    S.classement.push({nom:S.nom,pts:j.s1,xp:S.xp});
    S.classement.sort((a,b)=>b.pts-a.pts);
    S.classement=S.classement.slice(0,10);
    // Survie
    if(S.survieActif&&j.s1<=j.s2){
      S.viesSurvie--;
      if(S.viesSurvie<=0){S.survieActif=false;S.viesSurvie=3;}
    }
    if(S.jeu&&S.jeu.s1>S.jeu.s2)AUDIO.playCelebration();
    S.ecran="resultat";sauvegarder();render();
  },

  checkBadges(jeu){
    const statsObj={
      streak:jeu.streak,piliers:jeu.piliers,manchesGagnees:jeu.manchesGagnees,
      brakeurWin:jeu.brakeurWin,multiWin:jeu.multiWin,cartes40:jeu.cartes40,
      remontada:jeu.remontada,battuExpert:jeu.battuExpert
    };
    BADGES.forEach(b=>{
      if(!S.badgesTotal.includes(b.id)&&b.check(statsObj)){
        S.badgesTotal.push(b.id);
        AUDIO.sfxBadge();
        showToast(`${b.icon} Badge débloqué : ${b.name} !`,"badge",3500);
      }
    });
  },

  showIADlg(texte,delay=0){
    const j=S.jeu;if(!j)return;
    j.iaTyping=true;j.iaDlg=null;
    // Ne pas re-render si on est en phase fin (résultat déjà affiché)
    if(j.phase!=="fin") render();
    setTimeout(()=>{j.iaTyping=false;j.iaDlg=texte;if(S.jeu?.phase!=="fin")render();},delay+700);
    setTimeout(()=>{j.iaDlg=null;if(S.jeu?.phase!=="fin")render();},delay+4200);
  },

  // Timer
  _timerInt:null,
  _timerFired:false,
  startTimer(){
    const j=S.jeu;
    G._timerFired=false;
    clearInterval(G._timerInt);

    // ── Si aucune carte valide pour le joueur → passer immédiatement ──
    const validesJ1now=j.cb?j.mainRepJ1.filter(c=>c.combo===j.cb):[];
    const validesJ2now=j.cb?j.mainRepJ2.filter(c=>c.combo===j.cb):[];
    if(validesJ1now.length===0){
      // Joueur sans carte → passe immédiatement
      if(validesJ2now.length===0){
        // Les deux sans carte → manche suivante immédiate
        showToast("⚡ Aucune carte valide — manche suivante !","info",1500);
        setTimeout(()=>G.execRep(null),400);
      } else {
        // Seul le joueur passe, l'IA joue normalement
        showToast("⚠️ Aucune carte valide — passage automatique","info",1500);
        setTimeout(()=>G.execRep(null),400);
      }
      return;
    }

    // ── Timer 20s normal ──
    j.timerSec=20;
    G._timerInt=setInterval(()=>{
      if(!S.jeu||S.jeu.phase!=="afficheBases"){clearInterval(G._timerInt);return;}
      j.timerSec--;
      G.updateTimer();
      if(j.timerSec<=0){
        clearInterval(G._timerInt);
        if(!G._timerFired){
          G._timerFired=true;
          if(S.jeu?.repChoisie) G.jouerRep();
          else G.execRep(null);
        }
      }
    },1000);
  },
  stopTimer(){
    clearInterval(G._timerInt);
    G._timerFired=true; // empêche double appel
    if(S.jeu)S.jeu.timerSec=0;
  },
  updateTimer(){
    const el=document.getElementById("timerNum");
    const bar=document.getElementById("timerBar");
    if(!el||!bar)return;
    const sec=S.jeu?.timerSec||0;
    const col=sec<=5?"#e05555":sec<=10?"#FFA500":"#45c97a";
    el.textContent=sec;el.style.color=col;
    bar.style.width=(sec/20*100)+"%";bar.style.background=col;
    if(sec<=5)el.closest?.(".timer-wrap")?.style?.setProperty?.("animation","urgence 0.5s infinite");
  },
};

// ── Confirmation abandon de partie ──
function MULTI_REJOUER(){
  // Relancer une partie avec les mêmes joueurs
  if(!MULTI.isHost){
    showToast("⏳ Seul l\'hôte peut relancer","info",2000);
    return;
  }
  // Remettre tout le monde non-prêt et retourner au lobby
  Object.keys(MULTI.players).forEach(function(id){
    MULTI.players[id].pret=false;
  });
  MULTI.gs=null;
  MULTI.allRep=[]; MULTI.selTemp=[]; MULTI.mainRep=[]; MULTI.mainJok=[];
  // Broadcast retour lobby
  MULTI._broadcast({type:"rejouer",players:MULTI.players});
  S.ecran="multi_lobby"; render();
  showToast("🔄 Nouvelle partie — marquez vous prêt !","win",3000);
}

function MULTI_VALIDER_NOM(cb){
  const inp=document.getElementById("multi-nom");
  const nom=(inp?inp.value:"").trim();
  if(!nom||nom.length<2){
    showToast("⚠️ Entrez votre prénom (2 lettres min)","info",2000);
    return;
  }
  S.nom=nom; sauvegarder(); cb();
}

  overlay.id = "confirm-menu-overlay";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)";
  overlay.innerHTML = `<div style="background:var(--dark);border:2px solid rgba(212,175,55,0.4);border-radius:20px;padding:28px 24px;max-width:340px;width:100%;text-align:center">
    <div style="font-size:32px;margin-bottom:12px">🏠</div>
    <div style="font-family:Cinzel,serif;font-size:18px;font-weight:900;color:var(--goldL);margin-bottom:8px">Quitter la partie ?</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6">Votre progression sera perdue.<br>Voulez-vous vraiment retourner au menu ?</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button onclick="MULTI_DO_MENU()" style="width:100%;min-height:50px;border-radius:12px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#e05555,#c0392b);color:#fff;border:none;cursor:pointer">
        🏠 Oui — Retour au menu
      </button>
      <button onclick="document.getElementById('confirm-menu-overlay').remove()" style="width:100%;min-height:50px;border-radius:12px;font-size:14px;font-weight:600;background:rgba(255,255,255,0.06);color:var(--text);border:1px solid rgba(212,175,55,0.25);cursor:pointer">
        ▶️ Continuer la partie
      </button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function MULTI_DO_MENU(){
  const ov = document.getElementById("confirm-menu-overlay");
  if(ov) ov.remove();
  AUDIO.stopBg();
  S.jeu = null;
  S.ecran = "menu";
  render();
}

// Démarrage
charger();
render();
</script>
