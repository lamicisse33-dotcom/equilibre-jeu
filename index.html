<title>⚖️ ÉQUILIBRE — Les 4 Piliers de Vie</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#D4AF37;--goldL:#F0D060;--text:#EEE8D5;--muted:#9B8FA8;
  --red:#e05555;--green:#45c97a;--deep:#070514;--dark:#0F0A28;
  /* Mobile first */
  --card-w:min(110px,25vw);--card-h:min(156px,36vw);
  --pilier-sm:min(76px,17vw);--pilier-md:min(86px,20vw);--pilier-lg:min(104px,23vw);
  --gap-sm:6px;--gap-md:8px;
  --font-base:13px;
  --max-w:480px;
}
/* Tablette */
@media(min-width:600px){
  :root{
    --card-w:120px;--card-h:170px;
    --pilier-sm:86px;--pilier-md:100px;--pilier-lg:120px;
    --gap-sm:8px;--gap-md:12px;
    --max-w:560px;
  }
}
/* Desktop */
@media(min-width:900px){
  :root{
    --card-w:130px;--card-h:185px;
    --pilier-sm:96px;--pilier-md:112px;--pilier-lg:136px;
    --gap-sm:10px;--gap-md:16px;
    --max-w:680px;
  }
}
html,body{
  min-height:100vh;min-height:100dvh;
  background:var(--deep);color:var(--text);
  font-family:'Crimson Text',Georgia,serif;
  overscroll-behavior:none;overflow-x:hidden;
}
button{cursor:pointer;border:none;font-family:'Crimson Text',Georgia,serif;
  transition:all 0.16s;outline:none;-webkit-tap-highlight-color:transparent;}
button:active{transform:scale(0.94);}
input{font-family:'Crimson Text',Georgia,serif;outline:none;}
select{font-family:'Crimson Text',Georgia,serif;}

#app{min-height:100vh;min-height:100dvh;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--gold)44;border-radius:2px;}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0.78);opacity:0}65%{transform:scale(1.07)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes float{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-80px) scale(1.4)}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(212,175,55,0.2)}50%{box-shadow:0 0 36px rgba(212,175,55,0.65)}}
@keyframes trophyPop{0%{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.28) rotate(5deg)}80%{transform:scale(0.95) rotate(-2deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes shimmer{0%,100%{text-shadow:0 0 20px #D4AF37,0 0 40px #D4AF3777}50%{text-shadow:0 0 40px #F0D060,0 0 80px #D4AF37aa,0 0 120px #D4AF3744}}
@keyframes pulseScore{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes starPop{from{transform:scale(0) rotate(-30deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes cf{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes urgence{0%,100%{background:rgba(224,85,85,0.08)}50%{background:rgba(224,85,85,0.22)}}
@keyframes barFill{from{width:0}to{width:var(--w)}}

.fade{animation:fadeIn 0.28s ease both;}
.pop{animation:popIn 0.38s cubic-bezier(.34,1.56,.64,1) both;}
.slideUp{animation:slideUp 0.4s ease both;}
.slide{animation:slideIn 0.25s ease both;}

/* Layout */
.screen{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;padding:16px;width:100%;max-width:var(--max-w);margin:0 auto;}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;padding:0 16px;}
.w100{width:100%;max-width:var(--max-w);}
/* Desktop : fond avec motif autour du panneau de jeu */
@media(min-width:900px){
  body{background:radial-gradient(ellipse at center,#0d0830 0%,var(--deep) 70%);}
  #app>div{box-shadow:0 0 80px rgba(212,175,55,0.15);}
}

/* Boutons */
.btn-gold{width:100%;padding:14px 0;border-radius:12px;font-size:16px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:var(--deep);
  box-shadow:0 4px 20px rgba(212,175,55,0.4);}
.btn-ghost{width:100%;padding:12px 0;border-radius:12px;font-size:14px;font-weight:600;
  background:rgba(255,255,255,0.06);color:var(--text);border:1px solid rgba(212,175,55,0.25);}
.btn-ghost:hover{background:rgba(255,255,255,0.1);}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px);
  box-shadow:0 6px 28px rgba(212,175,55,0.55);}
@media(min-width:900px){
  .btn-gold{padding:16px 0;font-size:17px;border-radius:14px;}
  .btn-ghost{padding:13px 0;font-size:15px;}
}
.btn-gold:disabled{background:#333;color:#666;box-shadow:none;cursor:default;opacity:0.5;}
.btn-danger{border:1px solid rgba(255,107,53,0.4);color:#ff6b35;}

/* Cards */
.card{background:rgba(255,255,255,0.04);border-radius:16px;
  border:1px solid rgba(212,175,55,0.18);padding:16px;}
@media(min-width:900px){
  .card{padding:20px 24px;border-radius:18px;}
}
.card-glow{border-color:rgba(212,175,55,0.55);box-shadow:0 0 32px rgba(212,175,55,0.3);}

/* Pill */
.pill{display:inline-flex;align-items:center;gap:8px;
  background:rgba(212,175,55,0.1);border-radius:20px;padding:5px 16px;
  border:1px solid rgba(212,175,55,0.35);}

/* Toast */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:999;
  background:var(--dark);border-radius:12px;padding:11px 22px;
  font-size:14px;font-weight:700;white-space:nowrap;
  pointer-events:none;display:none;animation:popIn 0.3s both;
  border:1px solid rgba(212,175,55,0.3);
  box-shadow:0 4px 24px rgba(0,0,0,0.5);}
@media(min-width:900px){
  #toast{font-size:15px;padding:13px 28px;}
}

/* Anim pts */
#animPts{position:fixed;top:30%;left:50%;z-index:700;
  font-size:60px;font-weight:900;pointer-events:none;display:none;
  font-family:'Cinzel',serif;text-shadow:0 0 30px var(--gold),0 0 60px rgba(212,175,55,0.4);}

/* Score bar */
.score-bar-bg{height:8px;border-radius:4px;background:rgba(255,255,255,0.07);overflow:hidden;}
.score-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--goldL));transition:width 0.6s;}

/* XP bar */
.xp-bar-bg{height:5px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden;margin-top:3px;}
.xp-bar-fill{height:100%;border-radius:3px;transition:width 1s;}

/* ── Carte Pilier ───────────────────────────── */
.pilier-card{
  border-radius:18px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;user-select:none;
  transition:transform 0.2s,box-shadow 0.2s,filter 0.2s;
  position:relative;flex-shrink:0;overflow:hidden;
}
.pilier-card:active{transform:scale(0.93) !important;}
.pilier-card.selected{
  transform:scale(1.12) !important;
  box-shadow:0 0 0 2px #F0D06088,0 0 40px rgba(240,208,96,0.7),0 16px 40px rgba(0,0,0,0.8) !important;
}
.pilier-card.disabled{opacity:0.75;cursor:default;transform:none !important;}
.pilier-card.played{opacity:0.38;filter:brightness(0.5) saturate(0.4);cursor:default;transform:none !important;}
.pilier-card.glow{animation:glow 2s infinite;}

/* ── Carte Réponse ──────────────────────────── */
.carte-rep{
  border-radius:16px;display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  user-select:none;transition:transform 0.18s,box-shadow 0.18s;
  flex-shrink:0;width:var(--card-w);min-height:var(--card-h);
  position:relative;overflow:hidden;
}
.carte-rep.clickable{cursor:pointer;}
.carte-rep.clickable:active{transform:scale(0.93) !important;}
.carte-rep.selected{
  transform:scale(1.1) !important;
  box-shadow:0 0 0 2px #F0D06088,0 0 36px rgba(240,208,96,0.65),0 16px 36px rgba(0,0,0,0.8) !important;
}
.carte-rep.disabled{opacity:0.75;cursor:default;}
.carte-rep .pts-num{font-family:'Cinzel',serif;line-height:1;font-weight:900;}

/* ── Carte Joker ────────────────────────────── */
.carte-joker{
  border-radius:16px;display:flex;flex-direction:column;
  align-items:center;cursor:pointer;
  transition:transform 0.18s,box-shadow 0.18s;
  user-select:none;flex:1;position:relative;overflow:hidden;
}
.carte-joker:active{transform:scale(0.93);}
.carte-joker.used{opacity:0.12;cursor:default;filter:saturate(0) brightness(0.3);}

/* Joker overlay cinématique */
#joker-overlay{
  position:fixed;inset:0;z-index:800;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;
}
#joker-overlay.active{display:flex;}

@keyframes jokerFlash{
  0%{opacity:0;transform:scale(0.4) rotate(-10deg);}
  30%{opacity:1;transform:scale(1.18) rotate(3deg);}
  55%{transform:scale(0.96) rotate(-1deg);}
  70%{transform:scale(1.06) rotate(1deg);}
  100%{transform:scale(1) rotate(0deg);opacity:1;}
}
@keyframes jokerGlow{
  0%,100%{box-shadow:0 0 40px var(--jcolor),0 0 80px var(--jcolor)55;}
  50%{box-shadow:0 0 80px var(--jcolor),0 0 160px var(--jcolor)88,0 0 240px var(--jcolor)33;}
}
@keyframes jokerBg{
  0%{opacity:0;}25%{opacity:1;}80%{opacity:1;}100%{opacity:0;}
}
@keyframes ripple{
  0%{transform:scale(0);opacity:0.8;}
  100%{transform:scale(3.5);opacity:0;}
}
@keyframes jokerTitle{
  0%{opacity:0;transform:translateY(20px) scale(0.8);}
  50%{opacity:1;transform:translateY(-4px) scale(1.05);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}
@keyframes jokerSub{
  0%,40%{opacity:0;transform:translateY(10px);}
  100%{opacity:1;transform:translateY(0);}
}
@keyframes screenShake{
  0%,100%{transform:translateX(0);}
  15%{transform:translateX(-8px);}
  30%{transform:translateX(8px);}
  45%{transform:translateX(-5px);}
  60%{transform:translateX(5px);}
  75%{transform:translateX(-2px);}
  90%{transform:translateX(2px);}
}

.joker-overlay-bg{
  position:absolute;inset:0;
  animation:jokerBg 2.5s ease forwards;
}
.joker-card-big{
  width:180px;min-height:240px;border-radius:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:20px 14px;position:relative;z-index:2;
  animation:jokerFlash 0.6s cubic-bezier(.34,1.56,.64,1) both, jokerGlow 1s 0.5s infinite;
  border:3px solid var(--jcolor);
}
.joker-ripple{
  position:absolute;width:200px;height:200px;border-radius:50%;
  border:3px solid var(--jcolor);z-index:1;
  animation:ripple 1s 0.3s ease-out infinite;
}
.joker-title-big{
  font-family:'Cinzel',serif;font-size:28px;font-weight:900;letter-spacing:3px;
  color:var(--goldL);text-align:center;z-index:2;
  animation:jokerTitle 0.5s 0.4s both;
  text-shadow:0 0 20px var(--jcolor),0 0 40px var(--jcolor)88;
}
.joker-desc-big{
  font-size:14px;color:var(--muted);text-align:center;z-index:2;
  max-width:260px;line-height:1.6;
  animation:jokerSub 0.6s 0.7s both;
}
.joker-pts-reveal{
  font-family:'Cinzel',serif;font-size:52px;font-weight:900;
  z-index:2;animation:jokerSub 0.5s 1s both;
}

/* Carte joker */
.carte-joker{border-radius:12px;padding:10px 5px;display:flex;flex-direction:column;
  align-items:center;gap:4px;cursor:pointer;transition:all 0.2s;user-select:none;flex:1;}
.carte-joker.used{opacity:0.18;cursor:default;}







/* ── Jackpot Flash ────────────────────────────── */
#jackpot-overlay{
  position:fixed;inset:0;z-index:902;
  display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0);
  transition:background 0.5s;
  overflow-y:auto;
  padding:16px;
}
#jackpot-overlay.active{
  display:flex !important;
  flex-direction:column;
}
#jackpot-overlay.show{background:rgba(0,0,0,0.93);}

@keyframes jackpotEntry{
  0%{transform:scale(0.2) rotate(-6deg);opacity:0;}
  60%{transform:scale(1.07) rotate(2deg);}
  80%{transform:scale(0.97);}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
@keyframes reelSpin{
  0%{transform:translateY(0);}
  100%{transform:translateY(-300%);}
}
@keyframes jackpotWin{
  0%,100%{box-shadow:0 0 20px var(--gold),0 0 40px var(--gold)55;}
  50%{box-shadow:0 0 60px var(--goldL),0 0 120px var(--gold)99;}
}
@keyframes symbolPop{
  0%{transform:scale(0) rotate(-20deg);opacity:0;}
  70%{transform:scale(1.3) rotate(5deg);}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
@keyframes flashLight{
  0%,100%{opacity:1;}
  50%{opacity:0.3;}
}


/* ── Jackpot Flash ────────────────────────────── */
#jackpot-overlay{
  position:fixed;inset:0;z-index:902;
  display:none;
  align-items:center;justify-content:center;

}
#jackpot-overlay.active{

}

@keyframes jackpotEntry{

}
@keyframes symbolPop{

}

}


/* ── Jeu Bonus ────────────────────────────────── */
#bonus-overlay{
  position:fixed;inset:0;z-index:900;display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0);
  transition:background 0.5s;
}
#bonus-overlay.active{display:flex !important;flex-direction:column;}
#bonus-overlay.show{background:rgba(0,0,0,0.88);}

@keyframes bonusEntry{
  0%  {transform:scale(0.3) rotate(-8deg);opacity:0;}
  60% {transform:scale(1.08) rotate(2deg);opacity:1;}
  80% {transform:scale(0.97) rotate(-1deg);}
  100%{transform:scale(1) rotate(0deg);opacity:1;}
}
@keyframes bonusGlow{
  0%,100%{box-shadow:0 0 40px #D4AF37,0 0 80px #D4AF3766,0 0 120px #D4AF3733;}
  50%    {box-shadow:0 0 60px #F0D060,0 0 120px #F0D06099,0 0 200px #D4AF3766;}
}
@keyframes starSpin{
  from{transform:rotate(0deg);}to{transform:rotate(360deg);}
}
@keyframes bonusTitle{
  0%  {letter-spacing:0px;opacity:0;}
  50% {letter-spacing:8px;opacity:1;}
  100%{letter-spacing:4px;opacity:1;}
}
@keyframes repPop{
  0%  {transform:translateX(-30px);opacity:0;}
  100%{transform:translateX(0);opacity:1;}
}
@keyframes pulseGold{
  0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,0);}
  50%    {box-shadow:0 0 0 8px rgba(212,175,55,0.2);}
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-5px);}
  80%{transform:translateX(5px);}
}
@keyframes confettiFall{
  0%  {transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}

/* IA bubble */
.ia-bubble{display:flex;align-items:flex-start;gap:10px;animation:slideIn 0.3s both;}
.ia-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid;}
.ia-text{flex:1;background:rgba(255,255,255,0.07);border-radius:0 12px 12px 12px;
  padding:10px 14px;}

/* Dots typing */
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);
  display:inline-block;animation:pulse 1s infinite;}

/* Timer */
.timer-num{font-family:'Cinzel',serif;font-weight:900;line-height:1;}

/* Combo badge */
.combo-badge{display:inline-flex;align-items:center;gap:6px;
  border-radius:20px;padding:4px 14px;border:1px solid rgba(212,175,55,0.35);}

/* Confettis */
.confetti-piece{position:absolute;top:-16px;animation:cf linear forwards;}

/* Desktop optimizations */
@media(min-width:640px){
  :root{--card-w:118px;--card-h:166px;}
  .screen{padding:24px;}
  .btn-gold{font-size:17px;padding:15px 0;}
  .pilier-card{min-width:100px;}
}
</style>

      </div>

    <!-- Machine à sous -->
    <div style="padding:20px 16px">

        <div id="reel-0" style="width:88px;height:88px;border-radius:12px;
          background:rgba(0,0,0,0.6);border:2px solid rgba(212,175,55,0.5);
          display:flex;align-items:center;justify-content:center;
          font-size:44px;overflow:hidden;position:relative">
          <span id="sym-0" style="position:relative;z-index:1">?</span>
        </div>
        <div id="reel-1" style="width:88px;height:88px;border-radius:12px;
          background:rgba(0,0,0,0.6);border:2px solid rgba(212,175,55,0.5);
          display:flex;align-items:center;justify-content:center;

// ════════════════════════════════════════════════
// AUDIO — Musique douce & effets sonores
// ════════════════════════════════════════════════
const AUDIO = {
  ctx:null, bgGain:null, playing:false, muted:false, _bgTimer:null,

  init(){
    if(this.ctx) return;
    try{ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  },

  // Réverbération douce
  _reverb(ctx){
    const conv = ctx.createConvolver();
    const len = ctx.sampleRate * 1.5;
    const buf = ctx.createBuffer(2, len, ctx.sampleRate);
    for(let ch=0;ch<2;ch++){
      const d = buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 3);
    }
    conv.buffer = buf;
    return conv;
  },

  // Note douce avec enveloppe
  _note(freq, start, dur, vol=0.3, type='sine', detune=0){
    const ctx = this.ctx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const rev = this._reverb(ctx);
    const revGain = ctx.createGain();
    revGain.gain.value = 0.25;
    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(vol, start + 0.08);
    gain.gain.setValueAtTime(vol * 0.7, start + dur * 0.4);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.connect(rev);
    rev.connect(revGain);
    revGain.connect(ctx.destination);
    osc.start(start);
    osc.stop(start + dur + 0.05);
  },

  // ── MUSIQUE DE FOND : Harpe céleste & piano doux ──
  startBg(){
    this.init();
    if(this.playing||!this.ctx) return;
    this.playing = true;
    const ctx = this.ctx;
    this.bgGain = ctx.createGain();
    this.bgGain.gain.value = this.muted ? 0 : 0.22;
    this.bgGain.connect(ctx.destination);

    // Gamme pentatonique de Ré mineur : Ré Fa Sol La Do
    const scale = [
      293.66, 349.23, 392.00, 440.00, 523.25,  // octave 1
      587.33, 698.46, 783.99, 880.00, 1046.50,  // octave 2
      146.83, 174.61, 196.00, 220.00, 261.63,   // octave 0 (basse)
    ];

    let t = ctx.currentTime + 0.3;

    const playBar = () => {
      if(!this.playing) return;
      const bar = ctx.createGain();
      bar.gain.value = this.muted ? 0 : 1;
      bar.connect(this.bgGain);

      // Pattern harpe arpégé : montée douce
      const arp = [0,2,4,7, 9,7,4,2, 1,3,5,8, 6,4,2,0];
      const dur = 10; // durée totale du bar

      arp.forEach((idx, i) => {
        const freq = scale[idx % scale.length];
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        const rev = this._reverb(ctx);
        const rg = ctx.createGain();
        rg.gain.value = 0.3;

        osc.type = 'sine';
        osc.frequency.value = freq;

        const st = t + i * (dur / arp.length);
        const noteDur = (dur / arp.length) * 2.2;

        g.gain.setValueAtTime(0, st);
        g.gain.linearRampToValueAtTime(0.28, st + 0.06);
        g.gain.exponentialRampToValueAtTime(0.0001, st + noteDur);

        osc.connect(g);
        g.connect(bar);
        g.connect(rev);
        rev.connect(rg);
        rg.connect(bar);
        osc.start(st);
        osc.stop(st + noteDur + 0.1);

        // Harmonique douce (quinte)
        const osc2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        osc2.type = 'triangle';
        osc2.frequency.value = freq * 1.498; // quinte juste
        g2.gain.setValueAtTime(0, st);
        g2.gain.linearRampToValueAtTime(0.08, st + 0.1);
        g2.gain.exponentialRampToValueAtTime(0.0001, st + noteDur * 0.7);
        osc2.connect(g2); g2.connect(bar);
        osc2.start(st); osc2.stop(st + noteDur);
      });

      // Pad ambient doux (fond continu)
      [146.83, 220.00, 261.63].forEach(freq => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.06, t + 1.5);
        g.gain.setValueAtTime(0.06, t + dur - 1.5);
        g.gain.linearRampToValueAtTime(0, t + dur);
        osc.connect(g); g.connect(bar);
        osc.start(t); osc.stop(t + dur + 0.1);
      });

      t += dur;
      this._bgTimer = setTimeout(playBar, (dur - 0.8) * 1000);
    };
    playBar();
  },

  stopBg(){
    this.playing = false;
    clearTimeout(this._bgTimer);
    if(this.bgGain && this.ctx){
      try{
        this.bgGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.2);
      }catch(e){}
    }
  },

  // ── CÉLÉBRATION VICTOIRE : Fanfare majestueuse douce ──
  playCelebration(){
    this.init();
    if(!this.ctx) return;
    const ctx = this.ctx;
    const master = ctx.createGain();
    master.gain.value = this.muted ? 0 : 0.45;
    master.connect(ctx.destination);
    const rev = this._reverb(ctx);
    const rg = ctx.createGain();

// Mélanger les réponses d'une question
function shuffleRep(q){
  const reps=[...q.rep];
  for(let i=reps.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [reps[i],reps[j]]=[reps[j],reps[i]];
  }
  return{...q,rep:reps};
}

// Bonus imprévisible : 1 à 5 fois par partie, manches aléatoires
function initBonusManches(){
  const total = 1 + Math.floor(Math.random()*5); // entre 1 et 5
  const manches = new Set();
  while(manches.size < total){
    manches.add(2 + Math.floor(Math.random()*10)); // manches 2-11
  }
  return manches;
}

const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
const mkCombo=(a,b)=>[a,b].sort().join("+");
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
const getNiveau=xp=>[...NIVEAUX].reverse().find(n=>xp>=n.min)||NIVEAUX[0];
const getIdxNiv=xp=>NIVEAUX.indexOf(getNiveau(xp));
const getXPProg=xp=>{
  const c=getNiveau(xp),i=NIVEAUX.indexOf(c),n=NIVEAUX[i+1];
  if(!n)return{pct:100,label:"MAX"};
  return{pct:Math.round(((xp-c.min)/(n.min-c.min))*100),label:(xp-c.min)+"/"+(n.min-c.min)+" XP"};
};

const BONUS = {

    if(BONUS.answered) return;
    // Éviter les répétitions — tracker les questions déjà posées cette partie
    if(!S.jeu.bonusHistory) S.jeu.bonusHistory=[];
    const disponibles = BONUS_QUESTIONS.filter(q=>!S.jeu.bonusHistory.includes(q.q));
    // Si toutes posées, repartir de zéro
    const pool = disponibles.length>0 ? disponibles : BONUS_QUESTIONS;
    // Choisir aléatoirement en équilibrant les piliers non encore posés
    const piliersNonPoses=[...new Set(pool.map(q=>q.pilier))];
    const pilierChoisi=pick(piliersNonPoses);
    const questionsDuPilier=pool.filter(q=>q.pilier===pilierChoisi);

// ════════════════════════════════════════════════
const FB_URL = "https://equilibre-c2fdc-default-rtdb.europe-west1.firebasedatabase.app";
const FB_AUTH = ""; // vide en mode test
let FB_OK = false;
let DB = null; // non utilisé en REST mode
let _sseListeners = {}; // Server-Sent Events actifs

// API REST Firebase avec CORS correct
const FBR = {
  _fetch(path, method, data){
    const opts = {
      method: method||"GET",
      mode: "cors",
      credentials: "omit",
      headers: {"Content-Type":"application/json"}
    };
    if(data!==undefined) opts.body = JSON.stringify(data);
    return fetch(FB_URL+"/"+path+".json", opts);
  },

  async get(path){
    try{
      const r = await FBR._fetch(path,"GET");
      if(!r.ok) return null;
      return await r.json();
    }catch(e){ return null; }
  },

  async set(path, data){
    try{
      const r = await FBR._fetch(path,"PUT",data);
      if(!r.ok) return null;
      return await r.json();
    }catch(e){ return null; }
  },

  async update(path, data){
    try{
      const r = await FBR._fetch(path,"PATCH",data);
      if(!r.ok) return null;
      return await r.json();
    }catch(e){ return null; }
  },

  // Écouter en temps réel via polling (remplace SSE — plus compatible Safari)
  listen(path, callback){
    if(_sseListeners[path]) FBR.unlisten(path);
    let lastData = null;
    // Lire immédiatement
    FBR.get(path).then(function(d){
      lastData = JSON.stringify(d);
      if(d) callback(d, path);
    });
    // Puis toutes les 2 secondes
    const interval = setInterval(function(){
      FBR.get(path).then(function(d){
        const str = JSON.stringify(d);
        if(str !== lastData){
          lastData = str;
          if(d) callback(d, path);
        }
      });
    }, 2000);
    _sseListeners[path] = {close: function(){ clearInterval(interval); }};
    return _sseListeners[path];
  },

  unlisten(path){
    if(_sseListeners[path]){
      _sseListeners[path].close();
      delete _sseListeners[path];
    }
  },

  unlistenAll(){
    Object.keys(_sseListeners).forEach(function(p){ FBR.unlisten(p); });
  }
};

  // ── Rejoindre salle ──
  async rejoindre(code){

      FB_OK=t.ok;
    }catch(e){ FB_OK=false; }

    if(!FB_OK){ showToast("❌ Connexion indisponible","lose",2500); MULTI._reset(); return; }

    try{
      const s=await FBR.get("salles/"+code);
      if(!s){ showToast("❌ Salle introuvable","lose",2500); MULTI._reset(); return; }

      const nb=Object.keys(s.joueurs||{}).length;
      if(nb>=s.maxPlayers){ showToast("⚠️ Salle complète","info",2500); MULTI._reset(); return; }

  // ── Écouter Firebase ──
  _ecouter(){
    FBR.listen("salles/"+MULTI.room, function(s){
      if(!s) return;
      MULTI.players=s.joueurs||{};
      const gs=s.gameState||null;

      if(s.statut==="jeu"&&gs){
        MULTI.gs=gs;
        const ph=gs.phase||"";
        MULTI._majTurn();

        if(ph==="selection"){
          if(S.ecran!=="multi_selection") S.ecran="multi_selection";
        } else {
          S.ecran="multi_jeu";
        }
        render();
      } else if(s.statut==="attente"&&S.ecran==="multi_lobby"){ render(); }
      else if(s.statut==="fini"){ S.ecran="multi_resultat"; render(); }
    });
    MULTI.listeners.push({off:function(){ FBR.unlisten("salles/"+MULTI.room); }});
  },

  _majTurn(){
    const gs=MULTI.gs||{};
    const ph=gs.phase||"";
    // En phase réponse : tout le monde joue simultanément
    if(ph==="choixReponse"){
      const rep=gs.reponses||{};
      MULTI.myTurn=!rep[MULTI.myId]&&rep[MULTI.myId]!==0;
    } else {
      MULTI.myTurn=gs.tourActuel===MULTI.myId;
    }
  },

  // ── Marquer prêt (lobby) ──

  async lancerPartie(){

    const ordre=shuffle([...actifs]);

    };

  _lancerDemo(){

    const ordre=shuffle([...actifs]);
    const ordreObj={}; ordre.forEach((id,i)=>ordreObj[i]=id);
    const scores={}; ordre.forEach(id=>scores[id]=0);
    MULTI.gs={
      manche:1, totalManches:12, tourActuel:ordre[0], ordreJeu:ordreObj,

    };

    S.ecran="multi_selection"; render(); AUDIO.sfxStart();
  },

  // ── Choisir pilier de base (identique G.choisirBase) ──
  async choisirBase(el){
    if(!MULTI.myTurn) return;
    // Accepte: string pilier, element avec data-p, ou event.currentTarget
    let pilier;
    if(typeof el==="string") pilier=el;
    else if(el&&el.dataset&&el.dataset.p) pilier=el.dataset.p;
    else if(el&&el.target&&el.target.dataset&&el.target.dataset.p) pilier=el.target.dataset.p;
    else pilier=el;
    if(!PILIER[pilier]) return;
    AUDIO.sfxClick();
    const gs=MULTI.gs; if(!gs||gs.phase!=="choixBase") return;

    const ordreArr=Object.values(gs.ordreJeu||{});
    const idx=ordreArr.indexOf(MULTI.myId);
    const prochain=ordreArr[(idx+1)%ordreArr.length];

    // Joueur choisit b1 → passe au suivant pour b2
    const update={phase:"choixBase2", b1:pilier, tourActuel:prochain};

    if(MULTI.demo){
      Object.assign(MULTI.gs, update);
      MULTI._majTurn();
      // Si le suivant est un bot → il joue automatiquement
      if(prochain!==MULTI.myId){
        setTimeout(function(){ MULTI._botChoisitB2(); }, 900);

  _botChoisitB2(){
    const gs=MULTI.gs; if(!gs||gs.phase!=="choixBase2") return;
    // Bot choisit le pilier qui maximise ses cartes
    const cands=PILIERS.filter(p=>p!==gs.b1);
    // En mode démo les bots n'ont pas de main — ils choisissent aléatoirement
    const pilier=pick(cands);
    const combo=mkCombo(gs.b1,pilier);
    const update={phase:"choixReponse", b2:pilier, cb:combo, tourActuel:"tous"};
    Object.assign(MULTI.gs, update);
    MULTI._majTurn(); // myTurn=true pour le joueur humain
    render();
    // Bots attendent que le joueur humain réponde d'abord (via _enregistrerReponse)
  },

  // ── Jouer sa carte réponse ──
  async jouerCarte(el){
    if(!MULTI.myTurn) return;
    const id=(el&&el.dataset)?el.dataset.id:el;
    const carte=MULTI.mainRep.find(function(c){ return c.id===id; });
    if(!carte) return;
    // Retirer la carte de la main
    MULTI.mainRep=MULTI.mainRep.filter(function(c){ return c.id!==id; });
    AUDIO.sfxCard();
    await MULTI._enregistrerReponse(carte.pts, carte);
  },

  // ── Passer (pas de carte valide) ──
  async passer(){
    AUDIO.sfxClick();
    await MULTI._enregistrerReponse(0, null);
  },

  async _enregistrerReponse(pts, carte){
    const gs=MULTI.gs; if(!gs||gs.phase!=="choixReponse") return;
    if(!gs.reponses) gs.reponses={};
    gs.reponses[MULTI.myId]=pts;
    MULTI.myTurn=false;

    if(MULTI.demo){
      render();
      // Bots jouent après que le joueur humain a joué
      setTimeout(function(){ MULTI._botsRepondent(); }, 800);
    } else {
      await FBR.update("salles/"+MULTI.room+"/gameState/reponses",{[MULTI.myId]:pts});
    }
  },

  // ── Bots répondent (démo) ──
  _botsRepondent(){
    const gs=MULTI.gs; if(!gs||gs.phase!=="choixReponse") return;
    const ordreArr=Object.values(gs.ordreJeu||{});
    const bots=ordreArr.filter(function(id){ return id!==MULTI.myId; });
    bots.forEach(function(id){
      if(gs.reponses[id]===undefined||gs.reponses[id]===null){
        gs.reponses[id]=[40,20,10,5][Math.floor(Math.random()*4)];
      }
    });
    const tousJoue=ordreArr.every(function(id){
      return gs.reponses[id]!==undefined&&gs.reponses[id]!==null;
    });
    if(tousJoue) MULTI._calculer();
    else render();
  },

  // ── Calculer résultat manche (identique _calcul solo) ──
  _calculer(){
    const gs=MULTI.gs; if(!gs) return;
    const ordreArr=Object.values(gs.ordreJeu||{});
    const rep=gs.reponses||{};
    const maxPts=Math.max(...ordreArr.map(function(id){ return rep[id]||0; }));
    const totPot=ordreArr.reduce(function(s,id){ return s+(rep[id]||0); },0);
    const gagnants=ordreArr.filter(function(id){ return (rep[id]||0)===maxPts; });
    const gains={};
    const newScores=Object.assign({},gs.scores||{});
    ordreArr.forEach(function(id){
      const g=(gagnants.length===1&&gagnants[0]===id)?totPot:0;
      gains[id]=g;
      newScores[id]=(newScores[id]||0)+g;
    });
    const gagnantNom=gagnants.length===1?(MULTI.players[gagnants[0]]?.nom||"?"):null;
    const msg=gagnantNom?gagnantNom+" gagne +"+totPot+" pts !":"Égalité — personne ne marque !";

    Object.assign(MULTI.gs,{
      phase:"resultManche",
      resultatManche:{msg,gains,totPot,gagnants},
      scores:newScores
    });
    MULTI.myTurn=false;
    render(); AUDIO.sfxWin();
  },

  // ── Manche suivante ──
  async mancheSuivante(){
    if(!MULTI.isHost) return;
    const gs=MULTI.gs; if(!gs) return;
    const ordreArr=Object.values(gs.ordreJeu||{});
    const newManche=(gs.manche||1)+1;

    if(newManche>(gs.totalManches||12)){
      if(MULTI.demo){ S.ecran="multi_resultat"; render(); }
      else { await FBR.update("salles/"+MULTI.room,{statut:"fini"}); }
      return;
    }
    const premierIdx=(newManche-1)%ordreArr.length;
    const update={
      manche:newManche, phase:"choixBase",
      b1:null, b2:null, cb:null,
      reponses:{}, resultatManche:null,
      prets:{},  // Reset prets pour la prochaine sélection si besoin
      tourActuel:ordreArr[premierIdx]
    };
    if(MULTI.demo){
      Object.assign(MULTI.gs,update);
      MULTI.myTurn=MULTI.gs.tourActuel===MULTI.myId;
      render();
    } else {
      await FBR.update("salles/"+MULTI.room+"/gameState",update);
    }
  },

  // ── Quitter ──
  async quitter(){
    if(!MULTI.demo&&MULTI.room&&MULTI.myId){
      try{ await FBR.update("salles/"+MULTI.room+"/joueurs/"+MULTI.myId,{actif:false}); }catch(e){}
    }
    MULTI._reset();
    S.ecran="menu"; render();
  },
};

function renderMultiJeu(app){
  const gs=MULTI.gs||{};
  const phase=gs.phase||"choixBase";
  const joueurs=Object.entries(MULTI.players).filter(function(e){return e[1].actif!==false;});
  const stB1=PILIER[gs.b1]||{accent:'#888',icon:'?',bg:'#111'};
  const stB2=PILIER[gs.b2]||{accent:'#888',icon:'?',bg:'#111'};
  const cb=gs.cb||"";
  const tourJ=MULTI.players[gs.tourActuel]||{couleur:'#888',icon:'👤',nom:'...'};

  // ── Scores ──
  let scoresHtml='<div style="display:grid;grid-template-columns:repeat('+joueurs.length+',1fr);gap:6px">';
  joueurs.forEach(function(e){
    const id=e[0],j=e[1];
    const actif=(phase==="choixReponse")||gs.tourActuel===id;
    scoresHtml+='<div style="text-align:center;padding:6px;border-radius:10px;'
      +'background:'+(actif?j.couleur+'22':'rgba(255,255,255,0.04)')+';'
      +'border:1.5px solid '+(actif?j.couleur:'transparent')+'">'
      +'<div style="font-size:16px">'+j.icon+'</div>'
      +'<div style="font-size:9px;color:'+j.couleur+';font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+j.nom+'</div>'
      +'<div style="font-size:18px;font-weight:900;color:var(--goldL);font-family:Cinzel,serif">'+((gs.scores&&gs.scores[id])||0)+'</div>'
      +'</div>';
  });
  scoresHtml+='</div>';

  // ── Indicateur de tour ──
  let indic='';
  if(phase==="choixReponse") indic='<div class="turn-indicator">⚡ Jouez votre carte réponse !</div>';
  else if(MULTI.myTurn) indic='<div class="turn-indicator">⚡ C&apos;est votre tour !</div>';
  else indic='<div style="font-size:12px;color:var(--muted)">Tour de <strong style="color:'+tourJ.couleur+'">'+tourJ.icon+' '+tourJ.nom+'</strong>…</div>';

  // ── Zone de jeu selon phase ──
  let zoneHtml='';

  // PHASE : choixBase — identique solo (4 piliers à choisir)
  if(phase==="choixBase"||phase==="choixBase2"){
    const label=phase==="choixBase"
      ?"⚔️ Choisissez votre pilier de base"
      :"↩️ Répondez au pilier "+stB1.icon+" "+gs.b1;
    if(MULTI.myTurn){
      let btns='';
      PILIERS.forEach(function(p){
        if(phase==="choixBase2"&&p===gs.b1) return;
        const st=PILIER[p];
        const nbCom=MULTI.mainRep.filter(function(c){return c.combo.includes(p);}).length;
        btns+='<div style="display:flex;flex-direction:column;align-items:center;gap:4px">'
          +'<div onclick="MULTI.choisirBase(\'' + p + '\')" style="cursor:pointer">' + pilierCard(p,{size:"lg"}) + '</div>'
          +'<div style="font-size:8px;color:'+st.accent+';font-weight:700">'+nbCom+' carte'+(nbCom>1?'s':'')+'</div>'
          +'</div>';
      });
      zoneHtml='<div style="text-align:center;padding:12px">'
        +'<div style="font-size:13px;color:var(--gold);font-weight:700;margin-bottom:12px">'+label+'</div>'
        +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:min(8px,2vw)">'+btns+'</div>'
        +'</div>';
    } else {
      zoneHtml='<div style="text-align:center;padding:32px 16px">'
        +'<div style="font-size:28px;margin-bottom:10px;animation:lobbyPulse 1s infinite">⏳</div>'
        +'<div style="font-size:12px;color:var(--muted)"><strong style="color:'+tourJ.couleur+'">'+tourJ.nom+'</strong>'
        +(phase==="choixBase"?" choisit son pilier…":" choisit son pilier de réponse…")+'</div>'
        +'</div>';
    }
  }

  // PHASE : choixReponse — afficher vraies cartes filtrées par combo (identique solo)
  else if(phase==="choixReponse"){
    const rep=gs.reponses||{};
    const dejaJoue=rep[MULTI.myId]!==undefined&&rep[MULTI.myId]!==null;
    const nbRep=Object.keys(rep).filter(function(id){return rep[id]!==null&&rep[id]!==undefined;}).length;

    // Header piliers joués (identique phase afficheBases solo)
    let header='<div style="display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:10px">'
      +'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:1.5px solid '+stB1.accent+'66;border-radius:12px;padding:6px 4px;background:'+stB1.accent+'0d">'
      +(joueurs[0]?'<div style="font-size:8px;color:'+stB1.accent+';font-weight:700">'+joueurs[0][1].nom+'</div>':'')
      +pilierCard(gs.b1,{size:"sm",played:true})
      +'</div>'
      +'<div style="flex-shrink:0;text-align:center">'
      +'<div style="font-size:16px">⚔️</div>'
      +'<div style="font-size:7px;color:var(--goldL);font-weight:700;background:#2D1B6999;padding:2px 5px;border-radius:5px;border:1px solid var(--gold);white-space:nowrap">'+cb+'</div>'
      +'</div>'
      +'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:1.5px solid '+stB2.accent+'88;border-radius:12px;padding:6px 4px;background:'+stB2.accent+'11">'
      +(joueurs[1]?'<div style="font-size:8px;color:'+stB2.accent+';font-weight:700">'+joueurs[1][1].nom+'</div>':'')
      +pilierCard(gs.b2,{size:"sm",played:true})
      +'</div>'
      +'</div>'
      +'<div style="font-size:10px;color:var(--muted);text-align:center;margin-bottom:8px">'+nbRep+'/'+joueurs.length+' ont répondu</div>';

    if(dejaJoue){
      zoneHtml='<div style="padding:14px">'+header
        +'<div style="text-align:center;font-size:12px;color:#45c97a;font-weight:700;animation:lobbyPulse 1.5s infinite">✅ Carte jouée — en attente des autres</div></div>';
    } else {
      // Vraies cartes filtrées par combo (identique solo renderJeu phase afficheBases)
      const cartesValides=MULTI.mainRep.filter(function(carte){ return carte.combo===cb; });
      let cartesHtml='';
      if(cartesValides.length>0){
        cartesHtml='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(96px,21vw),1fr));gap:6px;margin-bottom:8px">'
          +cartesValides.map(function(carte){
            return '<div onclick="MULTI.jouerCarte(this)" data-id="'+carte.id+'" style="cursor:pointer">'
              +carteRepHTML(carte,{})
              +'</div>';
          }).join('')
          +'</div>';
      } else {
        cartesHtml='<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">'
          +'Aucune carte pour ce combo'
          +'<br><button onclick="MULTI.passer()" style="margin-top:8px;padding:8px 20px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:var(--muted);cursor:pointer;">⏭️ Passer</button>'
          +'</div>';
      }
      zoneHtml='<div style="padding:12px">'+header+cartesHtml+'</div>';
    }
  }

  // PHASE : résultat manche
  else if(phase==="resultManche"){
    const res=gs.resultatManche||{};
    let gainsHtml='';
    Object.entries(res.gains||{}).forEach(function(e){
      const id=e[0],pts=e[1];
      const pl=MULTI.players[id]||{icon:'👤',couleur:'#fff',nom:id};
      gainsHtml+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06)">'
        +'<div style="font-size:16px">'+pl.icon+'</div>'
        +'<div style="flex:1;font-size:13px;font-weight:700;color:'+pl.couleur+'">'+pl.nom+'</div>'
        +'<div style="font-size:18px;font-weight:900;color:'+(pts>0?'var(--goldL)':'var(--muted)')+';font-family:Cinzel,serif">'+(pts>0?'+':'')+pts+' pts</div>'
        +'</div>';
    });
    const mancheBtn=MULTI.isHost
      ?'<button class="btn-gold" style="margin-top:14px" onclick="MULTI.mancheSuivante()">Manche suivante →</button>'
      :'<div style="font-size:11px;color:var(--muted);margin-top:10px;text-align:center">L\'h&ocirc;te passe &agrave; la manche suivante&hellip;</div>';
    zoneHtml='<div style="padding:16px;text-align:center">'
      +'<div style="font-size:16px;font-weight:900;color:var(--goldL);font-family:Cinzel,serif;margin-bottom:12px">'+(res.msg||'Résultat')+'</div>'
      +gainsHtml+mancheBtn+'</div>';
  }
  else {
    zoneHtml='<div style="text-align:center;padding:32px;color:var(--muted)">Phase : '+phase+'</div>';
  }

  app.innerHTML='<div style="min-height:100vh;background:transparent;padding:min(10px,2.5vw);display:flex;flex-direction:column;gap:min(8px,2vw);max-width:600px;margin:0 auto">'
    // Barre navigation
    +'<div style="display:flex;justify-content:space-between;align-items:center">'
    +'<div style="font-size:12px;font-weight:700;color:var(--goldL);font-family:Cinzel,serif">⚖️ ÉQUILIBRE</div>'
    +'<div style="font-size:10px;color:var(--muted)">Manche '+(gs.manche||1)+'/'+(gs.totalManches||12)+'</div>'
    +'<button onclick="MULTI_CONFIRM_MENU()" style="background:rgba(255,80,80,0.12);border:1px solid rgba(255,80,80,0.3);border-radius:8px;padding:5px 10px;color:#e05555;font-size:11px;font-weight:700;cursor:pointer;">🏠 Menu</button>'
    +'</div>'
    // Scores
    +'<div class="card" style="padding:10px 12px">'+scoresHtml+'</div>'
    // Tour
    +'<div style="text-align:center">'+indic+'</div>'
    // Zone jeu
    +'<div class="card" style="flex:1">'+zoneHtml+'</div>'
    +'<button class="btn-ghost" onclick="MULTI.quitter()">🚪 Quitter</button>'
    +'</div>';
}

        <div style="font-size:9px;color:var(--muted);margin-bottom:1px">${nom}${S.jeu.streak>=2?` <span style="color:#ff6b35">🔥×${S.jeu.streak}</span>`:""}</div>
        <span style="font-size:26px;font-weight:900;font-family:'Cinzel',serif;color:${lead?"var(--goldL)":"var(--text)"}">${s1}</span>
        <span style="font-size:10px;color:var(--muted);margin-left:3px">pts</span>
        ${lead?`<span style="font-size:9px;color:var(--goldL);margin-left:6px;font-weight:700">▲ MÈNE</span>`:""}
      </div>
      <div style="font-size:10px;color:var(--muted)">⚔️</div>
      <div style="text-align:right">
        <div style="font-size:9px;color:var(--muted);margin-bottom:1px">IA</div>
        <span style="font-size:26px;font-weight:900;font-family:'Cinzel',serif;color:${!lead&&s2>s1?"var(--red)":"var(--text)"}">${s2}</span>
        <span style="font-size:10px;color:var(--muted);margin-left:3px">pts</span>
        ${!lead&&s2>s1?`<span style="font-size:9px;color:var(--red);margin-left:6px;font-weight:700">▲ MÈNE</span>`:""}
      </div>
    </div>
    <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:3px;font-size:9px;color:var(--muted)">
      <span>${nom}</span><span>${Math.abs(s1-s2)} pts d'écart</span><span>IA</span>
    </div>
  </div>`;
}

function contexteHTML(manche){
  const ctx=CONTEXTES[(manche-1)%CONTEXTES.length];
  return`<div style="background:linear-gradient(135deg,rgba(45,27,105,0.5),rgba(26,13,61,0.5));border:1px solid rgba(212,175,55,0.3);border-radius:12px;padding:10px 14px;margin-bottom:10px;text-align:center">
    <div style="font-size:9px;color:var(--gold);letter-spacing:2px;margin-bottom:3px">🎭 CONTEXTE</div>

    <div style="font-size:10px;color:var(--muted);font-style:italic">${ctx.d}</div>

}

function aperçuMain(main,jokers){
  const combos=[...new Set(main.map(c=>c.combo))];
  if(main.length===0)return`<div class="card" style="text-align:center;padding:16px"><div style="font-size:28px;margin-bottom:6px">📭</div><div style="color:var(--red);font-weight:700">Plus de cartes disponibles</div></div>`;
  return`<div class="card" style="padding:12px">
    <div style="font-size:10px;color:var(--gold);font-weight:700;margin-bottom:10px;letter-spacing:1px">VOS CARTES (${main.length})</div>
    ${combos.map(combo=>{
      const cs=main.filter(c=>c.combo===combo);
      const[pa,pb]=combo.split("+");
      const sA=PILIER[pa]||{accent:"#888",icon:"?"},sB=PILIER[pb]||{accent:"#888",icon:"?"};

        <div style="display:flex;align-items:center;gap:5px;margin-bottom:6px">
          <span style="font-size:12px">${sA.icon}</span>
          <span style="font-size:9px;color:${sA.accent};font-weight:700">${pa}</span>
          <span style="font-size:9px;color:var(--muted)">+</span>
          <span style="font-size:9px;color:${sB.accent};font-weight:700">${pb}</span>
          <span style="font-size:12px">${sB.icon}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(96px,21vw),1fr));gap:min(6px,1.5vw)">${cs.map(c=>carteRepHTML(c,{disabled:true})).join("")}</div>
      </div>`;
    }).join("")}
    ${jokers.length>0?`<div style="margin-top:8px"><div style="font-size:10px;color:var(--gold);font-weight:700;margin-bottom:5px">VOS JOKERS</div><div style="display:flex;gap:7px">${jokers.map(j=>jokerCardHTML(j,{onClick:`G.useJoker('${j.id}')`})).join("")}</div></div>`:""}
  </div>`;
}

// JOKER OVERLAY CINÉMATIQUE
// ════════════════════════════════════════════════
function showJokerOverlay(joker, ptsReveal, who, callback){
  const ov=document.getElementById("joker-overlay");
  const bg=document.getElementById("jov-bg");
  const card=document.getElementById("jov-card");
  const ripple=document.getElementById("jov-ripple");
  const ripple2=document.getElementById("jov-ripple2");
  const icon=document.getElementById("jov-icon");
  const name=document.getElementById("jov-name");
  const desc=document.getElementById("jov-desc");
  const title=document.getElementById("jov-title");
  const subdesc=document.getElementById("jov-subdesc");
  const pts=document.getElementById("jov-pts");

  // Couleurs selon joker
  const colors={j1:"#6a0dad",j2:"#0d47a1",j3:"#1b5e20",j4:"#4a148c"};
  const jcol=colors[joker.id]||"#D4AF37";

  // CSS variable couleur
  ov.style.setProperty("--jcolor",jcol);

  // Fond semi-transparent coloré
  bg.style.background=`radial-gradient(ellipse at center,${jcol}cc 0%,rgba(7,5,20,0.97) 70%)`;

  // Carte grande
  card.style.background=`linear-gradient(160deg,${jcol}44,rgba(7,5,20,0.95))`;
  icon.textContent=joker.icon;
  name.textContent=joker.name;
  desc.textContent=joker.desc;

  // Texte selon qui joue
  if(who==="joueur"){
    title.textContent=joker.name.toUpperCase()+" !";
    title.style.color="var(--goldL)";
    subdesc.textContent=joker.id==="j1"?"Vous raflез TOUT le pot !"
      :joker.id==="j2"?"Le pot est multiplié par 2 !"
      :joker.id==="j3"?"Vous révélez les cartes adverses !"
      :"Une carte est générée automatiquement !";
  }else{
    title.textContent="L'IA JOUE "+joker.name.toUpperCase()+" !";
    title.style.color="#ff6b6b";
    subdesc.textContent=joker.id==="j1"?"L'IA rafle TOUT le pot !"
      :"L'IA double le pot — attention !";
  }

  // Points
  if(ptsReveal!==null){
    pts.style.display="block";
    const ptCol=who==="joueur"?"var(--goldL)":"#ff6b6b";
    pts.style.color=ptCol;
    pts.style.textShadow=`0 0 20px ${jcol},0 0 40px ${jcol}88`;
    pts.textContent=(who==="joueur"?"+":"-")+ptsReveal+" pts !";
  }else{
    pts.style.display="none";
  }

  // Reset animations
  [card,title,subdesc,pts,bg,ripple,ripple2].forEach(el=>{
    el.style.animation="none";
    void el.offsetWidth; // force reflow
  });
  card.style.animation="jokerFlash 0.6s cubic-bezier(.34,1.56,.64,1) both, jokerGlow 1s 0.5s infinite";
  bg.style.animation="jokerBg 2.5s ease forwards";
  title.style.animation="jokerTitle 0.5s 0.4s both";
  subdesc.style.animation="jokerSub 0.6s 0.7s both";
  pts.style.animation="jokerSub 0.5s 1.0s both";
  ripple.style.borderColor=jcol;
  ripple2.style.borderColor=jcol;
  ripple.style.animation="ripple 1s 0.3s ease-out infinite";
  ripple2.style.animation="ripple 1s 0.7s ease-out infinite";

  // Shake l'écran
  document.getElementById("app").style.animation="screenShake 0.5s 0.1s ease both";
  setTimeout(()=>{document.getElementById("app").style.animation="none";},700);

  // Afficher
  ov.classList.add("active");

  // Fermer après 2.5s et appeler callback
  setTimeout(()=>{
    ov.classList.remove("active");
    if(callback)callback();
  },2500);
}

// LOGIQUE JEU
// ════════════════════════════════════════════════
const G={
  startJeu(survie=false){
    S.survieActif=survie;
    if(survie)S.viesSurvie=3;
    const r=shuffle([...REPONSES]);
    const j=shuffle([...JOKERS]);
    S.jeu={
      phase:"selection",
      allRepJ1:r.slice(0,12),allRepJ2:r.slice(12,24),
      allJokJ1:j.slice(0,2),allJokJ2:j.slice(2,4),
      mainRepJ1:[],mainRepJ2:[],mainJokJ1:[],mainJokJ2:[],
      selTemp:[],
      s1:0,s2:0,manche:1,total:12,premier:"j1",
      b1:null,b2:null,cb:null,
      repChoisie:null,repIA:null,
      jActif:null,jIA:null,
      msg:"",
      profil:{Spiritualité:0,Amour:0,Santé:0,Argent:0},
      historique:[],
      streak:0,maxStreak:0,manchesGagnees:0,
      brakeurWin:false,multiWin:false,cartes40:0,remontada:false,battuExpert:false,
      piliers:{},
      iaDlg:null,iaTyping:false,
      espionCartes:[],espionActif:false,phaseEchange:false,gainFinal:null,bonusHistory:[],
      timerSec:0,
      repIAVues:[],
    };
    S.jeu.bonusManches = initBonusManches();
    S.ecran="selection";
    render();
    AUDIO.sfxStart();
    AUDIO.startBg();
    setTimeout(()=>{
      const iaPr=IA_PROFILS[S.diff]||IA_PROFILS.Intermédiaire;
      G.showIADlg(pick(iaPr.dlg.debut));
    },800);
  },

  confirmerSelection(){
    const j=S.jeu;
    if(j.selTemp.length<10)return;
    j.mainRepJ1=[...j.selTemp];
    j.mainJokJ1=[...j.allJokJ1];
    // IA sélectionne ses 10
    if(S.diff==="Expert"){j.mainRepJ2=[...j.allRepJ2].sort((a,b)=>b.pts-a.pts).slice(0,10);}
    else if(S.diff==="Débutant"){j.mainRepJ2=shuffle([...j.allRepJ2]).slice(0,10);}
    else{const s=[...j.allRepJ2].sort((a,b)=>b.pts-a.pts);j.mainRepJ2=[...s.slice(0,7),...shuffle(s.slice(7)).slice(0,3)];}
    j.mainJokJ2=[...j.allJokJ2];
    j.phase="choixBase";
    S.ecran="jeu";
    render();
  },

  toggleSel(id){
    const j=S.jeu;
    const idx=j.selTemp.findIndex(c=>c.id===id);
    if(idx>=0){j.selTemp.splice(idx,1);}
    else if(j.selTemp.length<10){const c=j.allRepJ1.find(x=>x.id===id);if(c)j.selTemp.push(c);}
    renderSelection(document.getElementById("app"));
  },

  choisirBase(p){
    const j=S.jeu;
    if(j.phase!=="choixBase")return;
    j.b1=p;j.phase="j1AChoisi";
    const iaPr=IA_PROFILS[S.diff]||IA_PROFILS.Intermédiaire;
    G.showIADlg(pick(iaPr.dlg.bluff));
    render();
  },

  iaRepond(){
    const j=S.jeu;
    const cands=PILIERS.filter(p=>p!==j.b1);
    let baseIA;
    if(S.diff==="Expert"){
      baseIA=[...cands].sort((a,z)=>{
        const ma=Math.max(...j.mainRepJ2.filter(c=>c.combo===mkCombo(j.b1,a)).map(c=>c.pts),0);
        const mz=Math.max(...j.mainRepJ2.filter(c=>c.combo===mkCombo(j.b1,z)).map(c=>c.pts),0);
        return mz-ma;
      })[0];
    }else if(S.diff==="Débutant"){baseIA=pick(cands);}
    else{
      const opt=[...cands].sort((a,z)=>{
        const ma=Math.max(...j.mainRepJ2.filter(c=>c.combo===mkCombo(j.b1,a)).map(c=>c.pts),0);
        const mz=Math.max(...j.mainRepJ2.filter(c=>c.combo===mkCombo(j.b1,z)).map(c=>c.pts),0);
        return mz-ma;
      })[0];
      baseIA=Math.random()<0.6?opt:pick(cands);
    }
    j.b2=baseIA;j.cb=mkCombo(j.b1,baseIA);
    j.repChoisie=null;j.repIA=null;j.phase="afficheBases";
    G.startTimer();render();
  },

  j1RepondIA(p){
    const j=S.jeu;
    if(p===j.b2)return;
    j.b1=p;j.cb=mkCombo(p,j.b2);
    j.repChoisie=null;j.repIA=null;j.phase="afficheBases";
    G.startTimer();render();
  },

  selRep(id){
    const j=S.jeu;
    if(!j||j.phase!=="afficheBases"||j.phaseEchange)return;
    const c=j.mainRepJ1.find(x=>x.id===id);
    if(!c)return;
    j.repChoisie=(j.repChoisie?.id===id)?null:c;
    render();
  },

  jouerRep(){
    const j=S.jeu;
    G.stopTimer();
    if(!j.repChoisie)return;
    AUDIO.sfxCard();
    G.execRep(j.repChoisie);
  },

  passerTour(){
    G.stopTimer();
    AUDIO.sfxClick();
    G.execRep(null);
  },

  execRep(cJ1){
    const j=S.jeu;
    G.stopTimer();
    const vIA=j.mainRepJ2.filter(c=>c.combo===j.cb);
    let cIA=null;
    if(vIA.length>0){
      if(S.diff==="Expert")cIA=[...vIA].sort((a,b)=>b.pts-a.pts)[0];
      else if(S.diff==="Débutant")cIA=[...vIA].sort((a,b)=>a.pts-b.pts)[0];
      else cIA=pick(vIA);
    }
    if(cJ1)j.mainRepJ1=j.mainRepJ1.filter(x=>x.id!==cJ1.id);
    if(cIA)j.mainRepJ2=j.mainRepJ2.filter(x=>x.id!==cIA.id);
    j.repChoisie=cJ1;j.repIA=cIA;
    // Si aucune carte des deux côtés → égalité, manche suivante immédiate
    if(!cJ1&&!cIA){
      showToast("🤝 Aucune carte — manche suivante !","info",1800);
      G._calcul(null,null,null,null);
      return;
    }
    j.phase="apresReponses";
    render();
  },

  useJoker(id){
    const j=S.jeu;
    if(j.phase==="afficheBases"){
      if(id==="j3"){G.useEspion();return;}
      if(id==="j4"){G.useEchange();return;}
    }
  },

  useEspion(){
    const j=S.jeu;
    const jok=j.mainJokJ1.find(x=>x.id==="j3");
    if(!jok)return;
    j.mainJokJ1=j.mainJokJ1.filter(x=>x.id!=="j3");
    const vues=j.mainRepJ2.filter(c=>c.combo===j.cb).sort((a,b)=>b.pts-a.pts).slice(0,3);
    j.repIAVues=vues;j.espionActif=true;
    showToast("👁 Espion — 3 cartes de l'IA révélées !");
    render();
    setTimeout(()=>{j.espionActif=false;render();},5000);
  },

  useEchange(){
    const j=S.jeu;
    const jok=j.mainJokJ1.find(x=>x.id==="j4");
    if(!jok||!j.cb) return;

    // Passer en mode sélection Échange
    j.phaseEchange=true;
    showToast("🔄 Choisissez la carte à sacrifier","info",3000);
    render();
  },

  // Appelé quand le joueur clique sur une carte à sacrifier
  confirmerEchange(idSacrifice){
    const j=S.jeu;
    if(!j.phaseEchange) return;

    // Retirer la carte sacrifiée de la main
    j.mainRepJ1=j.mainRepJ1.filter(x=>x.id!==idSacrifice);
    if(j.repChoisie?.id===idSacrifice) j.repChoisie=null;

    // Piocher une nouvelle carte du même combo non encore en main
    const enMain=new Set(j.mainRepJ1.map(x=>x.id));
    const poss=REPONSES.filter(r=>r.combo===j.cb&&!enMain.has(r.id));
    const source=poss.length>0?poss:REPONSES.filter(r=>r.combo===j.cb);
    const nouvelleCarte={...pick(source), id:"ech_"+Date.now()};

    // Ajouter la nouvelle carte à la main
    j.mainRepJ1=[...j.mainRepJ1, nouvelleCarte];

    // Consommer le joker
    j.mainJokJ1=j.mainJokJ1.filter(x=>x.id!=="j4");
    j.phaseEchange=false;

    // Sélectionner automatiquement la nouvelle carte
    j.repChoisie=nouvelleCarte;

    AUDIO.sfxBadge();
    showToast(`🔄 Échange ! "${nouvelleCarte.name}" (${nouvelleCarte.pts} pts) intégrée !`,"win",3000);
    render();
  },

  annulerEchange(){
    const j=S.jeu;
    j.phaseEchange=false;
    render();
  },

  // Échange libre : pas de sacrifice, juste piocher une carte (quand aucune valide)
  useEchangeLibre(){
    const j=S.jeu;
    const jok=j.mainJokJ1.find(x=>x.id==="j4");
    if(!jok) return;
    const enMain=new Set(j.mainRepJ1.map(x=>x.id));
    const poss=REPONSES.filter(r=>r.combo===j.cb&&!enMain.has(r.id));
    const source=poss.length>0?poss:REPONSES.filter(r=>r.combo===j.cb);
    const nouvelleCarte={...pick(source), id:"ech_"+Date.now()};
    j.mainRepJ1=[...j.mainRepJ1, nouvelleCarte];
    j.mainJokJ1=j.mainJokJ1.filter(x=>x.id!=="j4");
    j.repChoisie=nouvelleCarte;
    AUDIO.sfxBadge();
    showToast(`🔄 "${nouvelleCarte.name}" (${nouvelleCarte.pts} pts) piochée !`,"win",2500);
    render();
  },

  appliquerJoker(id){
    const j=S.jeu;
    let joker=id?j.mainJokJ1.find(x=>x.id===id):null;
    if(joker)j.mainJokJ1=j.mainJokJ1.filter(x=>x.id!==id);
    if(joker){
      AUDIO.sfxJoker();
      const tot=(j.repChoisie?.pts||0)+(j.repIA?.pts||0);
      const ptsGain=joker.id==="j1"?tot:joker.id==="j2"?tot*2:null;
      showJokerOverlay(joker,ptsGain,"joueur",()=>G.resoudre(j.repChoisie,j.repIA,joker));
    }else{
      G.resoudre(j.repChoisie,j.repIA,null);
    }
  },

  resoudre(cJ1,cIA,jokerFinal){
    const j=S.jeu;
    let jIAUsed=null;
    if(j.mainJokJ2.length>0){
      const p1=cJ1?.pts||0,p2=cIA?.pts||0;
      const brak=j.mainJokJ2.find(x=>x.id==="j1"),mult=j.mainJokJ2.find(x=>x.id==="j2");
      if(S.diff==="Expert"){if(p1>p2&&brak)jIAUsed=brak;else if(p2>=p1&&mult)jIAUsed=mult;}
      else if(S.diff==="Intermédiaire"&&Math.random()<0.25)jIAUsed=pick(j.mainJokJ2);
      else if(S.diff==="Débutant"&&Math.random()<0.08)jIAUsed=pick(j.mainJokJ2);
      if(jIAUsed)j.mainJokJ2=j.mainJokJ2.filter(x=>x.id!==jIAUsed.id);
    }
    // IA joue un joker offensif → overlay IA avant le calcul
    if(!jokerFinal&&jIAUsed&&(jIAUsed.id==="j1"||jIAUsed.id==="j2")){
      const tot=(cJ1?.pts||0)+(cIA?.pts||0);
      const ptsPerdus=jIAUsed.id==="j1"?tot:tot*2;
      showJokerOverlay(jIAUsed,ptsPerdus,"ia",()=>G._calcul(cJ1,cIA,jokerFinal,jIAUsed));
      return;
    }
    G._calcul(cJ1,cIA,jokerFinal,jIAUsed);
  },

  _calcul(cJ1,cIA,jokerFinal,jIAUsed){
    const j=S.jeu;
    const iaPr=IA_PROFILS[S.diff]||IA_PROFILS.Intermédiaire;
    let p1=cJ1?.pts||0,p2=cIA?.pts||0;
    const tot=p1+p2; // total des deux cartes jouées cette manche

    // ── Brakeur joueur : vole TOUT le pot (p1+p2), même si IA ou joueur a passé ──
    if(jokerFinal?.id==="j1"){
      p1=tot; // le joueur prend tout
      p2=0;
    }
    // ── Multiplicateur joueur : double le total ──
    else if(jokerFinal?.id==="j2"){
      p1=tot*2;
      p2=0;
    }
    // ── Brakeur IA : l'IA vole tout le pot, même si joueur a passé ──
    if(!jokerFinal&&jIAUsed?.id==="j1"){
      p2=tot; // l'IA prend tout
      p1=0;
    }
    // ── Multiplicateur IA ──
    else if(!jokerFinal&&jIAUsed?.id==="j2"){
      p2=tot*2;
      p1=0;
    }

    let msg="",xpG=0,gagnant=0;
    const j1p=!cJ1&&jokerFinal?.id!=="j1"; // passe réel = pas de carte ET pas de Brakeur
    const iap=!cIA&&jIAUsed?.id!=="j1";

    // Stocker gain réel (après joker) pour affichage phase fin
    j.gainFinal={p1,p2,joker:jokerFinal?.id||jIAUsed?.id||null};

    if(!cJ1&&!cIA&&!jokerFinal&&!jIAUsed){
      msg="🤝 Aucune carte — égalité !";
      j.gainFinal={p1:0,p2:0,joker:null};
      j.msg=msg;j.phase="fin";
      showToast(msg,"info",1800);
      render();
      // Manche suivante automatique après 1.8s
      setTimeout(()=>G.mancheSuivante(),1900);
      return;
    }
    // Brakeur joueur — il prend tout même si l'IA a une carte
    else if(jokerFinal?.id==="j1"){
      j.s1+=p1;
      msg=`💀 BRAKEUR ! ${S.nom} rafle +${p1} pts !`;
      xpG=p1*2;gagnant=1;showAnimPts(p1);
    }
    // Brakeur IA — elle prend tout
    else if(!jokerFinal&&jIAUsed?.id==="j1"){
      j.s2+=p2;
      msg=`💀 Brakeur IA ! L'IA rafle +${p2} pts`;
    }
    else if(j1p&&iap){msg="🤝 Aucune carte — égalité !";}
    else if(j1p){j.s2+=p2;msg=`💔 IA gagne +${p2} pts`;}
    else if(iap){
      j.s1+=p1;
      msg=`🏆 ${S.nom} gagne +${p1} pts !`;
      xpG=p1*2;gagnant=1;showAnimPts(p1);
    }
    else if(p1>p2){
      const gain=p1+p2;
      j.s1+=gain;
      if(jokerFinal?.id==="j2") msg=`🏆 ×2 ! ${S.nom} gagne +${gain} pts !`;
      else msg=`🏆 ${S.nom} gagne +${gain} pts !`;
      xpG=gain*2;gagnant=1;showAnimPts(gain);
    }
    else if(p2>p1){j.s2+=p1+p2;msg=`💔 IA gagne +${p1+p2} pts`;}
    else{msg="🤝 Égalité !";}
    j.manchesGagnees+=gagnant;
    j.streak=gagnant?j.streak+1:0;
    j.maxStreak=Math.max(j.maxStreak,j.streak);
    if(j.b1)j.piliers[j.b1]=(j.piliers[j.b1]||0)+1;
    if(jokerFinal?.id==="j1"&&gagnant)j.brakeurWin=true;
    if(jokerFinal?.id==="j2"&&gagnant)j.multiWin=true;
    if(cJ1?.pts===40)j.cartes40++;
    // Remontada : était à -60 ou plus et gagne maintenant
    if(gagnant===1&&(j.s2-j.s1+p1+p2)>=60)j.remontada=true;
    if(cJ1){const[a,b]=cJ1.combo.split("+");j.profil[a]=(j.profil[a]||0)+Math.round(cJ1.pts/2);j.profil[b]=(j.profil[b]||0)+Math.round(cJ1.pts/2);}
    G.checkBadges(j);
    if(xpG>0)S.xp+=xpG;
    j.jIA=jIAUsed;j.jActif=jokerFinal||j.jActif;j.msg=msg;
    j.historique.push({manche:j.manche,b1:j.b1,b2:j.b2,cb:j.cb,cJ1,cIA,jokerFinal,jIAUsed,gagnant});
    const tp=gagnant===1?"win":gagnant===0&&!j1p&&!iap?"info":"lose";
    if(gagnant===1)AUDIO.sfxWin();
    else if(tp==="lose")AUDIO.sfxLose();
    showToast(msg,tp);
    setTimeout(()=>G.showIADlg(pick(iaPr.dlg[gagnant===1?"perd":gagnant===0&&!j1p&&!iap?"egal":"gagne"])),400);
    j.phase="fin";
    render();
    // Bonus imprévisible — alterne entre Questions et Jackpot Flash
    if(j.bonusManches&&j.bonusManches.has(j.manche)){
      setTimeout(()=>{
        // Guard : ne pas lancer si un overlay est déjà actif
        const jpOv=document.getElementById("jackpot-overlay");
        const bOv=document.getElementById("bonus-overlay");
        if(jpOv?.classList.contains("active")||bOv?.classList.contains("active")) return;
        if(j.manche%2===0) JACKPOT.launch();
        else BONUS.launch();
      }, 1800);
    }
  },

  mancheSuivante(){
    const j=S.jeu;
    if(j.manche>=j.total||j.mainRepJ1.length===0){
      G.finPartie();return;
    }
    G._doMancheSuivante(j);
  },

  _doMancheSuivante(j){
    const prochain=j.premier==="j1"?"ia":"j1";
    j.premier=prochain;j.manche++;
    j.b1=null;j.b2=null;j.cb=null;
    j.repChoisie=null;j.repIA=null;j.msg="";j.lastBonusQ=j.lastBonusQ||null;
    j.jActif=null;j.jIA=null;j.espionActif=false;j.repIAVues=[];j.phaseEchange=false;j.gainFinal=null;
    if(prochain==="ia"){
      // Choisir un pilier où l'IA a encore des cartes disponibles
      const piliersDispo=PILIERS.filter(p=>
        PILIERS.some(p2=>p2!==p&&j.mainRepJ2.some(c=>c.combo===mkCombo(p,p2)))
      );
      j.b2=piliersDispo.length>0?pick(piliersDispo):pick(PILIERS);
      j.phase="iaChoisitBase";
    }
    else j.phase="choixBase";
    render();
  },

  finPartie(){
    const j=S.jeu;
    // Vérifier défis
    let bonusXP=0;
    DEFIS.forEach(d=>{
      if(!S.defisDone.includes(d.id)){
        const ok=d.check(j.historique,j.s1,j.s2,S.diff,j.maxStreak);
        if(ok){S.defisDone.push(d.id);bonusXP+=d.xp;showToast(`${d.icon} Défi accompli ! +${d.xp} XP`,"badge",3500);}
      }
    });
    S.xp+=bonusXP;
    // Badge battu expert — AVANT checkBadges
    if(S.diff==="Expert"&&j.s1>j.s2)j.battuExpert=true;
    j.battuExpert=j.battuExpert; // expose sur l'objet jeu
    G.checkBadges(j);
    // Classement
    S.classement.push({nom:S.nom,pts:j.s1,xp:S.xp});
    S.classement.sort((a,b)=>b.pts-a.pts);
    S.classement=S.classement.slice(0,10);
    // Survie
    if(S.survieActif&&j.s1<=j.s2){
      S.viesSurvie--;
      if(S.viesSurvie<=0){S.survieActif=false;S.viesSurvie=3;}
    }
    if(S.jeu&&S.jeu.s1>S.jeu.s2)AUDIO.playCelebration();
    S.ecran="resultat";sauvegarder();render();
  },

  checkBadges(jeu){
    const statsObj={
      streak:jeu.streak,piliers:jeu.piliers,manchesGagnees:jeu.manchesGagnees,
      brakeurWin:jeu.brakeurWin,multiWin:jeu.multiWin,cartes40:jeu.cartes40,
      remontada:jeu.remontada,battuExpert:jeu.battuExpert
    };
    BADGES.forEach(b=>{
      if(!S.badgesTotal.includes(b.id)&&b.check(statsObj)){
        S.badgesTotal.push(b.id);
        AUDIO.sfxBadge();
        showToast(`${b.icon} Badge débloqué : ${b.name} !`,"badge",3500);
      }
    });
  },

  showIADlg(texte,delay=0){
    const j=S.jeu;if(!j)return;
    j.iaTyping=true;j.iaDlg=null;
    // Ne pas re-render si on est en phase fin (résultat déjà affiché)
    if(j.phase!=="fin") render();
    setTimeout(()=>{j.iaTyping=false;j.iaDlg=texte;if(S.jeu?.phase!=="fin")render();},delay+700);
    setTimeout(()=>{j.iaDlg=null;if(S.jeu?.phase!=="fin")render();},delay+4200);
  },

  // Timer
  _timerInt:null,
  _timerFired:false,
  startTimer(){
    const j=S.jeu;j.timerSec=20;
    G._timerFired=false;
    clearInterval(G._timerInt);
    G._timerInt=setInterval(()=>{
      if(!S.jeu||S.jeu.phase!=="afficheBases"){clearInterval(G._timerInt);return;}
      j.timerSec--;
      G.updateTimer();
      if(j.timerSec<=0){
        clearInterval(G._timerInt);
        if(!G._timerFired){
          G._timerFired=true;
          // Si le joueur a déjà sélectionné une carte, la jouer automatiquement
          if(S.jeu?.repChoisie) G.jouerRep();
          else G.execRep(null);
        }
      }
    },1000);
  },
  stopTimer(){
    clearInterval(G._timerInt);
    G._timerFired=true; // empêche double appel
    if(S.jeu)S.jeu.timerSec=0;
  },
  updateTimer(){
    const el=document.getElementById("timerNum");
    const bar=document.getElementById("timerBar");
    if(!el||!bar)return;
    const sec=S.jeu?.timerSec||0;
    const col=sec<=5?"#e05555":sec<=10?"#FFA500":"#45c97a";
    el.textContent=sec;el.style.color=col;
    bar.style.width=(sec/20*100)+"%";bar.style.background=col;
    if(sec<=5)el.closest?.(".timer-wrap")?.style?.setProperty?.("animation","urgence 0.5s infinite");
  },
};

      <!-- Déroulement -->
      <div style="font-size:13px;color:var(--gold);font-weight:700;font-family:'Cinzel',serif;margin-bottom:10px;margin-top:6px;letter-spacing:1px">
        🔄 DÉROULEMENT D'UNE MANCHE
      </div>
      <div class="card" style="margin-bottom:14px">
        ${[
          {n:"1. Sélection (début de partie)",i:"🎯",t:"Avant la première manche, choisissez <strong style='color:var(--goldL)'>10 cartes parmi 12</strong>. Les 2 non-sélectionnées sont écartées définitivement. Stratégie clé : gardez vos combos les plus forts !"},
          {n:"2. Carte de Base",i:"🎴",t:"Le joueur qui commence choisit un <strong style='color:var(--goldL)'>Pilier de Base</strong> (Spiritualité, Amour, Santé ou Argent). L'adversaire répond avec un <strong style='color:var(--goldL)'>Pilier différent</strong>. Les deux Piliers forment un <strong style='color:var(--goldL)'>Combo</strong>."},
          {n:"3. Carte Réponse",i:"🃏",t:"Chaque joueur joue une <strong style='color:var(--goldL)'>Carte Réponse</strong> correspondant exactement au Combo formé. Vous avez <strong style='color:var(--goldL)'>30 secondes</strong> pour choisir. La carte jouée est <strong style='color:var(--red)'>défaussée définitivement</strong>."},
          {n:"4. Jokers (optionnel)",i:"⚡",t:"Après les Cartes Réponses, vous pouvez jouer un Joker offensif pour changer le résultat. C'est la phase de tension maximale !"},
          {n:"5. Résultat",i:"🏆",t:"Le joueur avec la carte de plus haute valeur remporte <strong style='color:var(--goldL)'>les deux cartes</strong> (sa carte + celle de l'adversaire). En cas d'égalité, chacun garde ses points. Si un joueur passe, l'adversaire ne gagne que sa propre carte."},
        ].map(s=>`
          <div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
            <div style="font-size:24px;flex-shrink:0;width:32px;text-align:center">${s.i}</div>
            <div>
              <div style="font-size:12px;color:var(--goldL);font-weight:700;margin-bottom:4px">${s.n}</div>
              <div style="font-size:12px;color:var(--muted);line-height:1.7">${s.t}</div>
            </div>
          </div>`).join("")}
      </div>

      <!-- Combos -->
      <div style="font-size:13px;color:var(--gold);font-weight:700;font-family:'Cinzel',serif;margin-bottom:10px;letter-spacing:1px">
        🔗 LES 6 COMBOS POSSIBLES
      </div>
      <div class="card" style="margin-bottom:14px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.6">
          Chaque paire de Piliers forme un Combo unique. Vos Cartes Réponses sont liées à ces Combos — seules les cartes du Combo actif peuvent être jouées.
        </div>
        ${[
          ["Amour","Spiritualité","Confiance, Compréhension, Présence, Ouverture"],
          ["Santé","Spiritualité","Équilibre, Sérénité, Vitalité, Résilience"],
          ["Argent","Spiritualité","Générosité, Intégrité, Intention, Sagesse"],
          ["Amour","Santé","Bienveillance, Soutien, Rayonnement, Joie"],
          ["Amour","Argent","Fiabilité, Engagement, Gratitude, Loyauté"],
          ["Argent","Santé","Prospérité, Responsabilité, Prévoyance, Prudence"],
        ].map(([a,b,cards])=>`
          <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
            <span style="font-size:14px">${PILIER[a].icon}</span>
            <span style="font-size:10px;color:${PILIER[a].accent};font-weight:700">${a}</span>
            <span style="font-size:10px;color:var(--muted)">+</span>
            <span style="font-size:10px;color:${PILIER[b].accent};font-weight:700">${b}</span>
            <span style="font-size:14px">${PILIER[b].icon}</span>
            <span style="font-size:9px;color:var(--muted);flex:1;text-align:right;font-style:italic">${cards}</span>
          </div>`).join("")}
      </div>

      <!-- Valeurs des cartes -->
      <div style="font-size:13px;color:var(--gold);font-weight:700;font-family:'Cinzel',serif;margin-bottom:10px;letter-spacing:1px">
        💎 VALEURS DES CARTES
      </div>
      <div class="card" style="margin-bottom:14px">
        ${[
          {pts:40,col:"#f1c40f",label:"Carte Maîtresse",desc:"La plus puissante. Une par Combo. Jouez-la au bon moment !"},
          {pts:20,col:"#e67e22",label:"Carte Forte",desc:"Très bonne carte. Idéale pour la plupart des situations."},
          {pts:10,col:"#3498db",label:"Carte Moyenne",desc:"Utile pour les combos défavorables ou garder les bonnes cartes."},
          {pts:5, col:"#95a5a6",label:"Carte Faible",desc:"À jouer si aucune autre option — ou sacrifier pour un Joker."},
        ].map(v=>`
          <div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
            <div style="font-size:32px;font-weight:900;color:${v.col};font-family:'Cinzel',serif;width:44px;text-align:center;text-shadow:0 0 10px ${v.col}66">${v.pts}</div>
            <div>
              <div style="font-size:12px;color:${v.col};font-weight:700;margin-bottom:2px">${v.label}</div>
              <div style="font-size:11px;color:var(--muted);line-height:1.5">${v.desc}</div>
            </div>
          </div>`).join("")}
      </div>

      <!-- Jokers -->
      <div style="font-size:13px;color:var(--gold);font-weight:700;font-family:'Cinzel',serif;margin-bottom:10px;letter-spacing:1px">
        🃏 LES 4 JOKERS
      </div>
      <div class="card" style="margin-bottom:14px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.6">Chaque joueur reçoit 2 Jokers aléatoires en début de partie. Un Joker utilisé est <strong style="color:var(--red)">défaussé définitivement</strong>.</div>
        ${JOKERS.map(j=>`
          <div style="display:flex;align-items:flex-start;gap:12px;padding:12px;margin-bottom:8px;border-radius:12px;background:linear-gradient(135deg,${j.color}33,rgba(7,5,20,0.8));border:1px solid ${j.color}55">
            <div style="font-size:30px;flex-shrink:0">${j.icon}</div>
            <div>
              <div style="font-size:13px;font-weight:700;color:var(--goldL);margin-bottom:3px">${j.name}</div>
              <div style="font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:4px">${j.desc}</div>
              <div style="font-size:10px;color:${j.color};font-style:italic">${
                j.id==="j1"?"⚡ Joué après les deux réponses — vole TOUS les points peu importe la valeur de vos cartes."
                :j.id==="j2"?"⚡ Joué après les deux réponses — si vous gagnez, vous doublez le gain total."
                :j.id==="j3"?"👁 Joué avant votre réponse — vous voyez 3 cartes de l'IA pour mieux choisir la vôtre."
                :"🔄 Joué si aucune carte valide — génère une carte aléatoire du Combo actif pour ne pas passer."
              }</div>
            </div>
          </div>`).join("")}
      </div>

      <!-- Bonus Imprévisibles -->
      <div style="font-size:13px;color:var(--gold);font-weight:700;font-family:'Cinzel',serif;margin-bottom:10px;letter-spacing:1px">
        🎁 BONUS IMPRÉVISIBLES
      </div>
      <div class="card" style="margin-bottom:14px;border-color:rgba(155,89,182,0.4);background:rgba(155,89,182,0.06)">
        <div style="font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.7">
          Entre <strong style="color:var(--goldL)">1 et 5 fois par partie</strong>, un bonus surprise se déclenche entre deux manches. Deux types de bonus peuvent apparaître :
        </div>

        <!-- Bonus 1 : Questions -->
        <div style="display:flex;gap:12px;padding:12px;border-radius:14px;margin-bottom:10px;
          background:linear-gradient(135deg,rgba(212,175,55,0.12),rgba(26,13,61,0.8));
          border:1.5px solid rgba(212,175,55,0.35)">
          <div style="font-size:30px;flex-shrink:0">🎯</div>
          <div>
            <div style="font-size:13px;font-weight:700;color:var(--goldL);margin-bottom:4px">Questions des 4 Piliers</div>
            <div style="font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:6px">
              Une question sur la Spiritualité, l'Amour, la Santé ou l'Argent vous est posée. Répondez dans le temps imparti pour gagner des points bonus.
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              ${[{pts:"0",col:"#e05555",l:"Mauvaise réponse"},{pts:"20",col:"#e67e22",l:"Temps dépassé"},{pts:"50",col:"#3498db",l:"Bonne réponse"},{pts:"100",col:"#f1c40f",l:"Réponse rapide"}].map(v=>
                '<div style="font-size:9px;padding:3px 8px;border-radius:6px;background:'+v.col+'22;border:1px solid '+v.col+'55;color:'+v.col+';font-weight:700">'+v.pts+' pts — '+v.l+'</div>'
              ).join("")}
            </div>
          </div>
        </div>

        <!-- Bonus 2 : Jackpot Flash -->
        <div style="display:flex;gap:12px;padding:12px;border-radius:14px;
          background:linear-gradient(135deg,rgba(241,196,15,0.12),rgba(26,13,61,0.8));
          border:1.5px solid rgba(241,196,15,0.35)">
          <div style="font-size:30px;flex-shrink:0">🎰</div>
          <div>
            <div style="font-size:13px;font-weight:700;color:#f1c40f;margin-bottom:4px">Jackpot Flash</div>
            <div style="font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:6px">
              Une machine à sous à 3 rouleaux se lance ! Les symboles tournent et s'arrêtent un à un. Tentez votre chance pour décrocher le jackpot.
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              ${[{ico:"🎰",l:"Triple identique",pts:"Jackpot !"},{ico:"⭐",l:"Paire",pts:"Gain moyen"},{ico:"💎",l:"Rien",pts:"Pas de gain"}].map(v=>
                '<div style="font-size:9px;padding:3px 8px;border-radius:6px;background:rgba(241,196,15,0.1);border:1px solid rgba(241,196,15,0.3);color:#f1c40f;font-weight:700">'+v.ico+' '+v.l+' → '+v.pts+'</div>'
              ).join("")}
            </div>
          </div>
        </div>
      </div>

      <!-- XP & Progression -->
      <div style="font-size:13px;color:var(--gold);font-weight:700;font-family:'Cinzel',serif;margin-bottom:10px;letter-spacing:1px">
        ⚡ PROGRESSION & RÉCOMPENSES
      </div>
      <div class="card" style="margin-bottom:14px">
        <div style="font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:10px">
          Chaque point gagné en jeu rapporte <strong style="color:var(--goldL)">2 XP</strong>. Les défis complétés apportent des <strong style="color:var(--goldL)">XP bonus</strong>. Montez en niveau pour débloquer de nouveaux thèmes visuels et fonctionnalités.
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${NIVEAUX.map(n=>`
            <div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);border-radius:10px;padding:6px 10px;border:1px solid rgba(255,255,255,0.08)">
              <span style="font-size:16px">${n.icon}</span>
              <div>
                <div style="font-size:10px;color:${n.color};font-weight:700">${n.label}</div>
                <div style="font-size:8px;color:var(--muted)">${n.min===0?"Départ":n.min+" XP"}</div>
              </div>
            </div>`).join("")}
        </div>
      </div>

      <!-- Conseils -->
      <div style="font-size:13px;color:var(--gold);font-weight:700;font-family:'Cinzel',serif;margin-bottom:10px;letter-spacing:1px">
        💡 CONSEILS STRATÉGIQUES
      </div>
      <div class="card" style="margin-bottom:20px">
        ${[
          "🎯 <strong style='color:var(--goldL)'>Au Draft</strong> : concentrez-vous sur 2 ou 3 Combos forts plutôt que d'éparpiller vos cartes.",
          "💀 <strong style='color:var(--goldL)'>Le Brakeur</strong> est idéal quand l'adversaire a une carte forte — vous raflез tout même avec une carte faible.",
          "✖️ <strong style='color:var(--goldL)'>Le Multiplicateur</strong> est parfait quand vous avez une carte 40 pts — le pot devient énorme.",
          "👁 <strong style='color:var(--goldL)'>L'Espion</strong> avant une manche décisive vous donne un avantage informationnel crucial.",
          "⏱️ <strong style='color:var(--goldL)'>Le Timer</strong> : si vous n'avez pas de carte valide et pas d'Échange, le passage est automatique — l'adversaire ne gagne que SA carte.",
          "🔥 <strong style='color:var(--goldL)'>Le Streak</strong> : gagner plusieurs manches de suite crée un momentum psychologique — profitez-en pour prendre des risques.",
          "🧠 <strong style='color:var(--goldL)'>Observez l'IA</strong> : Aria (Expert) joue toujours optimal. Marcus (Intermédiaire) fait parfois des erreurs. Léa (Débutante) joue au hasard.",
        ].map(t=>`<div style="padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;color:var(--muted);line-height:1.6">${t}</div>`).join("")}
      </div>

      <!-- Signature -->
      <div style="text-align:center;padding:16px 0">
        <div style="font-size:24px;margin-bottom:8px">💑</div>
        <div style="font-size:13px;color:var(--goldL);font-family:'Cinzel',serif;font-weight:700;letter-spacing:2px;margin-bottom:4px">Mila &amp; DyDy</div>
        <div style="font-size:10px;color:var(--muted);line-height:1.6;font-style:italic">"Nous avons créé ÉQUILIBRE pour vous aider à réfléchir<br>à ce qui compte vraiment dans la vie — tout en jouant."</div>
      </div>

      <button class="btn-gold" onclick="S.ecran='menu';render()">⚔️ Jouer maintenant</button>
    </div>
  </div>`;
}

// ── Confirmation abandon de partie ──
function MULTI_CONFIRM_MENU(){
  const overlay = document.createElement("div");
  overlay.id = "confirm-menu-overlay";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)";
  overlay.innerHTML = `<div style="background:var(--dark);border:2px solid rgba(212,175,55,0.4);border-radius:20px;padding:28px 24px;max-width:340px;width:100%;text-align:center">
    <div style="font-size:32px;margin-bottom:12px">🏠</div>
    <div style="font-family:Cinzel,serif;font-size:18px;font-weight:900;color:var(--goldL);margin-bottom:8px">Quitter la partie ?</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6">Votre progression sera perdue.<br>Voulez-vous vraiment retourner au menu ?</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button onclick="MULTI_DO_MENU()" style="width:100%;min-height:50px;border-radius:12px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#e05555,#c0392b);color:#fff;border:none;cursor:pointer">
        🏠 Oui — Retour au menu
      </button>
      <button onclick="document.getElementById('confirm-menu-overlay').remove()" style="width:100%;min-height:50px;border-radius:12px;font-size:14px;font-weight:600;background:rgba(255,255,255,0.06);color:var(--text);border:1px solid rgba(212,175,55,0.25);cursor:pointer">
        ▶️ Continuer la partie
      </button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function MULTI_DO_MENU(){
  const ov = document.getElementById("confirm-menu-overlay");
  if(ov) ov.remove();
  AUDIO.stopBg();
  S.jeu = null;
  S.ecran = "menu";
  render();
}

// Démarrage
charger();
render();
</script>


</body>
</html>
